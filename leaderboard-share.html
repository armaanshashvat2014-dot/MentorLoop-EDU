<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Leaderboard Share | MentorLoop EDU</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:white;
}

.card{
background:#1e293b;
padding:30px;
border-radius:20px;
width:360px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

.title{
font-size:22px;
color:#22d3ee;
margin-bottom:10px;
}

.rank{
font-size:28px;
font-weight:bold;
margin:10px 0;
color:#10b981;
}

.stat{
margin:6px 0;
font-size:16px;
}

.subtitle{
margin-top:10px;
font-size:14px;
color:#94a3b8;
}

button{
margin-top:18px;
padding:12px;
width:100%;
border:none;
border-radius:10px;
background:#22d3ee;
color:#020617;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

</style>
</head>

<body>

<div class="card" id="leaderboardCard">

<div class="title">🏆 MentorLoop EDU</div>

<div class="rank" id="rank"></div>

<div class="stat"><strong>Name:</strong> <span id="userName"></span></div>
<div class="stat"><strong>Points:</strong> <span id="points"></span></div>
<div class="stat"><strong>Streak:</strong> <span id="streak"></span> days</div>

<div class="subtitle">
Earn your own rank on MentorLoop EDU 🚀
</div>

<button onclick="downloadCard()">Download Screenshot</button>

</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>

// LOAD USER DATA
let name = localStorage.getItem("ml_user_name") || "Learner";
let points = parseInt(localStorage.getItem("ml_points") || 0);
let streak = parseInt(localStorage.getItem("ml_streak") || 0);

document.getElementById("userName").innerText = name;
document.getElementById("points").innerText = points;
document.getElementById("streak").innerText = streak;


// DETERMINE RANK (REAL POINTS)
let rank = "Beginner";

if(points >= 200) rank = "Learner";
if(points >= 500) rank = "Scholar";
if(points >= 1000) rank = "Master";
if(points >= 5000) rank = "Legend";

document.getElementById("rank").innerText = "Rank: " + rank;


// DOWNLOAD SCREENSHOT
function downloadCard(){

html2canvas(document.getElementById("leaderboardCard")).then(canvas=>{

const link=document.createElement("a");

link.download="mentorloop-rank.png";
link.href=canvas.toDataURL();

link.click();

});

}


// MILESTONE SHARE TRIGGER
function milestoneCheck(){

let milestones=[100,500,1000,5000];

milestones.forEach(m=>{

if(points>=m && !localStorage.getItem("ml_shared_"+m)){

setTimeout(()=>{
alert("🎉 You reached "+m+" points! Share your achievement with friends.");
},500);

localStorage.setItem("ml_shared_"+m,"true");

}

});

}

milestoneCheck();

</script>

</body>
</html>
