<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Mastery Quiz</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:#e2e8f0;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  color:#38bdf8;
}

select, button{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

.quiz{
  display:none;
  margin-top:20px;
}

.options button{
  width:100%;
  margin:5px 0;
  background:#1e293b;
  color:white;
}

.options button:hover{
  background:#38bdf8;
}

.timer{
  text-align:center;
  color:#facc15;
}
</style>
</head>

<body>

<div class="container">
<h1>🤖 AI Mastery</h1>

<select id="subject">
<option>Maths</option>
<option>Science</option>
<option>GK</option>
<option>Geography</option>
</select>

<select id="difficulty">
<option>Easy</option>
<option>Medium</option>
<option>Hard</option>
</select>

<select id="mode">
<option>Learning</option>
<option>Test</option>
<option>Olympiad</option>
</select>

<select id="timerMode">
<option>Untimed</option>
<option>Timed</option>
</select>

<button onclick="startQuiz()">Start</button>

<div class="quiz" id="quizBox">
<div id="timer"></div>
<div id="question"></div>
<div class="options" id="options"></div>

<button onclick="next()">Next</button>
<button onclick="submitQuiz()">Submit</button>

<div id="result"></div>
</div>
</div>

<script>

let questions=[],answers=[],current=0;
let timerInterval,timeLeft=300;

function startQuiz(){
  document.getElementById("quizBox").style.display="block";

  let subject=document.getElementById("subject").value;
  let diff=document.getElementById("difficulty").value;
  let mode=document.getElementById("mode").value;

  questions = generateSmart(subject,diff,mode);
  answers=new Array(10).fill(null);
  current=0;

  if(document.getElementById("timerMode").value==="Timed"){
    startTimer();
  }

  load();
}

function startTimer(){
  timeLeft=300;
  timerInterval=setInterval(()=>{
    document.getElementById("timer").innerText="⏱ "+timeLeft;
    timeLeft--;
    if(timeLeft<0){
      clearInterval(timerInterval);
      submitQuiz();
    }
  },1000);
}

// 🔥 SMART AI ENGINE
function generateSmart(subject,diff,mode){
  let q=[];

  for(let i=0;i<10;i++){

    if(subject==="Maths"){
      let a=randScale(diff);
      let b=randScale(diff);

      if(mode==="Olympiad"){
        q.push(makeQ(`Find: (${a}² + ${b}²)`, a*a+b*b));
      }
      else if(mode==="Test"){
        q.push(makeQ(`${a} × ${b}`, a*b));
      }
      else{
        q.push(makeQ(`${a} + ${b}`, a+b));
      }
    }

    else if(subject==="Science"){
      let bank=[
        ["Gas used in respiration","Oxygen"],
        ["Chemical formula of water","H2O"],
        ["Nearest star","Sun"],
        ["Unit of force","Newton"]
      ];
      q.push(makeMCQ(bank));
    }

    else if(subject==="GK"){
      let bank=[
        ["Capital of India","Delhi"],
        ["National animal","Tiger"],
        ["Currency","Rupee"],
        ["Prime Minister","Modi"]
      ];
      q.push(makeMCQ(bank));
    }

    else if(subject==="Geography"){
      let bank=[
        ["Largest ocean","Pacific"],
        ["Highest mountain","Everest"],
        ["Continent of India","Asia"],
        ["Famous desert in India","Thar"]
      ];
      q.push(makeMCQ(bank));
    }
  }

  return q;
}

// ===== HELPERS =====
function makeQ(text,correct){
  return {
    q:text,
    opt:[correct,correct+1,correct-1,correct+2],
    c:correct
  };
}

function makeMCQ(bank){
  let pick=bank[rand(0,bank.length-1)];
  return {
    q:pick[0],
    opt:[pick[1],"Option A","Option B","Option C"],
    c:pick[1]
  };
}

function randScale(diff){
  if(diff==="Easy") return rand(1,10);
  if(diff==="Medium") return rand(10,50);
  return rand(50,150);
}

function rand(min,max){
  return Math.floor(Math.random()*(max-min+1))+min;
}

// ===== UI =====
function load(){
  let q=questions[current];
  document.getElementById("question").innerText=q.q;

  let html="";
  q.opt.forEach(o=>{
    html+=`<button onclick="select('${o}')">${o}</button>`;
  });

  document.getElementById("options").innerHTML=html;
}

function select(ans){
  answers[current]=ans;
}

function next(){
  if(current<questions.length-1){
    current++;
    load();
  }
}

function submitQuiz(){
  clearInterval(timerInterval);

  let score=0;
  for(let i=0;i<questions.length;i++){
    if(answers[i]==questions[i].c) score++;
  }

  document.getElementById("result").innerText=
    "🔥 Score: "+score+"/"+questions.length;
}

</script>

</body>
</html>
