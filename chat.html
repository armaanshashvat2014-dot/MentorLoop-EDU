<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MentorLoop EDU Chat</title>

<style>
*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  display:flex;
  height:100vh;
  background:radial-gradient(circle at top left,#0f172a,#020617);
  color:white;
}

/* SIDEBAR */
.sidebar{
  width:280px;
  background:rgba(255,255,255,.04);
  backdrop-filter:blur(20px);
  border-right:1px solid rgba(255,255,255,.08);
  padding:20px;
  overflow-y:auto;
}

.sidebar h2{ color:#22d3ee; margin-top:0; }

.sidebar input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:12px;
  background:#0f172a;
  color:white;
}

.sidebar button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#22d3ee,#10b981);
  color:white;
  cursor:pointer;
  font-weight:bold;
}

.friend{
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  background:rgba(255,255,255,.05);
}

/* CHAT */
.chat{ flex:1; display:flex; flex-direction:column; }

header{
  padding:18px;
  text-align:center;
  font-size:22px;
  color:#22d3ee;
  background:rgba(255,255,255,.03);
}

#chatBox{ flex:1; padding:20px; overflow-y:auto; }

.message{
  background:rgba(255,255,255,.05);
  padding:14px;
  border-radius:14px;
  margin-bottom:14px;
}

.meta{ font-size:12px; color:#94a3b8; margin-bottom:6px; }

.flagBtn{
  margin-top:10px;
  padding:8px 12px;
  border:none;
  border-radius:10px;
  background:#7f1d1d;
  color:white;
  cursor:pointer;
}

.bottom{
  display:flex;
  gap:10px;
  padding:15px;
  background:rgba(255,255,255,.03);
}

.bottom input{
  flex:1;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#0f172a;
  color:white;
}

.bottom button{
  padding:14px 20px;
  border:none;
  border-radius:14px;
  background:linear-gradient(90deg,#22d3ee,#10b981);
  color:white;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<div id="app" style="display:none; width:100%; height:100%;">
  <div class="sidebar">
    <h2>👥 Friends</h2>

    <input id="friendUID" placeholder="Friend UID">
    <input id="friendNick" placeholder="Nickname">
    <button onclick="addFriend()">Add Friend</button>

    <div id="friendsList"></div>
  </div>

  <div class="chat">
    <header>💬 MentorLoop Chat</header>

    <div id="chatBox"></div>

    <div class="bottom">
      <input id="msgInput" placeholder="Type message...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<!-- Loading screen -->
<div id="loading" style="display:flex;justify-content:center;align-items:center;height:100vh;width:100%;">
  <h2>Loading...</h2>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp,
  doc,
  getDoc,
  setDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
   apiKey: "AIzaSyBOP356DMuNyWQyHDbksw0i_dWXfXsbQvI",
  authDomain: "mentorloop-55a37.firebaseapp.com",
  projectId: "mentorloop-55a37",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* 🔥 FIX: wait for persistence BEFORE auth listener */
await setPersistence(auth, browserLocalPersistence);

/* GLOBALS */
let currentUser = null;
let publicId = "";
let currentName = "";
let banned = false;
let friends = {};

/* AUTH */
onAuthStateChanged(auth, async(user)=>{

  if(!user){
    console.log("Waiting for session restore...");

    setTimeout(()=>{
      if(!auth.currentUser){
        document.body.innerHTML = `
          <div style="display:flex;justify-content:center;align-items:center;height:100vh;">
            <div>
              <h2>Please login first</h2>
              <a href="index.html" style="color:#22d3ee;">Go back</a>
            </div>
          </div>
        `;
      }
    },3000);

    return;
  }

  console.log("User restored:", user.uid);

  currentUser = user;

  const mapSnap = await getDoc(doc(db,"user_map",user.uid));

  if(!mapSnap.exists()){
    document.body.innerHTML = "User ID not found";
    return;
  }

  publicId = mapSnap.data().publicId;

  const userSnap = await getDoc(doc(db,"leaderboard",publicId));

  if(userSnap.exists()){
    currentName = userSnap.data().name || "User";
    banned = userSnap.data().banned || false;
  }

  if(banned){
    document.getElementById("msgInput").disabled = true;
    document.getElementById("msgInput").placeholder = "You are banned";
  }

  /* SHOW APP */
  document.getElementById("loading").style.display = "none";
  document.getElementById("app").style.display = "flex";

  loadFriends();
  loadMessages();
});

/* SEND */
window.sendMessage = async function(){
  if(banned) return alert("You are banned.");

  const text = document.getElementById("msgInput").value.trim();
  if(!text) return;

  await addDoc(collection(db,"chatMessages"),{
    uid: publicId,
    name: currentName,
    text,
    time: serverTimestamp()
  });

  document.getElementById("msgInput").value = "";
}

/* FLAG */
window.flagMessage = async function(id,uid,name,text){
  if(!confirm("Flag this message?")) return;

  await addDoc(collection(db,"flaggedMessages"),{
    flaggedBy: publicId,
    originalUID: uid,
    originalName: name,
    text,
    flaggedAt: serverTimestamp()
  });

  await deleteDoc(doc(db,"chatMessages",id));
}

/* CHAT */
function loadMessages(){
  const q = query(collection(db,"chatMessages"), orderBy("time","asc"));

  onSnapshot(q,(snapshot)=>{
    const box = document.getElementById("chatBox");
    box.innerHTML = "";

    snapshot.forEach(docSnap=>{
      const m = docSnap.data();
      const id = docSnap.id;
      const displayName = friends[m.uid] || m.name;

      box.innerHTML += `
        <div class="message">
          <div class="meta">(${m.uid}) ${displayName}</div>
          <div>${m.text}</div>
          <button class="flagBtn"
            onclick="flagMessage('${id}','${m.uid}','${m.name}','${m.text.replace(/'/g,"\\'")}')">
            🚩 Flag
          </button>
        </div>
      `;
    });

    box.scrollTop = box.scrollHeight;
  });
}

/* FRIENDS */
window.addFriend = async function(){
  const uid = document.getElementById("friendUID").value.trim();
  const nickname = document.getElementById("friendNick").value.trim();
  if(!uid || !nickname) return;

  await setDoc(doc(db,"friends",publicId,"list",uid),{ nickname });

  document.getElementById("friendUID").value = "";
  document.getElementById("friendNick").value = "";
}

function loadFriends(){
  onSnapshot(collection(db,"friends",publicId,"list"),(snapshot)=>{
    friends = {};
    const list = document.getElementById("friendsList");
    list.innerHTML = "";

    snapshot.forEach(docSnap=>{
      friends[docSnap.id] = docSnap.data().nickname;

      list.innerHTML += `
        <div class="friend">
          <strong>${docSnap.data().nickname}</strong><br>
          <small>${docSnap.id}</small>
        </div>
      `;
    });
  });
}

</script>
</body>
</html>
