<!DOCTYPE html>
<html>
<head>
<title>MentorLoop EDU Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  display:flex;
  height:100vh;
  background:radial-gradient(circle at top left,#0f172a,#020617);
  color:white;
}

.sidebar{
  width:300px;
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(20px);
  padding:20px;
  overflow-y:auto;
  border-right:1px solid rgba(255,255,255,.08);
}

.sidebar h2{
  color:#22d3ee;
}

.sidebar input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:12px;
  background:#0f172a;
  color:white;
}

.sidebar button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#22d3ee,#10b981);
  color:white;
  cursor:pointer;
}

.friend{
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
}

.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

header{
  padding:18px;
  text-align:center;
  font-size:22px;
  color:#22d3ee;
  background:rgba(255,255,255,0.03);
}

#chatBox{
  flex:1;
  padding:20px;
  overflow-y:auto;
}

.message{
  background:rgba(255,255,255,0.05);
  padding:14px;
  border-radius:16px;
  margin-bottom:14px;
}

.meta{
  color:#94a3b8;
  font-size:12px;
  margin-bottom:6px;
}

.message button{
  margin-top:10px;
  background:#7f1d1d;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
}

.bottom{
  display:flex;
  gap:10px;
  padding:15px;
  background:rgba(255,255,255,0.03);
}

.bottom input{
  flex:1;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#0f172a;
  color:white;
}

.bottom button{
  padding:14px 20px;
  border:none;
  border-radius:14px;
  background:linear-gradient(90deg,#22d3ee,#10b981);
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>👥 Friends</h2>

  <input id="friendUID" placeholder="Friend UID">
  <input id="friendNick" placeholder="Nickname">
  <button onclick="addFriend()">Add Friend</button>

  <div id="friendsList"></div>
</div>

<div class="chat">
  <header>💬 MentorLoop Chat</header>

  <div id="chatBox"></div>

  <div class="bottom">
    <input id="msgInput" placeholder="Type message...">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp,
  doc,
  getDoc,
  setDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"YOUR_KEY",
  authDomain:"YOUR_DOMAIN",
  projectId:"YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser=null;
let currentName="";
let friends={};
let banned=false;

onAuthStateChanged(auth, async (user) => {

  if (!user) {
    setTimeout(() => {
      if (!auth.currentUser) {
        document.body.innerHTML = `
          <div style="display:flex;justify-content:center;align-items:center;height:100vh;">
            <div>
              <h2>Please login first</h2>
              <a href="index.html" style="color:#22d3ee;">Go back</a>
            </div>
          </div>
        `;
      }
    }, 1500);
    return;
  }

  currentUser = user;

  const ref = doc(db, "leaderboard", user.uid);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    currentName = snap.data().name || "User";
    banned = snap.data().banned || false;
  }

  if (banned) {
    document.getElementById("msgInput").disabled = true;
    document.getElementById("msgInput").placeholder = "You are banned";
  }

  loadFriends();
  loadMessages();
});

  if(!user){
    document.body.innerHTML="Please login first.";
    return;
  }

  currentUser=user;

  const ref=doc(db,"leaderboard",user.uid);
  const snap=await getDoc(ref);

  if(snap.exists()){
    currentName=snap.data().name || "User";
    banned=snap.data().banned || false;
  }

  if(banned){
    document.getElementById("msgInput").disabled=true;
  }

  loadFriends();
  loadMessages();
});

window.sendMessage = async function(){

  if(banned){
    alert("You are banned.");
    return;
  }

  const text=document.getElementById("msgInput").value.trim();
  if(!text) return;

  await addDoc(collection(db,"chatMessages"),{
    uid: currentUser.uid,
    name: currentName,
    text: text,
    time: serverTimestamp()
  });

  document.getElementById("msgInput").value="";
}

window.flagMessage = async function(id, uid, name, text){

  if(!confirm("Flag this message?")) return;

  await addDoc(collection(db,"flaggedMessages"),{
    flaggedBy: currentUser.uid,
    originalUID: uid,
    originalName: name,
    text: text,
    flaggedAt: serverTimestamp()
  });

  await deleteDoc(doc(db,"chatMessages",id));
}

function loadMessages(){

  const q=query(collection(db,"chatMessages"),orderBy("time","asc"));

  onSnapshot(q,(snapshot)=>{

    const box=document.getElementById("chatBox");
    box.innerHTML="";

    snapshot.forEach(docSnap=>{

      const m=docSnap.data();
      const displayName=friends[m.uid] || m.name;
      const id=docSnap.id;

      box.innerHTML += `
        <div class="message">
          <div class="meta">(${m.uid}) ${displayName}</div>
          <div>${m.text}</div>
          <button onclick="flagMessage('${id}','${m.uid}','${m.name}','${m.text.replace(/'/g,"\\'")}')">🚩 Flag</button>
        </div>
      `;
    });

    box.scrollTop=box.scrollHeight;
  });
}

window.addFriend = async function(){

  const uid=document.getElementById("friendUID").value.trim();
  const nickname=document.getElementById("friendNick").value.trim();

  if(!uid || !nickname) return;

  await setDoc(doc(db,"friends",currentUser.uid,"list",uid),{
    nickname
  });
}

function loadFriends(){

  onSnapshot(collection(db,"friends",currentUser.uid,"list"),(snapshot)=>{

    friends={};
    const list=document.getElementById("friendsList");
    list.innerHTML="";

    snapshot.forEach(docSnap=>{

      friends[docSnap.id]=docSnap.data().nickname;

      list.innerHTML += `
        <div class="friend">
          <strong>${docSnap.data().nickname}</strong>
          <small>${docSnap.id}</small>
        </div>
      `;
    });
  });
}

</script>

</body>
</html>
