<!DOCTYPE html>
<html>
<head>
<title>MentorLoop EDU Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  display:flex;
  height:100vh;
  background:radial-gradient(circle at top left,#0f172a,#020617);
  color:white;
}

.sidebar{
  width:280px;
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(20px);
  border-right:1px solid rgba(255,255,255,.08);
  padding:20px;
  overflow-y:auto;
}

.sidebar h2{
  color:#22d3ee;
  margin-top:0;
}

.sidebar input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:12px;
  background:#0f172a;
  color:white;
}

.sidebar button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#22d3ee,#10b981);
  color:white;
  cursor:pointer;
}

.friend{
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  background:rgba(255,255,255,.05);
}

.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

header{
  padding:18px;
  text-align:center;
  font-size:22px;
  color:#22d3ee;
  background:rgba(255,255,255,.03);
}

#chatBox{
  flex:1;
  overflow-y:auto;
  padding:20px;
}

.message{
  background:rgba(255,255,255,.05);
  padding:14px;
  border-radius:16px;
  margin-bottom:14px;
}

.meta{
  font-size:12px;
  color:#94a3b8;
  margin-bottom:6px;
}

.flagBtn{
  margin-top:10px;
  padding:8px 12px;
  border:none;
  border-radius:10px;
  background:#7f1d1d;
  color:white;
  cursor:pointer;
}

.bottom{
  display:flex;
  gap:10px;
  padding:15px;
  background:rgba(255,255,255,.03);
}

.bottom input{
  flex:1;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#0f172a;
  color:white;
}

.bottom button{
  padding:14px 20px;
  border:none;
  border-radius:14px;
  background:linear-gradient(90deg,#22d3ee,#10b981);
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>👥 Friends</h2>

  <input id="friendUID" placeholder="Friend UID">
  <input id="friendNick" placeholder="Nickname">
  <button onclick="addFriend()">Add Friend</button>

  <div id="friendsList"></div>
</div>

<div class="chat">
  <header>💬 MentorLoop Chat</header>

  <div id="chatBox"></div>

  <div class="bottom">
    <input id="msgInput" placeholder="Type message...">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp,
  doc,
  getDoc,
  setDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let currentName = "";
let publicId = "";
let banned = false;
let friends = {};

onAuthStateChanged(auth, async(user)=>{

  if(!user){
    document.body.innerHTML = "Please login first";
    return;
  }

  currentUser = user;

  const mapSnap = await getDoc(doc(db,"user_map",user.uid));

  if(!mapSnap.exists()){
    document.body.innerHTML = "User ID not found";
    return;
  }

  publicId = mapSnap.data().publicId;

  const userSnap = await getDoc(doc(db,"leaderboard",publicId));

  if(userSnap.exists()){
    currentName = userSnap.data().name || "User";
    banned = userSnap.data().banned || false;
  }

  if(banned){
    document.getElementById("msgInput").disabled = true;
    document.getElementById("msgInput").placeholder = "You are banned";
  }

  loadFriends();
  loadMessages();
});

window.sendMessage = async function(){

  if(banned){
    alert("You are banned.");
    return;
  }

  const text = document.getElementById("msgInput").value.trim();

  if(!text) return;

  await addDoc(collection(db,"chatMessages"),{
    uid: publicId,
    name: currentName,
    text: text,
    time: serverTimestamp()
  });

  document.getElementById("msgInput").value = "";
}

window.flagMessage = async function(id, uid, name, text){

  if(!confirm("Flag this message?")) return;

  await addDoc(collection(db,"flaggedMessages"),{
    flaggedBy: publicId,
    originalUID: uid,
    originalName: name,
    text: text,
    flaggedAt: serverTimestamp()
  });

  await deleteDoc(doc(db,"chatMessages",id));
}

function loadMessages(){

  const q = query(collection(db,"chatMessages"), orderBy("time","asc"));

  onSnapshot(q,(snapshot)=>{

    const box = document.getElementById("chatBox");
    box.innerHTML = "";

    snapshot.forEach(docSnap=>{

      const m = docSnap.data();
      const id = docSnap.id;
      const displayName = friends[m.uid] || m.name;

      box.innerHTML += `
        <div class="message">
          <div class="meta">(${m.uid}) ${displayName}</div>
          <div>${m.text}</div>
          <button class="flagBtn"
            onclick="flagMessage('${id}','${m.uid}','${m.name}','${m.text.replace(/'/g,"\\'")}')">
            🚩 Flag
          </button>
        </div>
      `;
    });

    box.scrollTop = box.scrollHeight;
  });
}

window.addFriend = async function(){

  const uid = document.getElementById("friendUID").value.trim();
  const nickname = document.getElementById("friendNick").value.trim();

  if(!uid || !nickname) return;

  await setDoc(doc(db,"friends",publicId,"list",uid),{
    nickname: nickname
  });

  document.getElementById("friendUID").value = "";
  document.getElementById("friendNick").value = "";
}

function loadFriends(){

  onSnapshot(collection(db,"friends",publicId,"list"),(snapshot)=>{

    friends = {};
    const list = document.getElementById("friendsList");
    list.innerHTML = "";

    snapshot.forEach(docSnap=>{

      friends[docSnap.id] = docSnap.data().nickname;

      list.innerHTML += `
        <div class="friend">
          <strong>${docSnap.data().nickname}</strong>
          <small>${docSnap.id}</small>
        </div>
      `;
    });
  });
}

</script>

</body>
</html>
