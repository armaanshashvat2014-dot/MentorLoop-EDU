<!DOCTYPE html>
<html>
<head>
<title>Report Card | MentorLoop EDU</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- ✅ PDF LIBRARIES -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
margin:0;
font-family:'Segoe UI';
background:#020617;
color:#e2e8f0;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{
width:95%;
max-width:700px;
background:#1e293b;
padding:25px;
border-radius:15px;
box-shadow:0 0 40px rgba(34,211,238,.2);
}

h1{
text-align:center;
color:#22d3ee;
margin-bottom:10px;
}

.header{
text-align:center;
margin-bottom:15px;
color:#94a3b8;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:10px;
border-bottom:1px solid #334155;
text-align:center;
}

th{
color:#22d3ee;
}

.summary{
margin-top:20px;
padding:15px;
background:#020617;
border-radius:10px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#334155;
color:white;
cursor:pointer;
}

button:hover{
background:#22d3ee;
color:black;
}
</style>
</head>

<body>

<div class="card" id="reportCard">

<h1>📄 Report Card</h1>

<div class="header">
<p><strong>Name:</strong> <span id="studentName"></span></p>
<p><strong>ID:</strong> <span id="studentId"></span></p>
<p><strong>Date:</strong> <span id="date"></span></p>
</div>

<table>
<thead>
<tr>
<th>Subject</th>
<th>Score</th>
<th>Grade</th>
<th>Remark</th>
</tr>
</thead>
<tbody id="reportTable"></tbody>
</table>

<div class="summary" id="summary"></div>

<button onclick="downloadReport()">📥 Download PDF</button>
<button onclick="window.print()">🖨 Print</button>

</div>

<script>

const subjects = ["math","science","gk","geography","test"];

function getHistory(sub){
  return JSON.parse(localStorage.getItem("ml_history_"+sub) || "[]");
}

// 🎯 GRADE SYSTEM
function getGrade(score){
if(score>=90) return "A+";
if(score>=80) return "A";
if(score>=70) return "B";
if(score>=60) return "C";
return "D";
}

// 🧠 REMARKS
function getRemark(score){
if(score>=85) return "Excellent";
if(score>=70) return "Good";
if(score>=50) return "Average";
return "Needs Improvement";
}

// 📊 GENERATE REPORT
function generateReport(){

let tableHTML="";
let data=[];
let total=0;

subjects.forEach(sub=>{

let h=getHistory(sub);
if(h.length===0) return;

let avg=h.reduce((a,b)=>a+b.score,0)/h.length;
let grade=getGrade(avg);
let remark=getRemark(avg);

total+=avg;
data.push({sub,avg});

tableHTML+=`
<tr>
<td>${sub.toUpperCase()}</td>
<td>${avg.toFixed(1)}%</td>
<td>${grade}</td>
<td>${remark}</td>
</tr>`;
});

// OVERALL
let overall=data.length?total/data.length:0;
let overallGrade=getGrade(overall);

// SORT FOR ANALYSIS
data.sort((a,b)=>b.avg-a.avg);

let strong=data.length?data[0].sub.toUpperCase():"-";
let weak=data.length?data[data.length-1].sub.toUpperCase():"-";

// TEACHER COMMENT
let comment="Keep working hard.";
if(overall>=80) comment="Outstanding performance!";
else if(overall>=60) comment="Good progress, keep improving.";
else comment="Needs more focus and practice.";

// RENDER
document.getElementById("reportTable").innerHTML=tableHTML;

document.getElementById("summary").innerHTML=`
<p><strong>Overall:</strong> ${overall.toFixed(1)}%</p>
<p><strong>Grade:</strong> ${overallGrade}</p>
<p><strong>Strongest Subject:</strong> ${strong}</p>
<p><strong>Focus Area:</strong> ${weak}</p>
<p><strong>Teacher's Remark:</strong> ${comment}</p>
`;

// HEADER INFO
document.getElementById("studentName").textContent = localStorage.getItem("ml_name") || "Student";
document.getElementById("studentId").textContent = localStorage.getItem("ml_uid") || "N/A";
document.getElementById("date").textContent = new Date().toLocaleDateString();

}

// 📥 DOWNLOAD AS PDF
async function downloadReport(){

const { jsPDF } = window.jspdf;
const element = document.getElementById("reportCard");

const canvas = await html2canvas(element, {
  scale: 2,
  useCORS: true
});

const imgData = canvas.toDataURL("image/png");

const pdf = new jsPDF("p", "mm", "a4");

const imgWidth = 210;
const pageHeight = 295;
const imgHeight = canvas.height * imgWidth / canvas.width;

let heightLeft = imgHeight;
let position = 0;

pdf.addImage(imgData, "PNG", 0, position, imgWidth, imgHeight);
heightLeft -= pageHeight;

// MULTI PAGE
while (heightLeft > 0) {
  position = heightLeft - imgHeight;
  pdf.addPage();
  pdf.addImage(imgData, "PNG", 0, position, imgWidth, imgHeight);
  heightLeft -= pageHeight;
}

pdf.save("MentorLoop_Report.pdf");
}

// INIT
generateReport();

</script>

</body>
</html>
