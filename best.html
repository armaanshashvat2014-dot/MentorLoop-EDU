<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MentorLoop | Boost Mode</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:#e2e8f0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#020617;
  padding:25px;
  border-radius:20px;
  width:400px;
  text-align:center;
}

button{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  color:#020617;
  font-weight:bold;
  cursor:pointer;
}

.question{
  margin-top:15px;
  font-size:18px;
}

.msg{
  margin-top:10px;
  color:#38bdf8;
  font-size:14px;
}
</style>
</head>

<body>

<div class="card">

<h1>⚡ Boost Mode</h1>

<div id="challenge" class="msg"></div>

<div id="question" class="question"></div>

<input id="answer" placeholder="Answer">
<button onclick="submit()">Submit</button>

<div id="progress" class="msg"></div>

<button id="rewardBtn" onclick="reward()" style="display:none">
🎁 Claim Mystery Reward
</button>

<div id="rewardMsg" class="msg"></div>

</div>

<script>

// QUESTIONS
const Q = [
  {q:"18 + 24",a:"42"},
  {q:"9 × 7",a:"63"},
  {q:"11²",a:"121"},
  {q:"100 ÷ 4",a:"25"},
  {q:"5³",a:"125"}
];

let current = Q[Math.floor(Math.random()*Q.length)];
document.getElementById("question").innerText = current.q;

// ⚔️ CHALLENGE EGO
let egoMsgs = [
  "😈 Only top 5% can solve this",
  "⚔️ Prove you're elite",
  "🔥 Most users fail this"
];

document.getElementById("challenge").innerText =
  egoMsgs[Math.floor(Math.random()*egoMsgs.length)];

let correct = 0;
let target = 3;

// SUBMIT
function submit(){

  let user = document.getElementById("answer").value.trim();

  if(user == current.a){

    correct++;

    // 👀 PROGRESS PEEK
    let remaining = target - correct;

    if(remaining > 0){
      document.getElementById("progress").innerText =
        `👀 ${remaining} more correct to unlock reward`;
    } else {
      document.getElementById("progress").innerText =
        "🎯 Reward unlocked!";
      document.getElementById("rewardBtn").style.display = "block";
    }

    nextQ();

  } else {
    document.getElementById("progress").innerText =
      "❌ Try again — you can do this";
  }
}

// NEXT QUESTION
function nextQ(){
  current = Q[Math.floor(Math.random()*Q.length)];
  document.getElementById("question").innerText = current.q;
  document.getElementById("answer").value = "";
}

// 🎁 MYSTERY REWARD
function reward(){

  let rewards = [
    "💠 +200 Points!",
    "🔥 Speed Boost Activated!",
    "⚡ Double Points Next Round!",
    "🎯 Accuracy Bonus!",
    "🏆 Secret Badge Unlocked!"
  ];

  let r = rewards[Math.floor(Math.random()*rewards.length)];

  document.getElementById("rewardMsg").innerText = r;

  document.getElementById("rewardBtn").style.display = "none";
}

</script>

</body>
</html>
