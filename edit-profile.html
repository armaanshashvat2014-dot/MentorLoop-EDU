<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Avatar Builder | MentorLoop EDU</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* CONTAINER */
.container{
background:#0f172a;
padding:25px;
border-radius:18px;
width:95%;
max-width:520px;
box-shadow:0 0 50px rgba(34,211,238,.3);
text-align:center;
}

/* TITLE */
h1{
color:#22d3ee;
}

/* AVATAR CARD */
.avatar-card{
background:#020617;
padding:20px;
border-radius:16px;
margin:20px 0;
box-shadow:0 0 30px rgba(34,211,238,.2);
}

/* AVATAR */
.avatar{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
line-height:1;
}

/* PARTS */
.avatar div{
margin:0;
padding:0;
}

/* CONTROLS */
.part{
margin-top:15px;
}

button{
margin:4px;
padding:8px 10px;
border:none;
border-radius:8px;
background:#1e293b;
color:white;
cursor:pointer;
}

button:hover{
background:#22d3ee;
color:#020617;
}

/* COLORS */
.color-box{
display:inline-block;
width:25px;
height:25px;
margin:5px;
border-radius:6px;
cursor:pointer;
border:2px solid transparent;
}

.color-box:hover{
border:2px solid #22d3ee;
}

/* SAVE */
.save{
margin-top:20px;
background:#22d3ee;
color:black;
width:100%;
padding:12px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>🧑 Avatar Builder</h1>

<div class="avatar-card">
  <div class="avatar" id="avatarPreview"></div>
</div>

<!-- HEAD -->
<div class="part">
<b>Head</b><br>
<button onclick="setPart('head','😀')">😀</button>
<button onclick="setPart('head','😎')">😎</button>
<button onclick="setPart('head','🤓')">🤓</button>
<button onclick="setPart('head','😄')">😄</button>
<button onclick="setPart('head','😃')">😃</button>
<button onclick="setPart('head','🙂')">🙂</button>
<button onclick="setPart('head','😆')">😆</button>
<button onclick="setPart('head','😜')">😜</button>
<button onclick="setPart('head','😇')">😇</button>
</div>

<!-- SHIRT -->
<div class="part">
<b>Shirt</b><br>
<button onclick="setPart('shirt','👕')">👕</button>
<button onclick="setPart('shirt','👚')">👚</button>
<button onclick="setPart('shirt','👔')">👔</button>
<button onclick="setPart('shirt','🧥')">🧥</button>
<button onclick="setPart('shirt','🥼')">🥼</button>
<button onclick="setPart('shirt','👘')">👘</button>
<button onclick="setPart('shirt','🦺')">🦺</button>
<button onclick="setPart('shirt','🧢')">🧢</button>
<button onclick="setPart('shirt','🎽')">🎽</button>
</div>

<!-- LEGS -->
<div class="part">
<b>Legs</b><br>
<button onclick="setPart('legs','👖')">👖</button>
<button onclick="setPart('legs','🩳')">🩳</button>
<button onclick="setPart('legs','👟')">👟</button>
<button onclick="setPart('legs','🥾')">🥾</button>
<button onclick="setPart('legs','🥿')">🥿</button>
<button onclick="setPart('legs','👢')">👢</button>
<button onclick="setPart('legs','🩰')">🩰</button>
<button onclick="setPart('legs','🧦')">🧦</button>
<button onclick="setPart('legs','👠')">👠</button>
</div>

<button class="save" onclick="saveAvatar()">Save Avatar</button>

</div>

<script>

let avatar={
head:"😀",
shirt:"👕",
legs:"👖",
color:"white"
};

if(localStorage.getItem("ml_avatar")){
avatar=JSON.parse(localStorage.getItem("ml_avatar"));
}

function setPart(part,value){
avatar[part]=value;
render();
}

function setColor(color){
avatar.color=color;
render();
}

function render(){
document.getElementById("avatarPreview").innerHTML=
`<div style="font-size:38px">${avatar.head}</div>
<div style="font-size:52px; margin-top:-8px; color:${avatar.color}">${avatar.shirt}</div>
<div style="font-size:38px; margin-top:-8px">${avatar.legs}</div>`;
}

function saveAvatar(){
localStorage.setItem("ml_avatar",JSON.stringify(avatar));
alert("Avatar saved!");
}

render();

</script>

</body>
</html>
