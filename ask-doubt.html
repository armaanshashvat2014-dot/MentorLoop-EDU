<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MentorLoop EDU</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
}

.hero-box {
  max-width: 500px;
  width: 100%;
}

h1 {
  font-size: 40px;
  background: linear-gradient(90deg, #22d3ee, #10b981);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  color: #94a3b8;
  margin-bottom: 25px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 30px;
  border-radius: 20px;
  backdrop-filter: blur(20px);
}

button {
  width: 100%;
  padding: 13px;
  border-radius: 12px;
  border: none;
  margin-top: 10px;
  font-weight: 600;
  cursor: pointer;
}

.login-btn {
  background: linear-gradient(90deg, #22d3ee, #10b981);
  color: white;
}

button:hover {
  transform: scale(1.03);
  transition: 0.2s;
}

.portal {
  display: block;
  margin: 10px 0;
  padding: 14px;
  border-radius: 12px;
  background: rgba(255,255,255,0.08);
  text-decoration: none;
  color: white;
}
</style>

</head>

<body>

<div class="hero">

  <div class="hero-box">

    <h1>🚀 MentorLoop EDU</h1>
    <p class="subtitle">AI Learning Platform</p>

    <!-- LOGIN -->
    <div class="card" id="loginBox">
      <button class="login-btn" onclick="loginWithGoogle()">
        🔐 Continue with Google
      </button>
    </div>

    <!-- APP -->
    <div id="appBox" style="display:none; margin-top:20px;">
      <h3 id="welcomeText"></h3>

      <a href="dashboard-v2.html" class="portal">📊 Dashboard</a>
      <a href="games.html" class="portal">🎮 Quizzes</a>
      <a href="teacher.html" class="portal">🧑‍🏫 Teacher Zone</a>
      <a href="profile.html" class="portal">👤 Profile</a>

      <button onclick="logout()">Logout</button>
    </div>

  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  signInWithRedirect,
  getRedirectResult,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";


// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyBOP356DMuNyWQyHDbksw0i_dWXfXsbQvI",
  authDomain: "mentorloop-55a37.firebaseapp.com",
  projectId: "mentorloop-55a37",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();


// ================= PUBLIC ID SYSTEM =================
function generateUserId() {
  return "user_" + Math.random().toString(36).substring(2, 10);
}

async function getOrCreatePublicId(user) {

  const ref = doc(db, "user_map", user.uid);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    return snap.data().publicId;
  }

  const newId = generateUserId();

  await setDoc(ref, {
    authUID: user.uid,
    publicId: newId
  });

  return newId;
}


// ================= HANDLE USER =================
async function handleUser(user) {

  const publicId = await getOrCreatePublicId(user);

  const userRef = doc(db, "users", publicId);
  const userSnap = await getDoc(userRef);

  if (!userSnap.exists()) {
    await setDoc(userRef, {
      name: user.displayName,
      email: user.email,
      photo: user.photoURL,
      authUID: user.uid,
      publicId: publicId,
      banned: false
    });
  }

  const lbRef = doc(db, "leaderboard", publicId);
  const lbSnap = await getDoc(lbRef);

  if (!lbSnap.exists()) {
    await setDoc(lbRef, {
      name: user.displayName,
      photo: user.photoURL,
      points: 0,
      banned: false,
      publicId: publicId
    });
  }

  return publicId;
}


// ================= START APP =================
function startApp(name, publicId) {

  document.getElementById("loginBox").style.display = "none";
  document.getElementById("appBox").style.display = "block";

  document.getElementById("welcomeText").innerHTML =
    `Welcome, ${name}<br><small style="opacity:0.7">ID: ${publicId}</small>`;
}


// ================= LOGIN =================
window.loginWithGoogle = async function () {

  try {
    const result = await signInWithPopup(auth, provider);

    const pid = await handleUser(result.user);
    startApp(result.user.displayName, pid);

  } catch (err) {
    console.warn("Popup failed → redirect login", err);
    await signInWithRedirect(auth, provider);
  }
};


// ================= REDIRECT RESULT =================
getRedirectResult(auth).then(async (result) => {

  if (result?.user) {
    const pid = await handleUser(result.user);
    startApp(result.user.displayName, pid);
  }

});


// ================= AUTO LOGIN =================
onAuthStateChanged(auth, async (user) => {

  if (!user) return;

  const pid = await handleUser(user);
  startApp(user.displayName, pid);
});


// ================= LOGOUT =================
window.logout = async function () {
  await signOut(auth);
  location.reload();
};

</script>

</body>
</html>
