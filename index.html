<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MentorLoop EDU</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  color: white;
}

/* PARTICLE CANVAS */
canvas {
  position: absolute;
  top: 0;
  left: 0;
}

/* CENTER */
.center-box {
  position: relative;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* MAIN CARD */
.portal-box {
  background: rgba(255,255,255,0.06);
  padding: 60px 50px;
  border-radius: 25px;
  backdrop-filter: blur(20px);
  box-shadow: 0 0 60px rgba(0,0,0,0.5);
  width: 520px;
  max-width: 90%;
  text-align: center;
  transition: 0.3s;
}

.portal-box:hover {
  transform: scale(1.01);
}

/* LOGO */
.logo {
  width: 120px;
  margin-bottom: 10px;
}

/* TEXT */
h2 {
  font-size: 32px;
  margin: 5px 0;
}

h4 {
  margin-bottom: 25px;
  color: #cbd5f5;
  font-weight: 300;
}

/* INPUTS */
input, select {
  width: 95%;
  padding: 13px;
  margin: 10px 0;
  border-radius: 12px;
  border: none;
  outline: none;
  font-size: 15px;
}

/* BUTTONS */
button {
  padding: 13px 20px;
  margin: 8px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 600;
  transition: 0.2s;
}

.login-btn {
  background: linear-gradient(90deg, #22c55e, #16a34a);
  color: white;
}

.guest-btn {
  background: linear-gradient(90deg, #facc15, #eab308);
}

button:hover {
  transform: scale(1.05);
  opacity: 0.9;
}

/* PORTAL LINKS */
.portal {
  display: block;
  margin: 10px 0;
  padding: 15px;
  background: rgba(255,255,255,0.12);
  border-radius: 14px;
  text-decoration: none;
  color: white;
  font-weight: 500;
  transition: 0.2s;
}

.portal:hover {
  background: rgba(255,255,255,0.25);
  transform: translateY(-2px);
}

/* WELCOME TEXT */
#welcomeText {
  margin-bottom: 15px;
}
</style>

</head>

<body>

<canvas id="bg"></canvas>

<div class="center-box">
  <div class="portal-box">

    <img src="logo.png" class="logo">

    <h2>🚀 MentorLoop EDU</h2>
    <h4>Learn smarter. Together.</h4>

    <!-- LOGIN -->
    <div id="loginBox">
      <input type="text" id="nameInput" placeholder="Enter your name">
      
      <select id="roleInput">
        <option>🎓 Student</option>
        <option>🧑‍🏫 Mentor</option>
      </select>

      <button class="login-btn" onclick="login()">Login & Save Progress</button>
      <button class="guest-btn" onclick="guestLogin()">Continue as Guest</button>
    </div>

    <!-- APP -->
    <div id="appBox" style="display:none;">
      <h3 id="welcomeText"></h3>

      <a href="https://mentorloop-edu-answer-and-question-4v4.caffeine.xyz/" class="portal">🧠 Ask Doubts</a>
      <a href="speed.html" class="portal">⚡ Speed Challenge</a>
      <a href="test.html" class="portal">🧪 IQ Tester</a>
      <a href="dashboard-v2.html" class="portal">📊 Dashboard</a>
      <a href="games.html" class="portal">🎮 Quizzes</a>
      <a href="teacher.html" class="portal">🧑‍🏫 Teacher Zone</a>
      <a href="profile.html" class="portal">👤 Profile</a>

      <button onclick="logout()">Logout</button>
    </div>

  </div>
</div>

<script>
// PARTICLES (same but smoother)
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2 + 1,
    dx: (Math.random() - 0.5) * 0.3,
    dy: (Math.random() - 0.5) * 0.3
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.x += p.dx;
    p.y += p.dy;

    if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.dy *= -1;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255,255,255,0.7)";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}
animate();

// LOGIN SYSTEM
function login() {
  let name = document.getElementById("nameInput").value;
  let role = document.getElementById("roleInput").value;

  if (!name) {
    alert("Enter your name!");
    return;
  }

  localStorage.setItem("ml_name", name);
  localStorage.setItem("ml_role", role);

  startApp(name, role);
}

function guestLogin() {
  startApp("Guest", "Visitor");
}

function startApp(name, role) {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("appBox").style.display = "block";

  document.getElementById("welcomeText").innerText =
    `Welcome, ${name} (${role})`;
}

function logout() {
  localStorage.clear();
  location.reload();
}

window.onload = function () {
  let name = localStorage.getItem("ml_name");
  let role = localStorage.getItem("ml_role");

  if (name && role) {
    startApp(name, role);
  }
};
</script>

</body>
</html>
