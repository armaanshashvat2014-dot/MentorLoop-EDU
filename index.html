<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MentorLoop EDU</title>

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: Arial, sans-serif;
  overflow: hidden;
  background: linear-gradient(135deg, #1e3a8a, #2563eb);
  color: white;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
  z-index: 0;
}

.center-box {
  position: relative;
  z-index: 1;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.portal-box {
  background: rgba(255,255,255,0.08);
  padding: 40px;
  border-radius: 20px;
  backdrop-filter: blur(15px);
  box-shadow: 0 0 40px rgba(0,0,0,0.3);
  width: 320px;
}

.logo {
  width: 110px;
  margin-bottom: 10px;
}

input, select {
  width: 90%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px 20px;
  margin: 8px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

.login-btn {
  background: #22c55e;
  color: white;
}

.guest-btn {
  background: #facc15;
}

.portal {
  display: block;
  margin: 10px 0;
  padding: 12px;
  background: rgba(255,255,255,0.15);
  border-radius: 10px;
  text-decoration: none;
  color: white;
  font-weight: bold;
}
</style>

</head>

<body>

<canvas id="bg"></canvas>

<div class="center-box">
  <div class="portal-box">

    <img src="logo.png" class="logo">

    <h2>MentorLoop EDU</h2>
    <h4>Together, we get smarter.</h4>

    <!-- LOGIN SECTION -->
    <div id="loginBox">
      <input type="text" id="nameInput" placeholder="Enter your name">
      
      <select id="roleInput">
        <option>Student</option>
        <option>Mentor</option>
      </select>

      <button class="login-btn" onclick="login()">Login & Save Progress</button>
      <button class="guest-btn" onclick="guestLogin()">Continue as Guest</button>
    </div>

    <!-- APP SECTION -->
    <div id="appBox" style="display:none;">
      <h3 id="welcomeText"></h3>

      <a href="dashboard-v2.html" class="portal">📚 Do more</a>
      <a href="https://mentorloop-edu-answer-and-question-4v4.caffeine.xyz/" class="portal">❓ Post a doubt</a>
      <a href="games.html" class="portal">🎲 Try quizzes</a>
      <a href="table.html" class="portal">📚 Why MentorLoop EDU</a>
      <a href="profile.html" class="portal">👤 Your profile</a>
      <a href="teacher.html" class="portal">👨‍🏫 Are you a teacher?</a>

      <button onclick="logout()">Logout</button>
    </div>

  </div>
</div>

<script>
// PARTICLES BACKGROUND
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 60; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 3 + 1,
    dx: (Math.random() - 0.5) * 0.5,
    dy: (Math.random() - 0.5) * 0.5
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.x += p.dx;
    p.y += p.dy;

    if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.dy *= -1;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = "white";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}
animate();

// LOGIN SYSTEM
function login() {
  let name = document.getElementById("nameInput").value;
  let role = document.getElementById("roleInput").value;

  if (!name) {
    alert("Enter your name!");
    return;
  }

  localStorage.setItem("ml_name", name);
  localStorage.setItem("ml_role", role);

  startApp(name, role);
}

function guestLogin() {
  startApp("Guest", "Visitor");
}

function startApp(name, role) {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("appBox").style.display = "block";

  document.getElementById("welcomeText").innerText =
    "Welcome, " + name + " (" + role + ")";
}

function logout() {
  localStorage.clear();
  location.reload();
}

// AUTO LOGIN
window.onload = function () {
  let name = localStorage.getItem("ml_name");
  let role = localStorage.getItem("ml_role");

  if (name && role) {
    startApp(name, role);
  }
};
</script>

</body>
</html>
