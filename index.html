<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google-site-verification" content="29be57dadb77a650" />
<title>MentorLoop EDU</title>
<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 30px;
  border-radius: 20px;
  text-align: center;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
  cursor: pointer;
}

.login-btn {
  background: linear-gradient(90deg,#22d3ee,#10b981);
  color: white;
}

.portal {
  display:block;
  margin:10px 0;
  padding:12px;
  background: rgba(255,255,255,0.08);
  border-radius:10px;
  text-decoration:none;
  color:white;
}
</style>

</head>

<body>

<div class="hero">
  <div>

    <h1>🚀 MentorLoop EDU</h1>

    <div class="card" id="loginBox">
      <button class="login-btn" onclick="loginWithGoogle()">
        🔐 Continue with Google
      </button>
    </div>

    <div id="appBox" style="display:none;">
      <h3 id="welcomeText"></h3>

      <a href="dashboard-v2.html" class="portal">Dashboard</a>
      <a href="games.html" class="portal">Quizzes</a>
      <a href="profile.html" class="portal">Profile</a>
      <a href="teacher.html" class="portal">Teacher Zone</a>
      <a href="https://mentorloop-edu-answer-and-question-4v4.caffeine.xyz" class="portal">Ask doubts</a>

      <button onclick="logout()">Logout</button>
    </div>

  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  signInWithRedirect,
  getRedirectResult,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";


// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyBOP356DMuNyWQyHDbksw0i_dWXfXsbQvI",
  authDomain: "mentorloop-55a37.firebaseapp.com",
  projectId: "mentorloop-55a37",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();


// ================= PUBLIC ID =================
function generateUserId() {
  return "user_" + Math.random().toString(36).substring(2, 10);
}

async function getOrCreatePublicId(user) {
  const ref = doc(db, "user_map", user.uid);
  const snap = await getDoc(ref);

  if (snap.exists()) return snap.data().publicId;

  const newId = generateUserId();

  await setDoc(ref, {
    authUID: user.uid,
    publicId: newId
  });

  return newId;
}


// ================= BAN CHECK =================
async function checkBan(publicId) {

  const snap = await getDoc(doc(db, "leaderboard", publicId));

  if (snap.exists() && snap.data().banned === true) {

    document.body.innerHTML = `
      <div style="display:flex;justify-content:center;align-items:center;height:100vh;">
        <div>
          <h1>🚫 BANNED</h1>
          <p>Your account is banned</p>
          <p>ID: ${publicId}</p>
        </div>
      </div>
    `;

    return true;
  }

  return false;
}


// ================= REAL-TIME BAN =================
function watchBan(publicId) {

  const ref = doc(db, "leaderboard", publicId);

  onSnapshot(ref, (snap) => {

    if (snap.exists() && snap.data().banned === true) {

      document.body.innerHTML = `
        <div style="display:flex;justify-content:center;align-items:center;height:100vh;">
          <div>
            <h1>🚫 BANNED (LIVE)</h1>
            <p>ID: ${publicId}</p>
          </div>
        </div>
      `;
    }

  });
}


// ================= HANDLE USER =================
async function handleUser(user) {

  const publicId = await getOrCreatePublicId(user);

  // USERS
  await setDoc(doc(db, "users", publicId), {
    name: user.displayName,
    email: user.email,
    publicId: publicId
  }, { merge: true });

  // LEADERBOARD (SAFE)
  const lbRef = doc(db, "leaderboard", publicId);
  const lbSnap = await getDoc(lbRef);

  if (!lbSnap.exists()) {
    await setDoc(lbRef, {
      name: user.displayName,
      points: 0,
      banned: false,
      publicId: publicId
    });
  } else {
    await setDoc(lbRef, {
      name: user.displayName
    }, { merge: true });
  }

  return publicId;
}


// ================= START APP =================
async function startApp(name, publicId) {

  if (await checkBan(publicId)) return;

  watchBan(publicId);

  document.getElementById("loginBox").style.display = "none";
  document.getElementById("appBox").style.display = "block";

  document.getElementById("welcomeText").innerHTML =
    `Welcome, ${name}<br><small>ID: ${publicId}</small>`;
}


// ================= LOGIN =================
window.loginWithGoogle = async function () {

  try {
    const result = await signInWithPopup(auth, provider);

    const pid = await handleUser(result.user);

    startApp(result.user.displayName, pid);

  } catch (err) {
    console.error("LOGIN ERROR:", err);
    alert(err.message);

    // fallback (mobile / popup blocked)
    await signInWithRedirect(auth, provider);
  }

};


// ================= REDIRECT =================
getRedirectResult(auth).then(async (result) => {

  if (result?.user) {
    const pid = await handleUser(result.user);
    startApp(result.user.displayName, pid);
  }

});


// ================= AUTO LOGIN =================
onAuthStateChanged(auth, async (user) => {

  if (!user) return;

  const pid = await handleUser(user);
  startApp(user.displayName, pid);
});


// ================= LOGOUT =================
window.logout = async function () {
  await signOut(auth);
  location.reload();
};

</script>

</body>
</html>
