<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MentorLoop EDU</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
}

.hero-box {
  max-width: 500px;
  width: 100%;
}

/* TITLE */
h1 {
  font-size: 40px;
  margin-bottom: 10px;
  background: linear-gradient(90deg, #22d3ee, #10b981);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  color: #94a3b8;
  margin-bottom: 30px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  padding: 30px;
  border-radius: 20px;
  backdrop-filter: blur(20px);
  box-shadow: 0 15px 50px rgba(0,0,0,0.6);
}

/* INPUTS */
input, select {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 12px;
  border: none;
  background: #020617;
  color: white;
}

/* BUTTONS */
button {
  width: 100%;
  padding: 13px;
  border-radius: 12px;
  border: none;
  margin-top: 10px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

.login-btn {
  background: linear-gradient(90deg, #22d3ee, #10b981);
  color: white;
}

.guest-btn {
  background: #1e293b;
  color: #94a3b8;
}

button:hover {
  transform: scale(1.03);
}

/* FEATURES */
.features {
  margin-top: 20px;
  font-size: 13px;
  color: #64748b;
}

/* APP LINKS */
.portal {
  display: block;
  margin: 10px 0;
  padding: 14px;
  border-radius: 12px;
  background: rgba(255,255,255,0.08);
  text-decoration: none;
  color: white;
  transition: 0.2s;
}

.portal:hover {
  background: rgba(255,255,255,0.2);
}

/* ANIMATION */
.hero-box {
  animation: fadeUp 0.7s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>

</head>

<body>

<div class="hero">
  <div class="hero-box">

    <h1>🚀 MentorLoop EDU</h1>
    <p class="subtitle">AI-powered learning system for students</p>

    <!-- LOGIN -->
    <div class="card" id="loginBox">

      <input type="text" id="nameInput" placeholder="Enter your name(Do not use 'Armaan' or 'MentorLoop EDU'">

      <select id="roleInput">
        <option>🎓 Student</option>
        <option>🧑‍🏫 Mentor</option>
      </select>

      <button class="login-btn" onclick="login()">Login & Continue</button>
      <button class="guest-btn" onclick="guestLogin()">Continue as Guest</button>

      <div class="features">
        ✔ Smart quizzes  
        ✔ AI learning  
        ✔ Track progress 
        ✔ Student-friendly
        ✔ Teacher-friendly
      </div>
    </div>

    <!-- APP -->
    <div id="appBox" style="display:none; margin-top:20px;">
      <h3 id="welcomeText"></h3>

      <a href="dashboard-v2.html" class="portal">📊 Dashboard</a>
      <a href="games.html" class="portal">🎮 Quizzes</a>
      <a href="teacher.html" class="portal">🧑‍🏫 Teacher Zone</a>
      <a href="profile.html" class="portal">👤 Profile</a>
      <a href="speed.html" class="portal">Try your speed</a>
     <a href="test.html" class="portal">Test IQ</a>
      <a href="profile.html" class="portal">Look at your profile</a>
      <button onclick="logout()">Logout</button>
    </div>

  </div>
</div>

<script>
function login() {
  let name = document.getElementById("nameInput").value;
  let role = document.getElementById("roleInput").value;

  if (!name) {
    alert("Enter your name!");
    return;
  }

  localStorage.setItem("ml_name", name);
  localStorage.setItem("ml_role", role);

  startApp(name, role);
}

function guestLogin() {
  startApp("Guest", "Visitor");
}

function startApp(name, role) {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("appBox").style.display = "block";

  document.getElementById("welcomeText").innerText =
    `Welcome, ${name} (${role})`;
}

function logout() {
  localStorage.clear();
  location.reload();
}

window.onload = function () {
  let name = localStorage.getItem("ml_name");
  let role = localStorage.getItem("ml_role");

  if (name && role) {
    startApp(name, role);
  }
};
</script>

</body>
</html>
