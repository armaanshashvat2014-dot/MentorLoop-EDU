<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MentorLoop EDU</title>

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: Arial;
  background: linear-gradient(135deg, #1e3a8a, #2563eb);
  color: white;
}

.center-box {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.portal-box {
  background: rgba(255,255,255,0.08);
  padding: 50px;
  border-radius: 20px;
  width: 420px;
  text-align: center;
}

.logo {
  width: 120px;
  margin-bottom: 10px;
}

input, select {
  width: 90%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.signup { background: #22c55e; color: white; }
.login { background: #3b82f6; color: white; }
.guest { background: #facc15; }

.profile-btn {
  width: 100%;
  margin: 5px 0;
  background: rgba(255,255,255,0.2);
  color: white;
}

</style>

</head>

<body>

<div class="center-box">
  <div class="portal-box">

    <!-- LOGO -->
    <img src="logo.png" class="logo">

    <h2>MentorLoop EDU</h2>

    <!-- AUTH -->
    <div id="authBox">
      <input type="text" id="nameInput" placeholder="Username">
      <input type="password" id="passInput" placeholder="Password">

      <button class="signup" onclick="signup()">Sign Up</button>
      <button class="login" onclick="login()">Login</button>
      <button class="guest" onclick="guestLogin()">Guest</button>

      <h3>Profiles</h3>
      <div id="profilesList"></div>
    </div>

    <!-- APP -->
    <div id="appBox" style="display:none;">
      <h3 id="welcomeText"></h3>
      <button onclick="window.location.href='https://mentorloop-edu-answer-and-question-4v4.caffeine.xyz/'">Ask doubts</button>
      <button onclick="window.location.href='games.html'">Try quizzes</button>
      <button onclick="window.location.href='dashboard-v2.html'">See your dashboard</button>
      <button onclick="window.location.href='profile.html'">See your profile</button>
       <button onclick="window.location.href='teacher.html'">Teacher Zone</button>
      <button onclick="window.location.href='speed.html'">Compare speed</button>
      <button onclick="window.location.href='test.html'">Compare IQ</button>
      <button onclick="logout()">Logout</button>
    </div>

  </div>
</div>

<script>

// STORAGE
function getUsers() {
  return JSON.parse(localStorage.getItem("ml_users") || "[]");
}

function saveUsers(users) {
  localStorage.setItem("ml_users", JSON.stringify(users));
}

// SIGN UP
function signup() {
  let name = document.getElementById("nameInput").value.trim();
  let pass = document.getElementById("passInput").value;

  if (!name || !pass) {
    alert("Fill all fields!");
    return;
  }

  let users = getUsers();

  if (users.find(u => u.name === name)) {
    alert("Username already exists!");
    return;
  }

  users.push({
    name: name,
    password: pass,
    points: 0
  });

  saveUsers(users);

  alert("Account created! Now login.");
  loadProfiles();
}

// LOGIN
function login() {
  let name = document.getElementById("nameInput").value.trim();
  let pass = document.getElementById("passInput").value;

  let users = getUsers();
  let user = users.find(u => u.name === name && u.password === pass);

  if (!user) {
    alert("Wrong username or password!");
    return;
  }

  localStorage.setItem("ml_current_user", name);
  startApp();
}

// PROFILE LIST
function loadProfiles() {
  let users = getUsers();
  let container = document.getElementById("profilesList");

  container.innerHTML = "";

  users.forEach(u => {
    let btn = document.createElement("button");
    btn.className = "profile-btn";
    btn.innerText = u.name + " (" + u.points + " pts)";
    btn.onclick = () => {
      alert("Use login with password for security.");
    };
    container.appendChild(btn);
  });
}

// START APP
function startApp() {
  let name = localStorage.getItem("ml_current_user");
  let users = getUsers();
  let user = users.find(u => u.name === name);

  if (!user) return;

  document.getElementById("authBox").style.display = "none";
  document.getElementById("appBox").style.display = "block";

  document.getElementById("welcomeText").innerText =
    "Welcome, " + user.name;

  updatePoints(user.points);
}

// POINTS
function updatePoints(points) {
  document.getElementById("pointsText").innerText = "Points: " + points;
}

function addPoints(amount) {
  let name = localStorage.getItem("ml_current_user");
  let users = getUsers();

  let user = users.find(u => u.name === name);
  if (!user) return;

  user.points += amount;

  saveUsers(users);
  updatePoints(user.points);
  loadProfiles();
}

// LOGOUT
function logout() {
  localStorage.removeItem("ml_current_user");
  location.reload();
}

// GUEST
function guestLogin() {
  document.getElementById("authBox").style.display = "none";
  document.getElementById("appBox").style.display = "block";

  document.getElementById("welcomeText").innerText = "Guest Mode";
  updatePoints(0);
}

// INIT
window.onload = function () {
  loadProfiles();

  let current = localStorage.getItem("ml_current_user");
  if (current) startApp();
};

</script>

</body>
</html>
