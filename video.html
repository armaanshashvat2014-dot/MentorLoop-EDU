<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MentorLoop EDU | Knowledge AI</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#020617;
  color:#e2e8f0;
}

header{
  text-align:center;
  padding:15px;
  font-size:24px;
  border-bottom:1px solid #1e293b;
}

input{
  padding:10px;
  width:60%;
  border:none;
  border-radius:10px;
  margin:5px;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  cursor:pointer;
}

.section{
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:15px;
}

.card{
  background:#020617;
  border:1px solid #1e293b;
  padding:10px;
  border-radius:12px;
}

iframe{
  width:100%;
  height:200px;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<header>🧠 MentorLoop EDU - All-Rounder</header>

<!-- 🧠 AI SECTION -->
<div class="section">
  <input id="query" placeholder="Ask anything (science, math, history)">
  <button onclick="askAI()">Ask</button>
  <p id="answer"></p>
</div>

<!-- 🧮 MATH -->
<div class="section">
  <h2>🧮 Math Solver</h2>
  <input id="mathInput" placeholder="e.g. 2+3*4">
  <button onclick="solveMath()">Solve</button>
  <p id="mathOutput"></p>
</div>

<!-- 🎥 VIDEOS -->
<div class="section">
  <h2>🎥 Educational Videos</h2>
  <input id="videoSearch" placeholder="Search topic (math, physics...)">
  <button onclick="searchVideos()">Search</button>
  <div class="grid" id="videos"></div>
</div>

<script>

// 🧠 Wikipedia AI
async function askAI(){
  let q = document.getElementById("query").value;
  document.getElementById("answer").innerText = "Thinking...";

  try{
    let res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`);
    let data = await res.json();

    if(data.extract){
      document.getElementById("answer").innerText = "📘 " + data.extract;
    } else {
      document.getElementById("answer").innerText = "No info found.";
    }

  } catch {
    document.getElementById("answer").innerText = "Error fetching data.";
  }
}

// 🧮 Math Solver
function solveMath(){
  let expr = document.getElementById("mathInput").value;

  try{
    let result = Function('"use strict"; return (' + expr + ')')();
    document.getElementById("mathOutput").innerText = "Answer: " + result;
  } catch {
    document.getElementById("mathOutput").innerText = "Invalid expression";
  }
}

// 🎥 FIXED VIDEO SEARCH (WORKING)
function searchVideos(){
  let q = document.getElementById("videoSearch").value;
  let container = document.getElementById("videos");

  container.innerHTML = "";

  for(let i=0;i<6;i++){
    let card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <iframe src="https://www.youtube.com/embed?listType=search&list=${encodeURIComponent(q)} tutorial education"></iframe>
      <p>📘 ${q} - Educational Video</p>
    `;

    container.appendChild(card);
  }
}

</script>

</body>
</html>
