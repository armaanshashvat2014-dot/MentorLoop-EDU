<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Random Facts | MentorLoop EDU</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:40px 20px;
}

.page-title{
font-size:2.5rem;
margin-bottom:40px;
background:linear-gradient(90deg,#22d3ee,#10b981);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.grid{
max-width:900px;
width:100%;
display:grid;
gap:25px;
}

.fact-card{
background:#1e293b;
padding:40px;
border-radius:20px;
box-shadow:0 20px 45px rgba(0,0,0,0.6);
transition:0.35s;
}

.fact-card:hover{
transform:translateY(-8px) scale(1.02);
box-shadow:0 30px 70px rgba(0,0,0,0.8);
}

.fact-card h1{
font-size:1.7rem;
font-weight:900;
line-height:1.5;
}

</style>
</head>

<body>

<h2 class="page-title">✨ Random Facts</h2>

<div class="grid" id="factsContainer"></div>

<script>

const facts = [

"Octopuses have three hearts and blue blood.",
"Honey never spoils and can last thousands of years.",
"Bananas are technically berries.",
"The Eiffel Tower grows taller in summer due to heat expansion.",
"Your brain uses about 20% of your body's energy.",
"Sharks existed before trees.",
"A day on Venus is longer than a year on Venus.",
"Wombats produce cube-shaped poop.",
"Some turtles can breathe through their butts.",
"Saturn could float in water because it is mostly gas.",
"Lightning is five times hotter than the surface of the sun.",
"Humans share about 60% of their DNA with bananas.",
  "Einstein had 198 IQ."

];

function getRandomFacts(){

const shuffled = facts.sort(() => 0.5 - Math.random());
return shuffled.slice(0,5);

}

const selectedFacts = getRandomFacts();
const container = document.getElementById("factsContainer");

selectedFacts.forEach(fact => {

const card = document.createElement("div");
card.className = "fact-card";

card.innerHTML = `<h1><b>${fact}</b></h1>`;

container.appendChild(card);

});

</script>

</body>
</html>
