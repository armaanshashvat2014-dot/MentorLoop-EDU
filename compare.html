<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MentorLoop | Compare</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:#e2e8f0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.card {
  background:#0f172a;
  padding:25px;
  border-radius:20px;
  width:400px;
  text-align:center;
}
.highlight { color:#38bdf8; font-weight:bold; }
</style>
</head>

<body>

<div class="card">
  <h1>📊 Performance Compare</h1>

  <div id="yourTime"></div>
  <div id="leaderboard"></div>
  <div id="selfStats"></div>
</div>

<script>

let userTime = parseFloat(localStorage.getItem("ml_latest_time"));

document.getElementById("yourTime").innerHTML =
  `⏱ Your Time: <span class="highlight">${userTime.toFixed(2)}s</span><br><br>`;

// GLOBAL LEADERBOARD
function generateGlobalLeaderboard() {
  let seed = new Date().toDateString().length;
  let list = [];

  for (let i = 0; i < 10; i++) {
    seed = (seed * 9301 + 49297) % 233280;
    let time = 5 + (seed % 100) / 10;
    list.push(time);
  }

  list.sort((a,b)=>a-b);
  return list;
}

let global = generateGlobalLeaderboard();

let html = "<b>🌍 Top 10 Today:</b><br>";

global.forEach((t,i)=>{
  html += `${i+1}. ${t.toFixed(1)}s<br>`;
});

let rank = global.filter(t => t < userTime).length + 1;

html += `<br>🔥 Your Rank: <span class="highlight">#${rank}</span><br><br>`;

document.getElementById("leaderboard").innerHTML = html;

// SELF COMPARISON
let best = parseFloat(localStorage.getItem("ml_best_time"));

if (!best || userTime < best) {
  localStorage.setItem("ml_best_time", userTime);
  best = userTime;
}

let yesterday = new Date();
yesterday.setDate(yesterday.getDate()-1);

let yesterdayTime = parseFloat(
  localStorage.getItem("ml_time_" + yesterday.toDateString())
);

// save today
localStorage.setItem("ml_time_" + new Date().toDateString(), userTime);

let selfHTML = `🏆 Best: <span class="highlight">${best.toFixed(2)}s</span><br>`;

if (yesterdayTime) {
  let diff = (yesterdayTime - userTime).toFixed(2);

  if (diff > 0) {
    selfHTML += `📈 Faster than yesterday by ${diff}s`;
  } else {
    selfHTML += `📉 Slower than yesterday by ${Math.abs(diff)}s`;
  }
}

document.getElementById("selfStats").innerHTML = selfHTML;

</script>

</body>
</html>
