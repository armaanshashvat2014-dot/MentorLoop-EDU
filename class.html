// QUIZ LOGIC (same as before)
let quiz=[],i=0,correct=0;

function startQuiz(){
  let grade=document.getElementById("grade").value;
  let count=parseInt(document.getElementById("count").value);

  let selected=[];
  document.querySelectorAll('#subjects input:checked').forEach(cb=>{
    selected.push(cb.value);
  });

  if(selected.length===0){
    alert("Select at least one subject!");
    return;
  }

  let arr=[];
  selected.forEach(sub=>{
    arr=arr.concat(bank[grade][sub]||[]);
  });

  quiz=arr.sort(()=>0.5-Math.random()).slice(0,count);

  document.getElementById("setup").style.display="none";
  document.getElementById("quizArea").style.display="block";

  i=0;
  correct=0;
  loadQ();
}

function loadQ(){
  document.getElementById("q").innerText=`Q${i+1}: ${quiz[i].q}`;
  let html="";
  quiz[i].o.forEach(opt=>{
    html+=`<div class="option" onclick="check('${opt}')">${opt}</div>`;
  });
  document.getElementById("opts").innerHTML=html;
}

function check(ans){
  if(ans===quiz[i].a) correct++;
  i++;
  if(i<quiz.length) loadQ();
  else finish();
}

function finish(){
  let score=Math.round((correct/quiz.length)*100);
  document.getElementById("quizArea").style.display="none";
  document.getElementById("result").innerHTML=`🏆 Accuracy: ${score}%`;
}
