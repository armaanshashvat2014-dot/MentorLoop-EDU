<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Badge System</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:transparent;
}

/* Popup animation */

@keyframes slideIn{
from{
transform:translateX(120px);
opacity:0;
}
to{
transform:translateX(0);
opacity:1;
}
}

/* Badge popup box */

.badgePopup{
position:fixed;
bottom:25px;
right:25px;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
padding:20px;
border-radius:14px;
width:200px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
animation:slideIn .5s ease;
z-index:9999;
text-align:center;
border:2px solid #10b981;
}

/* Badge icon */

.badgeIcon{
font-size:32px;
margin-bottom:6px;
}

/* Title */

.badgeTitle{
font-weight:bold;
font-size:16px;
margin-bottom:4px;
color:#22d3ee;
}

/* Badge name */

.badgeName{
font-size:15px;
}

</style>

</head>

<body>

<script>

function showBadge(badge){

let popup=document.createElement("div");
popup.className="badgePopup";

popup.innerHTML=`
<div class="badgeIcon">${badge.icon}</div>
<div class="badgeTitle">Badge Unlocked</div>
<div class="badgeName">${badge.name}</div>
`;

document.body.appendChild(popup);

setTimeout(()=>{
popup.remove();
},4000);

}

function checkBadges(){

let streak=parseInt(localStorage.getItem("ml_streak")||0);
let points=parseInt(localStorage.getItem("ml_points")||0);

let badges=[

{name:"Getting Started",req:1,type:"streak",icon:"🔥"},
{name:"On Fire",req:5,type:"streak",icon:"🔥🔥"},
{name:"Unstoppable",req:10,type:"streak",icon:"🚀"},
{name:"Legend Streak",req:30,type:"streak",icon:"🌋"},

{name:"Point Collector",req:50,type:"points",icon:"⭐"},
{name:"Achiever",req:150,type:"points",icon:"🏅"},
{name:"Champion",req:300,type:"points",icon:"🏆"},
{name:"Elite Learner",req:600,type:"points",icon:"👑"}

];

let unlocked=JSON.parse(localStorage.getItem("ml_badges")||"[]");

badges.forEach(b=>{

let earned=false;

if(b.type==="streak") earned=streak>=b.req;
if(b.type==="points") earned=points>=b.req;

if(earned && !unlocked.includes(b.name)){

unlocked.push(b.name);
localStorage.setItem("ml_badges",JSON.stringify(unlocked));

showBadge(b);

}

});

}

checkBadges();

</script>

</body>
</html>
