<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MentorLoop | Brain Score</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:#e2e8f0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card {
  background:#0f172a;
  padding:30px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 0 40px rgba(0,0,0,0.6);
  width:320px;
}

h1 {
  margin-bottom:10px;
}

.score-input {
  margin:20px 0;
}

input {
  padding:10px;
  border:none;
  border-radius:10px;
  width:80px;
  text-align:center;
  font-size:16px;
}

button {
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  color:#020617;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
  transition:0.3s;
}

button:hover {
  background:#0ea5e9;
}

.result {
  margin-top:20px;
  font-size:18px;
  font-weight:bold;
}

.small {
  font-size:12px;
  color:#94a3b8;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="card">
  <h1>🧠 Brain Score</h1>

  <div class="score-input">
    <p>Enter your score (out of 10)</p>
    <input type="number" id="score" min="0" max="10">
  </div>

  <button onclick="submitScore()">Submit</button>

  <div class="result" id="result"></div>

  <button onclick="shareResult()">📢 Share</button>

  <p class="small">Real stats based on users of this device</p>
</div>

<script>

// Save score
function saveScore(score) {
  let scores = JSON.parse(localStorage.getItem("ml_scores")) || [];
  scores.push(score);
  localStorage.setItem("ml_scores", JSON.stringify(scores));
}

// Get scores
function getScores() {
  return JSON.parse(localStorage.getItem("ml_scores")) || [];
}

// Calculate percentile
function calculatePercentile(userScore, allScores) {
  let lower = allScores.filter(score => score < userScore).length;
  let percentile = (lower / allScores.length) * 100;
  return Math.round(percentile);
}

// Main function
function submitScore() {
  let userScore = parseInt(document.getElementById("score").value);

  if (isNaN(userScore) || userScore < 0 || userScore > 10) {
    alert("Enter a valid score between 0 and 10");
    return;
  }

  saveScore(userScore);

  let allScores = getScores();

  let resultText = "";

  if (allScores.length < 10) {
    resultText = "⏳ Not enough data yet... keep going!";
  } else {
    let percentile = calculatePercentile(userScore, allScores);
    resultText = `🔥 You are smarter than ${percentile}% of users!`;
  }

  document.getElementById("result").innerText = resultText;
}

// Share function
function shareResult() {
  let text = document.getElementById("result").innerText;

  if (!text) {
    alert("Submit a score first!");
    return;
  }

  if (navigator.share) {
    navigator.share({
      title: "MentorLoop Brain Score",
      text: text + " 🚀 Try it yourself!",
      url: window.location.href
    });
  } else {
    navigator.clipboard.writeText(text);
    alert("Result copied! Share it 😎");
  }
}

</script>

</body>
</html>
