<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Answer & question</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f172a, #1e293b, #020617);
    }

    /* Anchor styled as button */
    .btn {
      text-decoration: none;
      padding: 18px 40px;
      font-size: 20px;
      color: white;
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      display: inline-block;
    }

    .btn::before {
      content: "";
      position: absolute;
      width: 300%;
      height: 300%;
      top: -100%;
      left: -100%;
      background: radial-gradient(circle, rgba(99,102,241,0.4), transparent 60%);
      transition: 0.5s;
    }

    .btn:hover::before {
      top: 0;
      left: 0;
    }

    .btn:hover {
      transform: scale(1.08);
      box-shadow: 0 12px 40px rgba(99,102,241,0.5);
    }

    .btn:active {
      transform: scale(0.95);
    }
  </style>
</head>

<body>

  <a href="https://mentorloop-edu-answer-and-question-4v4.caffeine.xyz/" class="btn">This leads you to answer and ask doubts</a>

</body>
</html>
