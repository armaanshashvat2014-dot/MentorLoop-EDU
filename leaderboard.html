<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MentorLoop Leaderboard</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #1e3a8a, #2563eb);
  color: white;
  text-align: center;
}

.container { padding: 20px; }

.card {
  margin: 10px auto;
  padding: 12px;
  width: 360px;
  border-radius: 12px;
  background: rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
}

.me { background: rgba(34,197,94,0.35); }

.top1 {
  box-shadow: 0 0 25px gold;
  animation: glow 1.5s infinite alternate;
}

@keyframes glow {
  from { box-shadow: 0 0 10px gold; }
  to { box-shadow: 0 0 30px gold; }
}

.avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  margin-right: 10px;
}

.info {
  text-align: left;
  flex: 1;
}

small { opacity: 0.8; }
</style>

</head>

<body>

<div class="container">

<h2>🌍 Live Leaderboard</h2>

<p id="you"></p>
<p id="insight"></p>
<p id="time"></p>

<div id="board"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  onSnapshot,
  collection,
  query,
  orderBy,
  limit
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBOP356DMuNyWQyHDbksw0i_dWXfXsbQvI",
  authDomain: "mentorloop-55a37.firebaseapp.com",
  projectId: "mentorloop-55a37"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);


// ================= HELPERS =================
function getWeek() {
  const d = new Date();
  const start = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil((((d - start) / 86400000) + start.getDay() + 1) / 7);
  return d.getFullYear() + "-W" + week;
}

function getRank(p) {
  if (p >= 300) return "💎 Diamond";
  if (p >= 150) return "🟡 Gold";
  if (p >= 50) return "⚪ Silver";
  return "🟫 Bronze";
}

function color(name) {
  const c = ["#f87171","#60a5fa","#34d399","#fbbf24","#a78bfa"];
  return c[(name?.charCodeAt(0) || 0) % c.length];
}


// ================= PUBLIC ID (user_xxx) =================
function generatePublicId() {
  return "user_" + Math.random().toString(36).substring(2, 10);
}


// ================= USER MAPPING =================
async function getOrCreatePublicId(user) {

  const mapRef = doc(db, "user_map", user.uid);
  const snap = await getDoc(mapRef);

  if (snap.exists()) {
    return snap.data().publicId;
  }

  const publicId = generatePublicId();

  await setDoc(mapRef, {
    authUID: user.uid,
    publicId: publicId
  });

  return publicId;
}


// ================= SYNC USER =================
async function syncUser(user) {
  if (!user) return null;

  const publicId = await getOrCreatePublicId(user);

  const lbRef = doc(db, "leaderboard", publicId);
  const snap = await getDoc(lbRef);

  const existingPoints = snap.exists() ? snap.data().points : 0;

  await setDoc(lbRef, {
    uid: user.uid,              // Firebase UID (hidden identity)
    publicId: publicId,        // user_xxx ID (public identity)
    name: user.displayName,
    photo: user.photoURL,
    points: existingPoints,
    week: getWeek(),
    banned: false
  }, { merge: true });

  return { publicId, user };
}


// ================= LEADERBOARD =================
function loadBoard(currentUser, publicId) {

  const board = document.getElementById("board");

  const q = query(
    collection(db, "leaderboard"),
    orderBy("points", "desc"),
    limit(50)
  );

  onSnapshot(q, (snap) => {

    board.innerHTML = "";

    const users = [];
    let myRank = null;

    snap.forEach(d => {
      const u = d.data();
      if (u.week === getWeek() && !u.banned) {
        users.push({ ...u });
      }
    });

    users.forEach((u, i) => {

      const div = document.createElement("div");
      div.className = "card";

      if (u.publicId === publicId) {
        div.classList.add("me");
        myRank = i + 1;
      }

      if (i === 0) div.classList.add("top1");

      div.innerHTML = `
        <img class="avatar" src="${u.photo || ''}">
        <div class="info">
          ${i===0?"👑🥇":i===1?"🥈":i===2?"🥉":""}
          #${i+1} ${u.name}
          <br>
          <small>${u.points} pts • ${getRank(u.points)}</small>
        </div>
      `;

      board.appendChild(div);
    });

    document.getElementById("you").innerText =
      `You: ${currentUser.displayName}`;

    if (myRank) {
      const percent = Math.round((1 - myRank / users.length) * 100);
      document.getElementById("insight").innerText =
        `Ahead of ${percent}% of students`;
    }

    document.getElementById("time").innerText =
      "Live: " + new Date().toLocaleTimeString();

  });
}


// ================= MAIN AUTH =================
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    document.body.innerHTML = "<h2>Please login first</h2>";
    return;
  }

  const result = await syncUser(user);

  loadBoard(user, result.publicId);

});

</script>

</body>
</html>
