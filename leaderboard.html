<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #1e3a8a, #2563eb);
  color: white;
  text-align: center;
}

.container {
  padding: 20px;
}

.card {
  margin: 10px auto;
  padding: 12px;
  width: 320px;
  border-radius: 10px;
  background: rgba(255,255,255,0.1);
}

.me {
  background: rgba(34,197,94,0.4);
  font-weight: bold;
}

.top1 { box-shadow: 0 0 15px gold; }
.top2 { box-shadow: 0 0 10px silver; }
.top3 { box-shadow: 0 0 10px #cd7f32; }

</style>
</head>

<body>

<div class="container">
<h2>🌍 Global Leaderboard</h2>
<p id="you"></p>
<div id="leaderboard"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  collection,
  query,
  orderBy,
  limit,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


// 🔥 YOUR CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBOP356DMuNyWQyHDbksw0i_dWXfXsbQvI",
  authDomain: "mentorloop-55a37.firebaseapp.com",
  projectId: "mentorloop-55a37"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


// 🧠 GET USER
function getUser() {
  return {
    name: localStorage.getItem("ml_name") || "Guest",
    points: parseInt(localStorage.getItem("ml_points")) || 0
  };
}


// 🔥 SYNC USER (ONLY IF HIGHER SCORE)
async function syncUser() {
  let user = getUser();
  const userRef = doc(db, "leaderboard", user.name);

  const snap = await getDoc(userRef);

  if (snap.exists()) {
    let oldPoints = snap.data().points || 0;

    if (user.points > oldPoints) {
      await setDoc(userRef, user);
    } else {
      user.points = oldPoints;
    }
  } else {
    await setDoc(userRef, user);
  }

  document.getElementById("you").innerText =
    "You: " + user.name + " — " + user.points + " pts";
}


// 🏆 LOAD TOP 20 LEADERBOARD
function loadLeaderboard() {
  const q = query(
    collection(db, "leaderboard"),
    orderBy("points", "desc"),
    limit(20) // 🔥 TOP 20 ONLY
  );

  onSnapshot(q, (snapshot) => {
    let board = document.getElementById("leaderboard");
    board.innerHTML = "";

    let current = getUser().name;

    let i = 0;

    snapshot.forEach((docSnap) => {
      let u = docSnap.data();

      let div = document.createElement("div");
      div.className = "card";

      let medal =
        i === 0 ? "🥇" :
        i === 1 ? "🥈" :
        i === 2 ? "🥉" : "";

      if (u.name === current) div.classList.add("me");

      if (i === 0) div.classList.add("top1");
      if (i === 1) div.classList.add("top2");
      if (i === 2) div.classList.add("top3");

      div.innerText =
        medal + " #" + (i + 1) + " " + u.name + " — " + u.points + " pts";

      board.appendChild(div);

      i++;
    });
  });
}


// 🚀 START
window.onload = async () => {
  await syncUser();     // safe sync
  loadLeaderboard();    // top 20 display
};

</script>

</body>
</html>
