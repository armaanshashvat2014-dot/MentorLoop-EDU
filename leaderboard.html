<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #1e3a8a, #2563eb);
  color: white;
  text-align: center;
}

.container { padding: 20px; }

.card {
  margin: 10px auto;
  padding: 12px;
  width: 360px;
  border-radius: 12px;
  background: rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
}

.me { background: rgba(34,197,94,0.4); }

.top1 {
  box-shadow: 0 0 25px gold;
  animation: glow 1.5s infinite alternate;
}

@keyframes glow {
  from { box-shadow: 0 0 10px gold; }
  to { box-shadow: 0 0 30px gold; }
}

.avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  margin-right: 10px;
}

.info { text-align: left; flex: 1; }
</style>
</head>

<body>

<div class="container">
<h2>🌍 Weekly Leaderboard</h2>
<p id="you"></p>
<button onclick="location.reload()">🔄 Refresh</button>
<div id="leaderboard"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  collection,
  query,
  orderBy,
  limit,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBOP356DMuNyWQyHDbksw0i_dWXfXsbQvI",
  authDomain: "mentorloop-55a37.firebaseapp.com",
  projectId: "mentorloop-55a37"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


// 🧠 WEEK
function getWeek() {
  let d = new Date();
  let onejan = new Date(d.getFullYear(),0,1);
  let week = Math.ceil((((d - onejan)/86400000)+onejan.getDay()+1)/7);
  return d.getFullYear()+"-W"+week;
}


// 🧠 USER
function getUser() {
  return {
    name: localStorage.getItem("ml_name") || "Guest",
    points: parseInt(localStorage.getItem("ml_points")) || 0,
    week: getWeek(),
    streak: parseInt(localStorage.getItem("ml_streak")) || 1
  };
}


// 🎮 RANK SYSTEM
function getRank(points) {
  if (points >= 1000) return "💎 Diamond";
  if (points >= 500) return "🟡 Gold";
  if (points >= 350) return "⚪ Silver";
  return "🟫 Bronze";
}


// 🏅 LEAGUE SYSTEM
function getLeague(points) {
  if (points >= 1000) return "Diamond League";
  if (points >= 500) return "Gold League";
  if (points >= 350) return "Silver League";
  return "Bronze League";
}


// 🎭 AVATAR COLOR
function getColor(name) {
  let colors = ["#f87171","#60a5fa","#34d399","#fbbf24","#a78bfa"];
  return colors[name.charCodeAt(0)%colors.length];
}


// 🔥 SYNC USER
async function syncUser() {
  let user = getUser();
  const ref = doc(db, "leaderboard", user.name);

  const snap = await getDoc(ref);

  if (snap.exists()) {
    let old = snap.data();
    if (user.points > old.points) {
      await setDoc(ref, user);
    } else {
      user.points = old.points;
    }
  } else {
    await setDoc(ref, user);
  }

  document.getElementById("you").innerText =
    `You: ${user.name} — ${user.points} pts (${getRank(user.points)} | ${getLeague(user.points)})`;
}


// 🏆 LEADERBOARD
function loadLeaderboard() {
  const q = query(collection(db,"leaderboard"), orderBy("points","desc"), limit(20));

  onSnapshot(q, (snapshot) => {
    let board = document.getElementById("leaderboard");
    board.innerHTML = "";

    let current = getUser().name;
    let yourRank = null;

    let i = 0;

    snapshot.forEach(docSnap => {
      let u = docSnap.data();

      let div = document.createElement("div");
      div.className = "card";

      if (u.name === current) {
        div.classList.add("me");
        yourRank = i + 1;
      }

      if (i === 0) div.classList.add("top1");

      let medal = i === 0 ? "👑🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : "";

      div.innerHTML = `
        <div class="avatar" style="background:${getColor(u.name)}">
          ${u.name[0].toUpperCase()}
        </div>
        <div class="info">
          ${medal} #${i+1} ${u.name}
          <br>${u.points} pts • ${getRank(u.points)}
        </div>
      `;

      board.appendChild(div);
      i++;
    });

    if (yourRank) {
      document.getElementById("you").innerText += ` | Rank #${yourRank}`;
    } else {
      document.getElementById("you").innerText += " | Outside Top 20";
    }
  });
}


// 🚀 START
window.onload = async () => {
  await syncUser();
  loadLeaderboard();
};

</script>

</body>
</html>
