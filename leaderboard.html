<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #1e3a8a, #2563eb);
  color: white;
  text-align: center;
}

.container { padding: 20px; }

.card {
  margin: 10px auto;
  padding: 12px;
  width: 360px;
  border-radius: 12px;
  background: rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
}

.me { background: rgba(34,197,94,0.4); }

.top1 {
  box-shadow: 0 0 25px gold;
  animation: glow 1.5s infinite alternate;
}

@keyframes glow {
  from { box-shadow: 0 0 10px gold; }
  to { box-shadow: 0 0 30px gold; }
}

.avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  margin-right: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}

.info { text-align: left; flex: 1; }

.subtitle {
  font-size: 14px;
  opacity: 0.8;
}
</style>

</head>

<body>

<div class="container">

<h2>🌍 Weekly Leaderboard (Live)</h2>

<p id="you"></p>
<p id="insight" class="subtitle"></p>
<p id="updateTime" class="subtitle"></p>

<div id="leaderboard"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  doc,
  setDoc,
  collection,
  query,
  orderBy,
  limit,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBOP356DMuNyWQyHDbksw0i_dWXfXsbQvI",
  authDomain: "mentorloop-55a37.firebaseapp.com",
  projectId: "mentorloop-55a37"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


// 🔐 UID SYSTEM (NO DUPLICATES EVER)
if (!localStorage.getItem("ml_uid")) {
  localStorage.setItem("ml_uid", "user_" + Math.random().toString(36).substring(2, 10));
}


// 🎮 RANK
function getRank(points) {
  if (points >= 300) return "💎 Diamond";
  if (points >= 150) return "🟡 Gold";
  if (points >= 50) return "⚪ Silver";
  return "🟫 Bronze";
}

// 🎨 COLOR
function getColor(name) {
  let colors = ["#f87171","#60a5fa","#34d399","#fbbf24","#a78bfa"];
  return colors[name.charCodeAt(0)%colors.length];
}

// 📅 WEEK
function getWeek() {
  let d = new Date();
  let onejan = new Date(d.getFullYear(),0,1);
  let week = Math.ceil((((d - onejan)/86400000)+onejan.getDay()+1)/7);
  return d.getFullYear()+"-W"+week;
}

// 👤 USER
function getUser() {
  return {
    name: localStorage.getItem("ml_name") || "Guest",
    points: parseInt(localStorage.getItem("ml_points")) || 0,
    week: getWeek()
  };
}

// 📈 TREND
function getTrend(current) {
  let prev = parseInt(localStorage.getItem("ml_prev_points")) || 0;
  localStorage.setItem("ml_prev_points", current);

  if (current > prev) return "🔺 Improving";
  if (current < prev) return "🔻 Dropped";
  return "➖ Stable";
}


// 🔥 SYNC USER (ALWAYS SAME DOC)
async function syncUser() {

  const uid = localStorage.getItem("ml_uid");
  let user = getUser();

  await setDoc(doc(db,"leaderboard", uid), user);

  return { ...user, id: uid };
}


// 🚀 LIVE LEADERBOARD
function loadLeaderboardLive(){

  const board = document.getElementById("leaderboard");
  const currentUID = localStorage.getItem("ml_uid");

  const q = query(
    collection(db,"leaderboard"),
    orderBy("points","desc"),
    limit(50)
  );

  onSnapshot(q, (snapshot)=>{

    board.innerHTML = "";

    let currentWeek = getWeek();
    let users = [];
    let yourRank = null;

    snapshot.forEach(docSnap => {
      let u = docSnap.data();

      if(u.week === currentWeek){
        users.push({ ...u, id: docSnap.id });
      }
    });

    if(users.length === 0){
      board.innerHTML = "<p>No data yet 🚀</p>";
      return;
    }

    users.forEach((u,i)=>{

      let div = document.createElement("div");
      div.className = "card";

      if (u.id === currentUID) {
        div.classList.add("me");
        yourRank = i + 1;
      }

      if (i === 0) div.classList.add("top1");

      let medal = i === 0 ? "👑🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : "";

      div.innerHTML = `
        <div class="avatar" style="background:${getColor(u.name)}">
          ${u.name[0].toUpperCase()}
        </div>
        <div class="info">
          ${medal} #${i+1} ${u.name}
          <br>${u.points} pts • ${getRank(u.points)}
        </div>
      `;

      board.appendChild(div);
    });

    // 🔥 UPDATE USER INFO LIVE
    let user = getUser();

    document.getElementById("you").innerText =
      `You: ${user.name} — ${user.points} pts (${getRank(user.points)})`;

    if (yourRank) {
      let percent = Math.round((1 - yourRank / users.length) * 100);
      document.getElementById("insight").innerText =
        `Ahead of ${percent}% of students`;
    }

    document.getElementById("updateTime").innerText =
      "Live update: " + new Date().toLocaleTimeString();

  });

}


// 🚀 START
window.onload = async () => {

  await syncUser();      // ensure user exists
  loadLeaderboardLive(); // start live updates

};

</script>

</body>
</html>
