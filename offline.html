<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MentorLoop EDU</title>

<style>
body{
margin:0;
font-family:'Segoe UI';
background:linear-gradient(135deg,#020617,#0f172a);
color:#e2e8f0;
}

.container{
max-width:850px;
margin:auto;
padding:20px;
}

.card{
background:#0f172a;
padding:18px;
border-radius:14px;
margin-bottom:15px;
box-shadow:0 0 25px rgba(56,189,248,0.15);
}

h2{
text-align:center;
color:#38bdf8;
}

button{
padding:10px 14px;
margin:5px;
border:none;
border-radius:10px;
background:#38bdf8;
color:#000;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

input{
padding:10px;
border-radius:8px;
border:none;
margin:5px;
width:200px;
}

.question{
padding:8px;
margin:5px 0;
background:#020617;
border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

<h2>MentorLoop EDU</h2>

<!-- LOGIN -->
<div class="card" id="login">
<h3>Login</h3>
<input id="name" placeholder="Enter name (type 'teacher' for teacher)">
<br>
<button onclick="login()">Login</button>
</div>

<!-- STUDENT PANEL -->
<div id="studentPanel" style="display:none">

<div class="card">
<h3>Student Dashboard</h3>
<p id="studentInfo"></p>
</div>

<div class="card">
<h3>Homework</h3>
<div id="studentHW"></div>
</div>

</div>

<!-- TEACHER PANEL -->
<div id="teacherPanel" style="display:none">

<div class="card">
<h3>Teacher Dashboard</h3>
<button onclick="generateHW()">Generate Homework</button>
<button onclick="clearHW()">Reset Homework</button>
</div>

<div class="card">
<h3>Homework Preview</h3>
<div id="teacherHW"></div>
</div>

<div class="card">
<h3>Students</h3>
<div id="students"></div>
</div>

</div>

</div>

<script>

// DATABASE
let db = JSON.parse(localStorage.getItem("db")) || {
students:{},
homework:null
};

let currentUser=null;

// LOGIN
function login(){
let name=document.getElementById("name").value.trim();
if(!name) return;

currentUser=name;

if(name.toLowerCase()==="teacher"){
document.getElementById("login").style.display="none";
document.getElementById("teacherPanel").style.display="block";
renderTeacher();
return;
}

// STUDENT
if(!db.students[name]){
db.students[name]={correct:0,wrong:0};
}

document.getElementById("login").style.display="none";
document.getElementById("studentPanel").style.display="block";

save();
renderStudent();
}

// SAVE
function save(){
localStorage.setItem("db",JSON.stringify(db));
}

// RANDOM
function rand(min,max){
return Math.floor(Math.random()*(max-min+1))+min;
}

// GENERATE ONCE
function generateHW(){

let questions=[];

for(let i=0;i<10;i++){
questions.push(`${rand(2,20)} × ${rand(2,10)}`);
}

db.homework=questions;
save();
renderTeacher();
}

// RESET
function clearHW(){
db.homework=null;
save();
renderTeacher();
}

// STUDENT VIEW
function renderStudent(){

let s=db.students[currentUser];

let total=s.correct+s.wrong;
let acc = total? Math.round((s.correct/total)*100):0;

document.getElementById("studentInfo").innerText=
`Accuracy: ${acc}% | Correct: ${s.correct} | Wrong: ${s.wrong}`;

let html="";

if(!db.homework){
html="No homework assigned";
}else{

db.homework.forEach((q,i)=>{
html+=`
<div class="question">
${i+1}. ${q}
<button onclick="answer(1)">✔</button>
<button onclick="answer(0)">❌</button>
</div>
`;
});
}

document.getElementById("studentHW").innerHTML=html;
}

// ANSWER
function answer(c){
let s=db.students[currentUser];

if(c) s.correct++;
else s.wrong++;

save();
renderStudent();
}

// TEACHER VIEW
function renderTeacher(){

let html="";

if(!db.homework){
html="No homework yet";
}else{
db.homework.forEach((q,i)=>{
html+=`${i+1}. ${q}<br>`;
});
}

document.getElementById("teacherHW").innerHTML=html;

// STUDENTS
let shtml="";
Object.keys(db.students).forEach(name=>{
let s=db.students[name];
let total=s.correct+s.wrong;
let acc = total? Math.round((s.correct/total)*100):0;

shtml+=`${name} → ${acc}%<br>`;
});

document.getElementById("students").innerHTML=shtml;
}

</script>

</body>
</html>
