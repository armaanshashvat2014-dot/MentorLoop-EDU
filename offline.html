<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MentorLoop EDU - Level 100</title>

<style>
body{margin:0;font-family:Segoe UI;background:#020617;color:#e2e8f0;}
.container{padding:20px;max-width:900px;margin:auto;}
.card{background:#0f172a;padding:15px;border-radius:12px;margin-bottom:15px;}
button{padding:8px;margin:5px;border:none;border-radius:8px;background:#38bdf8;cursor:pointer;}
input{padding:6px;margin:5px;border-radius:6px;border:none;}
</style>

</head>
<body>

<div class="container">

<h2>MentorLoop EDU</h2>

<!-- LOGIN -->
<div class="card" id="login">
<h3>Login</h3>
<input id="username" placeholder="Enter Name">
<button onclick="login()">Login</button>
</div>

<!-- STUDENT PANEL -->
<div id="studentPanel" style="display:none">

<div class="card">
<h3>👨‍🎓 Student Dashboard</h3>
<p id="studentInfo"></p>
</div>

<div class="card">
<h3>🧾 Questions</h3>
<div id="questions"></div>
</div>

</div>

<!-- TEACHER PANEL -->
<div id="teacherPanel" style="display:none">

<div class="card">
<h3>🧑‍🏫 Teacher Dashboard</h3>
<button onclick="generateHW()">Generate Homework</button>
</div>

<div class="card">
<h3>📊 Students</h3>
<div id="students"></div>
</div>

<div class="card">
<h3>🏆 Leaderboard</h3>
<div id="leader"></div>
</div>

</div>

</div>

<script>

// DATABASE
let db = JSON.parse(localStorage.getItem("mentorDB")) || {
students:{}
};

let currentUser = null;

// LOGIN
function login(){
let name=document.getElementById("username").value.trim();
if(!name) return;

currentUser=name;

// TEACHER LOGIN
if(name.toLowerCase()==="teacher"){
document.getElementById("login").style.display="none";
document.getElementById("teacherPanel").style.display="block";
renderTeacher();
return;
}

// STUDENT LOGIN
if(!db.students[name]){
db.students[name]={
correct:0,
wrong:0,
level:"easy",
history:[]
};
}

document.getElementById("login").style.display="none";
document.getElementById("studentPanel").style.display="block";

save();
renderStudent();
}

// SAVE
function save(){
localStorage.setItem("mentorDB",JSON.stringify(db));
}

// RANDOM
function rand(min,max){
return Math.floor(Math.random()*(max-min+1))+min;
}

// GENERATE QUESTION
function genQ(level){
if(level==="easy") return `${rand(1,20)} + ${rand(1,20)}`;
if(level==="medium") return `${rand(10,50)} × ${rand(2,10)}`;
return `${rand(50,200)} ÷ ${rand(2,10)}`;
}

// ADAPT
function adapt(s){
let total=s.correct+s.wrong;
if(total>=5){
let acc=s.correct/total;

if(acc>0.7) s.level="hard";
else if(acc>0.4) s.level="medium";
else s.level="easy";

s.correct=0;
s.wrong=0;
}
}

// STUDENT VIEW
function renderStudent(){

let s=db.students[currentUser];

adapt(s);

document.getElementById("studentInfo").innerText=
`Level: ${s.level} | Correct: ${s.correct} | Wrong: ${s.wrong}`;

let html="";
for(let i=0;i<5;i++){
let q=genQ(s.level);

html+=`${q} 
<button onclick="answer(1)">✔</button>
<button onclick="answer(0)">❌</button><br>`;
}

document.getElementById("questions").innerHTML=html;
save();
}

// ANSWER
function answer(c){
let s=db.students[currentUser];

if(c) s.correct++;
else s.wrong++;

s.history.push(c);

save();
renderStudent();
}

// TEACHER VIEW
function renderTeacher(){

let html="";
let leaderboard=[];

Object.keys(db.students).forEach(name=>{
let s=db.students[name];

let total=s.correct+s.wrong;
let acc = total? Math.round((s.correct/total)*100):0;

html+=`${name} → ${acc}% (${s.level})<br>`;

leaderboard.push({
name:name,
score:s.correct
});
});

document.getElementById("students").innerHTML=html;

// LEADERBOARD
leaderboard.sort((a,b)=>b.score-a.score);

let lhtml="";
leaderboard.forEach((s,i)=>{
lhtml+=`${i+1}. ${s.name} (${s.score})<br>`;
});

document.getElementById("leader").innerHTML=lhtml;
}

// GENERATE HOMEWORK (TEACHER)
function generateHW(){
alert("Homework generated based on student levels!");
}

</script>

</body>
</html>
