<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MentorLoop learning system</title>

<style>
body{
  font-family:Segoe UI;
  background:#020617;
  color:white;
  margin:0;
}

h1{text-align:center;}

.section{
  padding:20px;
  border-bottom:1px solid #1e293b;
}

input,button{
  padding:10px;
  border-radius:10px;
  border:none;
  margin:5px;
}

button{
  background:#22c55e;
  cursor:pointer;
}

.card{
  background:#0f172a;
  padding:15px;
  border-radius:10px;
  margin:10px 0;
}

.locked{
  opacity:0.4;
}
</style>
</head>

<body>

<h1>🧠 MentorLoop learning system</h1>

<!-- 🎯 ROADMAP -->
<div class="section">
<h2>🎯 Goal → Roadmap</h2>
<input id="goal" placeholder="e.g. Learn algebra in 7 days">
<button onclick="generateRoadmap()">Generate</button>
<div id="roadmap"></div>
</div>

<!-- 📊 XP -->
<div class="section">
<h2>📊 XP & Level</h2>
<p id="xp"></p>
</div>

<!-- 🎯 WEAKNESS -->
<div class="section">
<h2>🎯 Weakness</h2>
<p id="weakness"></p>
</div>

<!-- 🎮 BOSS -->
<div class="section">
<h2>🎮 Boss Battle</h2>
<button onclick="startBoss()">Start Boss</button>
<p id="question"></p>
<input id="answerInput">
<button onclick="submitAnswer()">Submit</button>
<p id="battle"></p>
<p id="hp"></p>
</div>

<!-- 🧠 EMOTION -->
<div class="section">
<h2>🧠 Emotion AI</h2>
<p id="emotion"></p>
</div>

<script>

// =======================
// STORAGE INIT
// =======================
let xp = Number(localStorage.getItem("xp") || 0);
let mistakes = Number(localStorage.getItem("mistakes") || 0);
let dailyXP = Number(localStorage.getItem("dailyXP") || 0);
let lastDate = localStorage.getItem("lastDate") || "";
let completedDays = JSON.parse(localStorage.getItem("completedDays") || "[]");
let bossCooldown = Number(localStorage.getItem("bossCooldown") || 0);

function checkDailyReset(){
  let today = new Date().toDateString();
  if(today !== lastDate){
    dailyXP = 0;
    localStorage.setItem("lastDate", today);
  }
}
checkDailyReset();

let level = Math.floor(xp / 50);

// =======================
// XP SYSTEM
// =======================
function addXP(amount){

  if(dailyXP >= 100){
    alert("Daily XP limit reached!");
    return;
  }

  xp += amount;
  dailyXP += amount;

  localStorage.setItem("xp", xp);
  localStorage.setItem("dailyXP", dailyXP);

  updateXP();
}

function updateXP(){
  level = Math.floor(xp / 50);
  document.getElementById("xp").innerText =
    "XP: " + xp + " | Level: " + level;
}

// =======================
// 🎯 SMART ROADMAP
// =======================
function generateRoadmap(){

  let goal = document.getElementById("goal").value.toLowerCase();
  let topics = [];

  if(goal.includes("algebra")){
    topics = [
      "Monomials",
      "Binomials",
      "Polynomials",
      "Factorization",
      "Linear Equations",
      "Quadratics",
      "Word Problems"
    ];
  }
  else if(goal.includes("physics")){
    topics = [
      "Motion",
      "Force",
      "Energy",
      "Work",
      "Waves",
      "Electricity",
      "Magnetism"
    ];
  }
  else{
    topics = ["Basics","Intermediate","Advanced"];
  }

  let html = "";

  topics.forEach((t,i)=>{
    let locked = i > level ? "locked" : "";

    html += `<div class="card ${locked}">
      Day ${i+1}: ${t}
      <button onclick="completeDay(${i})">Complete</button>
    </div>`;
  });

  document.getElementById("roadmap").innerHTML = html;
}

// =======================
// COMPLETE DAY (ANTI-SPAM)
// =======================
function completeDay(i){

  if(completedDays.includes(i)){
    alert("Already completed!");
    return;
  }

  if(i > level){
    alert("Locked! Level up first.");
    return;
  }

  completedDays.push(i);
  localStorage.setItem("completedDays", JSON.stringify(completedDays));

  addXP(20);
}

// =======================
// 🎯 WEAKNESS SYSTEM
// =======================
function updateWeakness(){
  document.getElementById("weakness").innerText =
    "Mistakes: " + mistakes;
}

// =======================
// 🎮 BOSS SYSTEM
// =======================
let hp = 3;
let currentAnswer = 0;

function startBoss(){

  let now = Date.now();

  if(now < bossCooldown){
    alert("Boss on cooldown!");
    return;
  }

  bossCooldown = now + 60000;
  localStorage.setItem("bossCooldown", bossCooldown);

  hp = 3;
  nextQ();
}

function nextQ(){

  let difficulty = level + 1;

  let a = Math.floor(Math.random()*10*difficulty);
  let b = Math.floor(Math.random()*10*difficulty);

  currentAnswer = a + b;

  document.getElementById("question").innerText =
    `Solve: ${a} + ${b}`;

  document.getElementById("hp").innerText =
    "HP: " + hp;
}

function submitAnswer(){

  let user = Number(document.getElementById("answerInput").value);

  if(user === currentAnswer){
    addXP(10);
    document.getElementById("battle").innerText = "Correct!";
  } else {
    hp--;
    mistakes++;
    localStorage.setItem("mistakes", mistakes);
    document.getElementById("battle").innerText = "Wrong!";
  }

  // Anti-farming penalty
  if(mistakes > 10){
    xp = Math.max(0, xp - 20);
    alert("XP penalty for too many mistakes!");
  }

  updateXP();
  updateWeakness();
  updateEmotion();

  if(hp <= 0){
    document.getElementById("battle").innerText += " 💀 You lost!";
  } else {
    nextQ();
  }
}

// =======================
// 🧠 EMOTION AI
// =======================
function updateEmotion(){

  let text = "";

  if(mistakes > 8){
    text = "😤 Frustrated → slowing difficulty";
  }
  else if(xp > 150){
    text = "😎 You are on fire!";
  }
  else{
    text = "🤔 Keep going!";
  }

  document.getElementById("emotion").innerText = text;
}

// INIT
updateXP();
updateWeakness();
updateEmotion();

</script>

</body>
</html>
