<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MentorLoop | Elite Zone</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:#e2e8f0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card {
  background:#020617;
  padding:25px;
  border-radius:20px;
  width:420px;
  text-align:center;
  box-shadow:0 0 50px rgba(56,189,248,0.2);
}

h1 { color:#38bdf8; }

input {
  padding:10px;
  border-radius:10px;
  border:none;
  width:80%;
  margin-top:10px;
}

button {
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  color:#020617;
  font-weight:bold;
  cursor:pointer;
}

.apex-btn {
  background:#facc15;
  color:#000;
}

.bar {
  background:#1e293b;
  height:10px;
  border-radius:10px;
  margin-top:10px;
  overflow:hidden;
}

.fill {
  background:#38bdf8;
  height:100%;
  width:0%;
}

.result-screen {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#020617;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}

.big { font-size:48px; color:#38bdf8; }
.sub { margin-top:10px; }
</style>
</head>

<body>

<div class="card">
  <h1>🔥 Elite Zone</h1>

  <div id="status"></div>

  <!-- PROGRESS TO APEX -->
  <div class="bar"><div id="fill" class="fill"></div></div>

  <!-- APEX BUTTON -->
  <button class="apex-btn" onclick="goApex()">⚡ Go Apex</button>

  <div id="eliteArea" style="display:none">
    <div id="question"></div>

    <input id="answer" placeholder="Answer">
    <button onclick="submitElite()">Submit</button>

    <div id="result"></div>
    <div id="leaderboard"></div>
  </div>
</div>

<script>

// ACCESS
let streak = parseInt(localStorage.getItem("ml_streak")) || 0;
let points = parseInt(localStorage.getItem("ml_points")) || 0;

// PROGRESS BAR → APEX
let progress = Math.min((streak/50 + points/100000)/2,1)*100;
document.getElementById("fill").style.width = progress + "%";

if (streak >= 15 && points >= 900) {
  document.getElementById("status").innerHTML = "✅ Elite Unlocked 😈";
  document.getElementById("eliteArea").style.display = "block";
} else {
  document.getElementById("status").innerHTML =
    `🔒 Locked<br>🔥 ${streak}/15<br>💠 ${points}/900`;
}

// 👀 ALMOST APEX
if(streak > 40 || points > 80000){
  document.getElementById("status").innerHTML +=
    "<br><br>⚡ You are CLOSE to Apex 👀";
}

// APEX NAVIGATION
function goApex(){
  if(streak >= 50 && points >= 100000){
    window.location.href="apex.html";
  } else {
    alert("⚡ Reach Apex requirements to enter 😈");
  }
}

// QUESTIONS
const Q = [
  {q:"27 × 3 + 19 = ?", a:"100"},
  {q:"√256 + 12 = ?", a:"28"},
  {q:"12² - 20 = ?", a:"124"},
  {q:"15 × 12 - 30 = ?", a:"150"},
  {q:"7³ - 10 = ?", a:"333"}
];

let q = Q[new Date().getDate()%Q.length];
document.getElementById("question").innerHTML = `<b>${q.q}</b>`;

// TIMER
let start = Date.now();

// IDENTITY
function getIdentity(t){
  if(t<8) return "⚡ Speed Demon";
  if(t<12) return "🧠 Fast Thinker";
  if(t<18) return "📘 Smart Learner";
  return "🌱 Rising Mind";
}

// RANK
function getRank(t){
  let percentile = Math.max(1, Math.round((10/t)*10));
  let rank = Math.max(1, 100-percentile);
  return {percentile, rank};
}

// RESULT SCREEN
function showResultScreen(time,p,r){

  let div = document.createElement("div");
  div.className="result-screen";

  div.innerHTML=`
    <div class="big">${time.toFixed(2)}s</div>
    <div class="sub">🔥 Top ${p}%</div>
    <div class="sub">🏆 Rank #${r}</div>

    <button onclick="location.reload()">⚔️ Again</button>
  `;

  document.body.appendChild(div);
}

// SUBMIT
function submitElite(){

  let ans=document.getElementById("answer").value.trim();
  let t=(Date.now()-start)/1000;

  if(ans===q.a){

    let identity=getIdentity(t);
    let {percentile,rank}=getRank(t);

    let scores=JSON.parse(localStorage.getItem("elite_scores"))||[];
    scores.push(t);
    scores.sort((a,b)=>a-b);
    scores=scores.slice(0,5);
    localStorage.setItem("elite_scores",JSON.stringify(scores));

    document.getElementById("result").innerHTML =
      `${identity}<br>${t.toFixed(2)}s`;

    showLeaderboard();

    setTimeout(()=>{
      showResultScreen(t,percentile,rank);
    },1000);

  } else {
    document.getElementById("result").innerText="❌ Try again";
  }
}

// LEADERBOARD
function showLeaderboard(){

  let scores=JSON.parse(localStorage.getItem("elite_scores"))||[];

  let html="<b>🏆 Elite Board:</b><br>";
  scores.forEach((t,i)=>{
    html+=`${i+1}. ${t.toFixed(2)}s<br>`;
  });

  document.getElementById("leaderboard").innerHTML=html;
}

showLeaderboard();

</script>

</body>
</html>
