<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MentorLoop | Elite Zone</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:#e2e8f0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card {
  background:#020617;
  padding:25px;
  border-radius:20px;
  width:420px;
  text-align:center;
  box-shadow:0 0 50px rgba(56,189,248,0.2);
}

h1 { color:#38bdf8; }

input {
  padding:10px;
  border-radius:10px;
  border:none;
  width:80%;
  margin-top:10px;
}

button {
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  color:#020617;
  font-weight:bold;
  cursor:pointer;
}

.section { margin-top:15px; }
.highlight { color:#38bdf8; font-weight:bold; }

/* FULL SCREEN RESULT */
.result-screen {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#020617;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}

.big {
  font-size:48px;
  color:#38bdf8;
  font-weight:bold;
}

.sub {
  margin-top:10px;
  font-size:18px;
}
</style>
</head>

<body>

<div class="card">
  <h1>🔥 Elite Zone</h1>

  <div id="status"></div>

  <div id="eliteArea" style="display:none">
    <div class="section" id="question"></div>

    <input id="answer" placeholder="Your answer">
    <button onclick="submitElite()">Submit</button>

    <div class="section" id="result"></div>
    <div class="section" id="leaderboard"></div>
  </div>
</div>

<script>

// ACCESS
let streak = parseInt(localStorage.getItem("ml_streak")) || 0;
let points = parseInt(localStorage.getItem("ml_points")) || 0;

if (streak >= 15 && points >= 900) {
  document.getElementById("status").innerHTML = "✅ Welcome Elite 😈";
  document.getElementById("eliteArea").style.display = "block";
} else {
  document.getElementById("status").innerHTML =
    `🔒 Locked<br>🔥 ${streak}/15<br>💠 ${points}/900`;
}

// QUESTIONS
const eliteQ = [
  {q:"27 × 3 + 19 = ?", a:"100"},
  {q:"√256 + 12 = ?", a:"28"},
  {q:"12² - 20 = ?", a:"124"},
  {q:"15 × 12 - 30 = ?", a:"150"},
  {q:"7³ - 10 = ?", a:"333"}
];

let index = new Date().getDate() % eliteQ.length;
let currentQ = eliteQ[index];

document.getElementById("question").innerHTML =
  `🧠 Elite Question:<br><b>${currentQ.q}</b>`;

// TIMER
let start = Date.now();

// 🧬 IDENTITY
function getIdentity(t){
  if(t<8) return "⚡ Speed Demon";
  if(t<12) return "🧠 Fast Thinker";
  if(t<18) return "📘 Smart Learner";
  return "🌱 Rising Mind";
}

// 🔥 DAILY STATS
function getDailyStats(){
  let total = 20 + (new Date().getDate()%30);
  return Math.max(1, Math.floor(total*0.1));
}

// 🏆 RANK SYSTEM
function getRank(t){
  let percentile = Math.max(1, Math.round((10/t)*10));
  let rank = Math.max(1, 100-percentile);
  return {percentile, rank};
}

// RESULT SCREEN
function showResultScreen(time,p,r){

  let best = parseFloat(localStorage.getItem("best_time"));
  let near = best && Math.abs(best-time)<1;

  let div = document.createElement("div");
  div.className="result-screen";

  div.innerHTML = `
    <div class="big">⚡ ${time.toFixed(2)}s</div>
    <div class="sub">🔥 Top ${p}% Today</div>
    <div class="sub">🏆 Rank #${r}</div>
    ${near ? `<div class="sub">👀 You were VERY close to your best!</div>`:""}
    
    <button onclick="location.reload()">⚔️ Beat Your Time</button>
    <button onclick="share()">📢 Challenge</button>
  `;

  document.body.appendChild(div);
}

// SHARE
function share(){
  let text="I just crushed today's Elite challenge 😈 Beat me!";
  navigator.clipboard.writeText(text);
  alert("Copied 😎");
}

// SUBMIT
function submitElite(){

  let ans=document.getElementById("answer").value.toLowerCase().trim();
  let time=(Date.now()-start)/1000;

  if(ans===currentQ.a){

    // SAVE BEST
    let best = parseFloat(localStorage.getItem("best_time"));
    if(!best || time<best){
      localStorage.setItem("best_time",time);
    }

    // LEADERBOARD
    let scores=JSON.parse(localStorage.getItem("elite_scores"))||[];
    scores.push(time);
    scores.sort((a,b)=>a-b);
    scores=scores.slice(0,5);
    localStorage.setItem("elite_scores",JSON.stringify(scores));

    // DAILY URGENCY
    document.getElementById("status").innerHTML =
      `⚠️ Only ${getDailyStats()} users solved under 10s today`;

    // IDENTITY
    let identity=getIdentity(time);

    // RANK
    let {percentile,rank}=getRank(time);

    document.getElementById("result").innerHTML =
      `🧬 ${identity}<br>⏱ ${time.toFixed(2)}s`;

    showLeaderboard();

    setTimeout(()=>{
      showResultScreen(time,percentile,rank);
    },1000);

  } else {
    document.getElementById("result").innerText="❌ Try again!";
  }
}

// LEADERBOARD
function showLeaderboard(){
  let scores=JSON.parse(localStorage.getItem("elite_scores"))||[];

  let html="<b>🏆 Elite Leaderboard:</b><br>";
  scores.forEach((t,i)=>{
    html+=`${i+1}. ${t.toFixed(2)}s<br>`;
  });

  document.getElementById("leaderboard").innerHTML=html;
}

showLeaderboard();

</script>

</body>
</html>
