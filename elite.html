<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MentorLoop | Elite Zone</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:#e2e8f0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card {
  background:#020617;
  padding:25px;
  border-radius:20px;
  width:420px;
  text-align:center;
  box-shadow:0 0 50px rgba(56,189,248,0.2);
}

h1 { color:#38bdf8; }

input {
  padding:10px;
  border-radius:10px;
  border:none;
  width:80%;
  margin-top:10px;
}

button {
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  color:#020617;
  font-weight:bold;
  cursor:pointer;
}

.section {
  margin-top:15px;
}

.highlight {
  color:#38bdf8;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="card">
  <h1>🔥 Elite Zone</h1>

  <div id="status"></div>

  <div id="eliteArea" style="display:none">

    <div class="section" id="question"></div>

    <input id="answer" placeholder="Your answer">
    <button onclick="submitElite()">Submit</button>

    <div class="section" id="result"></div>

    <div class="section" id="leaderboard"></div>

  </div>

</div>

<script>

// REQUIREMENTS
let streak = parseInt(localStorage.getItem("ml_streak")) || 0;
let points = parseInt(localStorage.getItem("ml_points")) || 0;

let unlocked = (streak >= 15 && points >= 900);

// ACCESS
if (!unlocked) {
  document.getElementById("status").innerHTML =
    `🔒 Locked<br>
     🔥 Streak: ${streak}/15<br>
     💠 Points: ${points}/900`;
} else {
  document.getElementById("status").innerHTML =
    "✅ Welcome to Elite 😈";

  document.getElementById("eliteArea").style.display = "block";
}

// ELITE QUESTIONS
const eliteQ = [
  {q:"27 × 3 + 19 = ?", a:"100"},
  {q:"√256 + 12 = ?", a:"28"},
  {q:"12² - 20 = ?", a:"124"},
  {q:"15 × 12 - 30 = ?", a:"150"},
  {q:"7³ - 10 = ?", a:"333"}
];

// DAILY LOCK
let day = new Date().toDateString();
let index = new Date().getDate() % eliteQ.length;

let currentQ = eliteQ[index];

document.getElementById("question").innerHTML =
  `🧠 Elite Question:<br><b>${currentQ.q}</b>`;

// TIMER LOCK
let start = localStorage.getItem("elite_start");

if (!start || localStorage.getItem("elite_day") !== day) {
  start = Date.now();
  localStorage.setItem("elite_start", start);
  localStorage.setItem("elite_day", day);
}

let solved = localStorage.getItem("elite_solved") === "true";

// SUBMIT
function submitElite() {

  if (solved) return;

  let ans = document.getElementById("answer").value.toLowerCase().trim();
  let time = (Date.now() - start)/1000;

  if (ans === currentQ.a) {

    solved = true;
    localStorage.setItem("elite_solved", "true");

    // SAVE TIME
    let scores = JSON.parse(localStorage.getItem("elite_scores")) || [];
    scores.push(time);
    scores.sort((a,b)=>a-b);
    scores = scores.slice(0,5);
    localStorage.setItem("elite_scores", JSON.stringify(scores));

    // MESSAGE (your logic)
    let msg = "";

    if (time > 12) {
      msg = "🔥 WOAH! YOU are really FAST!";
    } else {
      msg = "😏 Awww...Try faster tomorrow";
    }

    document.getElementById("result").innerHTML =
      `${msg}<br>⏱ ${time.toFixed(2)}s`;

    showLeaderboard();

  } else {
    document.getElementById("result").innerText = "❌ Try again!";
  }
}

// LEADERBOARD
function showLeaderboard() {
  let scores = JSON.parse(localStorage.getItem("elite_scores")) || [];

  let html = "<b>🏆 Elite Leaderboard:</b><br>";

  scores.forEach((t,i)=>{
    html += `${i+1}. ${t.toFixed(2)}s<br>`;
  });

  document.getElementById("leaderboard").innerHTML = html;
}

// LOAD LEADERBOARD
showLeaderboard();

</script>

</body>
</html>
