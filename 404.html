<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found | MentorLoop EDU</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  overflow: hidden;
}

/* FLOATING GLOW BACKGROUND */
body::before {
  content: "";
  position: absolute;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, #22d3ee33, transparent);
  top: 10%;
  left: 10%;
  animation: float 6s infinite ease-in-out;
}

body::after {
  content: "";
  position: absolute;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, #10b98133, transparent);
  bottom: 10%;
  right: 10%;
  animation: float 8s infinite ease-in-out;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
}

/* CARD */
.container {
  position: relative;
  max-width: 500px;
  padding: 40px;
  background: rgba(15, 23, 42, 0.9);
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7);
  text-align: center;
  animation: fadeIn 0.8s ease;
}

/* 404 TEXT */
h1 {
  font-size: 90px;
  margin: 0;
  background: linear-gradient(90deg,#22d3ee,#10b981);
  -webkit-background-clip: text;
  color: transparent;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { filter: drop-shadow(0 0 5px #22d3ee); }
  to { filter: drop-shadow(0 0 20px #10b981); }
}

/* TEXT */
p {
  margin: 15px 0;
  color: #94a3b8;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 14px 24px;
  border-radius: 12px;
  background: linear-gradient(90deg,#22d3ee,#10b981);
  color: white;
  text-decoration: none;
  font-weight: 600;
  transition: 0.25s;
  box-shadow: 0 0 15px rgba(34,211,238,0.3);
}

.btn:hover {
  transform: scale(1.08);
  box-shadow: 0 0 25px rgba(16,185,129,0.6);
}

/* COUNTDOWN */
.small {
  font-size: 13px;
  margin-top: 12px;
  color: #64748b;
}

/* ANIMATION */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(25px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container">
  <h1>404</h1>

  <p>🚫 This page took a wrong turn.</p>
  <p>Let’s get you back on track.</p>

  <!-- MANUAL BUTTON -->
  <a href="dashboard-v2.html" class="btn">🏠 Go to Dashboard</a>

  <!-- COUNTDOWN -->
  <p class="small">
    Redirecting in <span id="count">10</span> seconds...
  </p>
</div>

<script>

// ⏳ COUNTDOWN
let time = 10;
const el = document.getElementById("count");

const timer = setInterval(()=>{
  time--;
  el.innerText = time;

  if(time <= 0){
    clearInterval(timer);
    window.location.href = "dashboard-v2.html";
  }
},1000);

</script>

</body>
</html>
