<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found | MentorLoop EDU</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: #e2e8f0;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

/* CARD (same as dashboard feel) */
.container {
  max-width: 420px;
  width: 90%;
  padding: 35px;
  background: rgba(15, 23, 42, 0.85);
  border-radius: 18px;
  backdrop-filter: blur(12px);
  box-shadow: 0 0 40px rgba(34,211,238,0.15);
  border: 1px solid rgba(34,211,238,0.2);
  text-align: center;
  animation: fadeUp 0.6s ease;
}

/* TITLE */
h1 {
  font-size: 80px;
  margin: 0;
  color: #22d3ee;
  letter-spacing: 2px;
}

/* TEXT */
p {
  margin: 12px 0;
  color: #94a3b8;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 13px 22px;
  border-radius: 12px;
  background: linear-gradient(90deg,#22d3ee,#10b981);
  color: #020617;
  text-decoration: none;
  font-weight: 600;
  transition: 0.25s;
}

.btn:hover {
  transform: scale(1.05);
}

/* COUNTDOWN */
.small {
  font-size: 13px;
  margin-top: 12px;
  color: #64748b;
}

/* ANIMATION */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container">
  <h1>404</h1>

  <p>The page took a wrong turn</p>
  <p>Time to get you back on track...</p>

  <!-- BUTTON -->
  <a href="dashboard-v2.html" class="btn">Go to Dashboard</a>

  <!-- COUNTDOWN -->
  <p class="small">
    Redirecting in <span id="count">10</span> seconds...
  </p>
</div>

<script>

// ⏳ Countdown
let time = 10;
const el = document.getElementById("count");

const timer = setInterval(()=>{
  time--;
  el.innerText = time;

  if(time <= 0){
    clearInterval(timer);
    window.location.href = "dashboard-v2.html";
  }
},1000);

</script>

</body>
</html>
