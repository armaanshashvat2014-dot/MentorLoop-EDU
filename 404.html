<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found | MentorLoop EDU</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  text-align: center;
}

/* CARD */
.container {
  max-width: 500px;
  padding: 30px;
  background: rgba(15, 23, 42, 0.9);
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  animation: fadeIn 0.8s ease;
}

/* TITLE */
h1 {
  font-size: 80px;
  margin: 0;
  background: linear-gradient(90deg,#22d3ee,#10b981);
  -webkit-background-clip: text;
  color: transparent;
}

/* TEXT */
p {
  margin: 15px 0;
  color: #94a3b8;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 15px;
  padding: 12px 20px;
  border-radius: 10px;
  background: linear-gradient(90deg,#22d3ee,#10b981);
  color: white;
  text-decoration: none;
  font-weight: 500;
  transition: 0.2s;
}

.btn:hover {
  transform: scale(1.05);
}

/* SMALL TEXT */
.small {
  font-size: 12px;
  margin-top: 10px;
  color: #64748b;
}

/* ANIMATION */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container">
  <h1>404</h1>
  <p>Oops! The page you’re looking for doesn’t exist.</p>

  <a href="/MentorLoop-EDU/index.html" class="btn">🏠 Go to Dashboard</a>

  <p class="small">Redirecting automatically in 3 seconds...</p>
</div>

<script>
// Auto redirect
setTimeout(()=>{
  window.location.href = "dashboard-v2.html";
},3000);
</script>

</body>
</html>
