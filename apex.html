<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MentorLoop | Apex Elite</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:radial-gradient(circle,#020617,#000);
  color:#e2e8f0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#020617;
  padding:25px;
  border-radius:20px;
  width:420px;
  text-align:center;
  box-shadow:0 0 80px rgba(56,189,248,0.4);
}

h1{color:#38bdf8;}

input{
  padding:10px;
  border:none;
  border-radius:10px;
  width:80%;
}

button{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  color:#020617;
  font-weight:bold;
  cursor:pointer;
}

.bar{
  background:#1e293b;
  height:10px;
  border-radius:10px;
  margin-top:10px;
  overflow:hidden;
}

.fill{
  background:#38bdf8;
  height:100%;
  width:0%;
}

.result-screen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}

.big{font-size:50px;color:#38bdf8;}
.sub{margin-top:10px;}
</style>
</head>

<body>

<div class="card">
<h1>⚡ Apex Elite</h1>

<div id="status"></div>

<div class="bar"><div id="fill" class="fill"></div></div>

<div id="area" style="display:none">
  <div id="question"></div>
  <input id="answer" placeholder="Answer">
  <button onclick="submit()">Submit</button>

  <div id="result"></div>
  <div id="leaderboard"></div>
</div>

</div>

<script>

// REQUIREMENTS
let streak = parseInt(localStorage.getItem("ml_streak")) || 0;
let points = parseInt(localStorage.getItem("ml_points")) || 0;

let progress = Math.min((streak/50 + points/100000)/2,1)*100;
document.getElementById("fill").style.width = progress + "%";

// UNLOCK
if(streak >= 50 && points >= 100000){

  document.getElementById("status").innerHTML =
    "🔥 APEX UNLOCKED — FINAL TIER 😈";

  document.getElementById("area").style.display="block";

} else {

  document.getElementById("status").innerHTML =
    `🔒 Apex Locked<br>
     🔥 ${streak}/50<br>
     💠 ${points}/100000`;

  if(streak>40 || points>80000){
    document.getElementById("status").innerHTML +=
      "<br><br>⚡ YOU ARE VERY CLOSE 👀";
  }
}

// HARD QUESTIONS
const Q = [
  {q:"(35×4)+28=?",a:"168"},
  {q:"√1024 + 20=?",a:"52"},
  {q:"(18×9)-62=?",a:"100"},
  {q:"(15²)+25=?",a:"250"},
  {q:"8³ + 64=?",a:"576"}
];

let q = Q[new Date().getDate()%Q.length];
document.getElementById("question").innerHTML = `<b>${q.q}</b>`;

// TIMER
let startTime = Date.now();

// IDENTITY
function getTier(t){
  if(t<6) return "⚡ ULTRA INSTINCT";
  if(t<9) return "🔥 Apex Predator";
  if(t<13) return "🧠 Apex Mind";
  return "📘 Apex Learner";
}

// RANK
function getRank(t){
  let percentile = Math.max(1, Math.round((7/t)*10));
  let rank = Math.max(1, 100-percentile);
  return {percentile, rank};
}

// RESULT SCREEN
function showScreen(t,p,r,tier){

  let best = parseFloat(localStorage.getItem("apex_best"));
  let near = best && Math.abs(best-t)<1;

  let div=document.createElement("div");
  div.className="result-screen";

  div.innerHTML=`
    <div class="big">${t.toFixed(2)}s</div>
    <div class="sub">${tier}</div>
    <div class="sub">🔥 Top ${p}%</div>
    <div class="sub">🏆 Rank #${r}</div>
    ${near ? `<div class="sub">👀 SO CLOSE TO BEST</div>`:""}

    <button onclick="location.reload()">⚔️ Beat Your Time</button>
  `;

  document.body.appendChild(div);
}

// SUBMIT
function submit(){

  let ans=document.getElementById("answer").value.trim();
  let t=(Date.now()-startTime)/1000;

  if(ans===q.a){

    let tier=getTier(t);
    let {percentile,rank}=getRank(t);

    // SAVE BEST
    let best=parseFloat(localStorage.getItem("apex_best"));
    if(!best || t<best){
      localStorage.setItem("apex_best",t);
    }

    // LEADERBOARD
    let scores=JSON.parse(localStorage.getItem("apex_scores"))||[];
    scores.push(t);
    scores.sort((a,b)=>a-b);
    scores=scores.slice(0,5);
    localStorage.setItem("apex_scores",JSON.stringify(scores));

    document.getElementById("result").innerHTML =
      `${tier}<br>${t.toFixed(2)}s`;

    showLeaderboard();

    setTimeout(()=>{
      showScreen(t,percentile,rank,tier);
    },1000);

  } else {
    document.getElementById("result").innerText="❌ Wrong";
  }
}

// LEADERBOARD
function showLeaderboard(){

  let scores=JSON.parse(localStorage.getItem("apex_scores"))||[];

  let html="<b>🏆 Apex Board:</b><br>";

  scores.forEach((t,i)=>{
    html+=`${i+1}. ${t.toFixed(2)}s<br>`;
  });

  document.getElementById("leaderboard").innerHTML=html;
}

showLeaderboard();

</script>

</body>
</html>
