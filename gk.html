<!DOCTYPE html>
<html>
<head>
  <title>General Knowledge Quiz | MentorLoop EDU</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #111827, #1f2937);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #f3f4f6;
    }

    .card {
      background: #1f2937;
      padding: 30px;
      border-radius: 18px;
      width: 95%;
      max-width: 650px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.5);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #60a5fa;
    }

    #question {
      font-size: 18px;
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      background: #374151;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      font-size: 15px;
    }

    button:hover {
      background: #3b82f6;
    }

    .score {
      margin-top: 15px;
      font-weight: bold;
      text-align: right;
      color: #60a5fa;
    }

    .progress {
      height: 6px;
      background: #374151;
      border-radius: 5px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #3b82f6;
      transition: width 0.3s;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>🌍 General Knowledge Quiz</h1>

  <div class="progress">
    <div class="progress-bar" id="progress"></div>
  </div>

  <p id="question"></p>
  <div id="options"></div>
  <div class="score">Score: <span id="score">0</span></div>
</div>

<script type="module">

// 🔥 FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBOP356DMuNyWQyHDbksw0i_dWXfXsbQvI",
  authDomain: "mentorloop-55a37.firebaseapp.com",
  projectId: "mentorloop-55a37"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


// 🔐 UID
if (!localStorage.getItem("ml_uid")) {
  localStorage.setItem("ml_uid", "user_" + Math.random().toString(36).substring(2, 10));
}

// 📅 WEEK
function getWeek() {
  let d = new Date();
  let onejan = new Date(d.getFullYear(),0,1);
  let week = Math.ceil((((d - onejan)/86400000)+onejan.getDay()+1)/7);
  return d.getFullYear()+"-W"+week;
}

// 🔥 FIREBASE SYNC
async function syncToFirebase(points){
  const uid = localStorage.getItem("ml_uid");

  await setDoc(doc(db, "leaderboard", uid), {
    name: localStorage.getItem("ml_name") || "Guest",
    points: points,
    week: getWeek()
  });
}

// 💎 POINT SYSTEM
function addPoints(amount){
  let current = parseInt(localStorage.getItem("ml_points")) || 0;
  let newPoints = current + amount;

  localStorage.setItem("ml_points", newPoints);
  syncToFirebase(newPoints);
}


// 🧠 SUBJECT SYSTEM
const SUBJECT = "gk";

function ensureSubject(){
  let key = "ml_history_" + SUBJECT;
  if(!localStorage.getItem(key)){
    localStorage.setItem(key, JSON.stringify([]));
  }
}

function saveScoreToHistory(){

  let score = parseInt(localStorage.getItem("ml_last_quiz_score")) || 0;
  if(score <= 0) return;

  ensureSubject();

  let key = "ml_history_" + SUBJECT;
  let history = JSON.parse(localStorage.getItem(key));

  history.push({
    score: score,
    date: new Date().toLocaleDateString()
  });

  if(history.length > 10){
    history.shift();
  }

  localStorage.setItem(key, JSON.stringify(history));
}


// ---------- QUIZ DATA ----------
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

const questions = [
{q:"Capital of France?",a:["Paris","Rome","Berlin"],c:0},
{q:"Largest ocean?",a:["Atlantic","Indian","Pacific"],c:2},
{q:"Who wrote Hamlet?",a:["Shakespeare","Dickens","Hemingway"],c:0},
{q:"Smallest country?",a:["Monaco","Vatican City","Malta"],c:1},
{q:"Currency of Japan?",a:["Yen","Won","Dollar"],c:0},
{q:"Highest mountain?",a:["K2","Everest","Kilimanjaro"],c:1},
{q:"Who discovered gravity?",a:["Newton","Einstein","Galileo"],c:0},
{q:"Fastest land animal?",a:["Lion","Cheetah","Horse"],c:1},
{q:"Largest desert?",a:["Sahara","Gobi","Arctic"],c:0},
{q:"National sport of Japan?",a:["Karate","Sumo","Judo"],c:1},
];

// expand safely
while (questions.length < 100) {
  questions.push(...questions.slice(0,10));
}
questions.length = 100;


// ---------- GAME ----------
let used = [];
let score = 0;
let count = 0;
const total = 10;

function getQuestion() {
  let index;
  do {
    index = Math.floor(Math.random()*questions.length);
  } while (used.includes(index));
  used.push(index);
  return questions[index];
}

function loadQuestion() {

  if (count >= total) {

    let percent = Math.round((score/total)*100);

    // 💎 SAVE SCORE
    localStorage.setItem("ml_last_quiz_score", percent);

    // 💎 SAVE HISTORY
    saveScoreToHistory();

    // 🎯 BONUS
    const today = new Date().toDateString();
    const key = "ml_quiz_reward";

    if(percent >= 80 && localStorage.getItem(key) !== today){
      addPoints(5);
      localStorage.setItem(key, today);
    }

    document.querySelector(".card").innerHTML =
      `<h1>Quiz Finished!</h1>
       <p>Your Score: <strong>${score} / ${total}</strong></p>
       <p>Percentage: <strong>${percent}%</strong></p>
       <button onclick="location.reload()">Play Again</button>`;
    return;
  }

  const q = getQuestion();
  count++;

  document.getElementById("question").textContent = q.q;
  const options = document.getElementById("options");
  options.innerHTML = "";

  q.a.forEach((opt,i)=>{
    const btn = document.createElement("button");
    btn.textContent = opt;

    btn.onclick = ()=>{
      if(i===q.c){
        score++;
        addPoints(2);
      }
      document.getElementById("score").textContent = score;
      updateProgress();
      loadQuestion();
    };

    options.appendChild(btn);
  });
}

function updateProgress(){
  document.getElementById("progress").style.width = (count/total*100)+"%";
}

loadQuestion();

</script>

</body>
</html>
