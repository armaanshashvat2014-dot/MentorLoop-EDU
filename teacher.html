<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MentorLoop EDU</title>

<style>
body{
margin:0;
font-family:'Segoe UI';
background:#020617;
color:#e2e8f0;
}

.nav{
display:flex;
flex-wrap:wrap;
background:#0f172a;
padding:10px;
}

.nav button{
margin:5px;
padding:10px 14px;
border:none;
border-radius:8px;
background:#38bdf8;
cursor:pointer;
font-weight:bold;
transition:0.2s;
}

.nav button:hover{
background:#0ea5e9;
transform:scale(1.05);
}

.page{
display:none;
padding:20px;
}

.active{
display:block;
}

.card{
background:#020617;
padding:20px;
border-radius:15px;
max-width:800px;
margin:auto;
text-align:center;
box-shadow:0 0 30px rgba(56,189,248,0.2);
}

h1{
color:#38bdf8;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<div class="nav">


<button onclick="window.location.href='index.html'">
Home
</button>
<button onclick="window.location.href='create.html'">

</button>

<button onclick="window.location.href='quizdash.html'">

<button onclick="window.location.href='class.html'">

<button onclick="window.location.href='video.html'">

</button>

<button onclick="window.location.href='god-level.html'">

<button onclick="window.location.href='classroom.html'">

</button>

<button onclick="window.location.href='offline.html'">

More features coming soon…

<script>

// SIMPLE NAV SYSTEM
function show(id){
document.querySelectorAll('.page')
.forEach(p=>p.classList.remove('active'));

document.getElementById(id).classList.add('active');
}

</script>
