<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MentorLoop EDU - Advanced</title>

<style>
body{margin:0;font-family:'Segoe UI';background:#020617;color:#e2e8f0;}
.nav{display:flex;flex-wrap:wrap;background:#0f172a;padding:10px;}
.nav button{margin:5px;padding:8px;border:none;border-radius:8px;background:#38bdf8;cursor:pointer;}
.page{display:none;padding:20px;}
.active{display:block;}
.card{background:#020617;padding:20px;border-radius:15px;max-width:700px;margin:auto;text-align:center;box-shadow:0 0 30px rgba(56,189,248,0.2);}
button{margin:4px;}
</style>

</head>
<body>

<div class="nav">
<button onclick="show('homework')">Homework</button>
<button onclick="show('worksheet')">Worksheet</button>
<button onclick="show('warmup')">Warmup</button>
<button onclick="show('reset')">Reset</button>
<button onclick="show('battle')">Battle</button>
<button onclick="show('adaptive')">Adaptive</button>
<button onclick="window.location.href='create.html';">Make quizzes for students</button>
<button onclick="window.location.href='quizdash.html';">Use default quizzes for 6th+</button>
<button onclick="window.location.href='class.html';">Use default quizzes for 1st-5th</button>
<button onclick="window.location.href='video.html';">Learn with videos</button>
<button onclick="window.location.href='god-level.html';">Use a learning system</button>
</div>

<div id="homework" class="page active">
<div class="card">

<h2>📚 Advanced Homework Generator</h2>

<select id="grade">
<option value="1">G1</option><option value="2">G2</option>
<option value="3">G3</option><option value="4">G4</option>
<option value="5">G5</option><option value="6">G6</option>
<option value="7">G7</option><option value="8">G8</option>
<option value="9">G9</option><option value="10">G10</option>
<option value="11">G11</option>
</select>

<select id="subject">
<option value="math">Math</option>
<option value="science">Science</option>
<option value="english">English</option>
<option value="gk">GK</option>
</select>

<select id="difficulty">
<option value="easy">Easy</option>
<option value="medium">Medium</option>
<option value="hard">Hard</option>
</select>

<br><br>

<label>
<input type="checkbox" id="aiToggle" checked>
Use AI Difficulty
</label>

<br><br>

<button onclick="generateHW()">Generate Homework</button>
<button onclick="shareHW()">Share 🔗</button>

<div id="hw"></div>

</div>
</div>

<div id="adaptive" class="page">
<div class="card">
<h2>🧠 Adaptive Level</h2>
<p id="level"></p>
</div>
</div>

<script>

// NAV
function show(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

// RANDOM
function rand(min,max){
return Math.floor(Math.random()*(max-min+1))+min;
}

// AI STATS
let studentStats = JSON.parse(localStorage.getItem("stats")) || {
correct:0,
wrong:0,
level:"easy"
};

let history=new Set();

// 🧠 ADVANCED QUESTION ENGINE
function genQuestion(grade, subject, difficulty){

grade=parseInt(grade);

// ================= MATH =================
if(subject==="math"){

// EASY
if(difficulty==="easy"){
if(grade<=4) return `${rand(10,50)} + ${rand(10,50)} = ?`;
if(grade<=6) return `${rand(20,100)} - ${rand(10,50)} = ?`;
if(grade<=8){
let a=rand(1,10), b=rand(1,10);
return `${a}/${b} + ${rand(1,5)}/${rand(1,5)} = ?`;
}
if(grade<=11){
let x=rand(1,10);
return `${x}x + ${rand(1,10)} = ${rand(20,50)}, find x`;
}
}

// MEDIUM
if(difficulty==="medium"){
if(grade<=6) return `${rand(2,20)} × ${rand(2,20)} = ?`;
if(grade<=8){
let a=rand(1,10), b=rand(1,10);
return `${a}/${b} × ${rand(2,10)} = ?`;
}
if(grade<=10){
let x=rand(1,10);
return `Solve: ${x}x + ${rand(5,20)} = ${rand(30,80)}`;
}
if(grade<=11){
let a=rand(1,5);
return `Factorize: x² + ${a*2}x + ${a*a}`;
}
}

// HARD
if(difficulty==="hard"){
if(grade<=8){
let a=rand(1,10), b=rand(1,10);
return `Simplify: (${a}/${b}) ÷ ${rand(2,10)}`;
}
if(grade<=10){
let a=rand(1,10);
return `Solve quadratic: x² + ${a}x + ${rand(1,20)} = 0`;
}
if(grade<=11){
let a=rand(1,10);
return `Find roots: x² - ${a}x + ${rand(1,20)} = 0`;
}
}
}

// ================= SCIENCE =================
if(subject==="science"){

let qEasy=[
"Define photosynthesis.",
"What is gravity?",
"What is friction?",
"What is energy?"
];

let qMed=[
"Explain Newton’s First Law with example.",
"Why do objects fall to Earth?",
"Explain types of energy with examples.",
"Describe structure of an atom."
];

let qHard=[
"Explain photosynthesis process step-by-step.",
"Derive Ohm’s Law.",
"Explain laws of motion with real-life application.",
"Why is conservation of energy important?"
];

let set = difficulty==="easy"?qEasy: difficulty==="medium"?qMed:qHard;
return set[rand(0,set.length-1)] + " (Grade " + grade + ")";
}

// ================= ENGLISH =================
if(subject==="english"){

let easy=[
"Plural of child?",
"Opposite of fast?",
"Make sentence with 'happy'."
];

let med=[
"Write 2 sentences using 'because'.",
"Identify verb in sentence: She runs fast.",
"Convert to past tense: I go to school."
];

let hard=[
"Write a short paragraph (50 words) on climate change.",
"Explain noun, verb, adjective with examples.",
"Write a formal letter to your teacher."
];

let set = difficulty==="easy"?easy: difficulty==="medium"?med:hard;
return set[rand(0,set.length-1)];
}

// ================= GK =================
if(subject==="gk"){

let gk=[
"Explain climate change impact.",
"What is GDP and why is it important?",
"Describe democracy with example.",
"What is global warming?",
"Explain importance of United Nations."
];

return gk[rand(0,gk.length-1)];
}

}

// AI ADJUST
function adjustDifficulty(){
let total=studentStats.correct+studentStats.wrong;
if(total>=5){
let acc=studentStats.correct/total;
if(acc>0.7) studentStats.level="hard";
else if(acc>0.4) studentStats.level="medium";
else studentStats.level="easy";
studentStats.correct=0;
studentStats.wrong=0;
localStorage.setItem("stats",JSON.stringify(studentStats));
}
}

// GENERATE
function generateHW(){

let grade=document.getElementById("grade").value;
let subject=document.getElementById("subject").value;
let selectedDifficulty=document.getElementById("difficulty").value;
let useAI=document.getElementById("aiToggle").checked;

let difficulty = useAI ? studentStats.level : selectedDifficulty;

let list=[];
history.clear();

while(list.length<10){
let q=genQuestion(grade,subject,difficulty);
if(!history.has(q)){
history.add(q);
list.push(q);
}
}

localStorage.setItem("lastHW",JSON.stringify(list));

let html="<b>Homework:</b><br><br>";
list.forEach((q,i)=>{
html+=`${i+1}. ${q}<br>
<button onclick="mark(true)">✔</button>
<button onclick="mark(false)">❌</button><br><br>`;
});

document.getElementById("hw").innerHTML=html;

updateAdaptive();
}

// MARK
function mark(correct){
if(correct) studentStats.correct++;
else studentStats.wrong++;
adjustDifficulty();
updateAdaptive();
}

// SHARE
function shareHW(){
let hw=localStorage.getItem("lastHW");
let link=location.href.split("?")[0]+"?hw="+btoa(hw);
navigator.clipboard.writeText(link);
alert("Link copied!");
}

// ADAPTIVE
function updateAdaptive(){
document.getElementById("level").innerText="Level: "+studentStats.level;
}

updateAdaptive();

</script>

</body>
</html>
