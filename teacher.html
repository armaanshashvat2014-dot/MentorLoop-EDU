<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MentorLoop EDU - Advanced</title>

<style>
body{margin:0;font-family:'Segoe UI';background:#020617;color:#e2e8f0;}
.nav{display:flex;flex-wrap:wrap;background:#0f172a;padding:10px;}
.nav button{margin:5px;padding:8px;border:none;border-radius:8px;background:#38bdf8;cursor:pointer;}
.page{display:none;padding:20px;}
.active{display:block;}
.card{background:#020617;padding:20px;border-radius:15px;max-width:700px;margin:auto;text-align:center;box-shadow:0 0 30px rgba(56,189,248,0.2);}
button{margin:4px;}
</style>

</head>
<body>

<div class="nav">
<button onclick="show('homework')">Homework</button>
<button onclick="show('worksheet')">Worksheet</button>
<button onclick="show('warmup')">Warmup</button>
<button onclick="show('reset')">Reset</button>
<button onclick="show('battle')">Battle</button>
<button onclick="show('adaptive')">Adaptive</button>
<button onclick="window.location.href='create.html';">Make quizzes</button>
<button onclick="window.location.href='quizdash.html';">Use quizzes for 6th+</button>
<button onclick="window.location.href='class.html';">Use quizzes for 1st-5th</button>
<button onclick="window.location.href='video.html';">Teach with videos</button>
<button onclick="window.location.href='god-level.html';">Use a learning system</button>
<button onclick="window.location.href='https://chatbot-79kdx1gk0gm.streamlit.app/';">Produce errorless homework</button>
  <button onclick="window.location.href='classroom.html';">EDU Class</button>
  <button onclick="window.location.href='offline.html';">Offline Mode</button>
</div>

<div id="homework" class="page active">
<div class="card">

<h2>📚 Advanced Homework Generator</h2>

<select id="grade">
<option value="1">G1</option><option value="2">G2</option>
<option value="3">G3</option><option value="4">G4</option>
<option value="5">G5</option><option value="6">G6</option>
<option value="7">G7</option><option value="8">G8</option>
<option value="9">G9</option><option value="10">G10</option>
<option value="11">G11</option>
</select>

<select id="subject">
<option value="math">Math</option>
<option value="science">Science</option>
<option value="english">English</option>
<option value="gk">GK</option>
</select>

<br><br>

<button onclick="generateHW()">Generate Homework</button>

<div id="hw"></div>

</div>
</div>

<script>

// NAV
function show(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

// RANDOM
function rand(min,max){
return Math.floor(Math.random()*(max-min+1))+min;
}

// GLOBAL
let allQuestions = [];
let currentIndex = 0;

// 🧠 SMART QUESTION GENERATOR
function genQuestion(grade, subject){

grade=parseInt(grade);

// ---------- MATH ----------
if(subject==="math"){
let a=rand(1,100), b=rand(1,100), c=rand(1,10);

if(grade<=4) return `Solve the addition: ${a} + ${b}.`;
if(grade<=6) return `Calculate the difference: ${a} - ${b}.`;
if(grade<=8) return `Multiply: ${a} × ${c}.`;
if(grade<=10) return `Solve for x: ${c}x + ${a} = ${b}.`;
return `Factorize the expression: x² + ${c}x + ${rand(1,20)}.`;
}

// ---------- SCIENCE ----------
if(subject==="science"){
let topics=["gravity","photosynthesis","energy","friction","atoms","force","motion"];
let t=topics[rand(0,topics.length-1)];
return `Explain the concept of ${t} with a suitable example.`;
}

// ---------- ENGLISH ----------
if(subject==="english"){
let topics=["your favorite hobby","your school day","a memorable event","a rainy day"];
return `Write a short paragraph (50–80 words) about ${topics[rand(0,topics.length-1)]}.`;
}

// ---------- GK ----------
if(subject==="gk"){
let topics=["global warming","democracy","United Nations","GDP","climate change"];
return `Explain ${topics[rand(0,topics.length-1)]} in simple terms.`;
}

}

// 📚 GENERATE 100 QUESTIONS SAFELY
function generateFullSet(grade, subject){

let set = new Set();
let attempts = 0;

while(set.size < 100 && attempts < 500){
set.add(genQuestion(grade,subject));
attempts++;
}

// fallback safety
while(set.size < 100){
set.add(genQuestion(grade,subject) + " (Try again)");
}

return Array.from(set);
}

// 🧾 DISPLAY 10 QUESTIONS
function showBatch(){

let batch = allQuestions.slice(currentIndex, currentIndex+10);

let html = `
<h2>📚 Homework</h2>
<p><b>Questions ${currentIndex+1} - ${currentIndex+batch.length}</b></p>
<hr>
`;

batch.forEach((q,i)=>{
html += `<p><b>Q${currentIndex+i+1}.</b> ${q}</p>`;
});

if(currentIndex + 10 < allQuestions.length){
html += `<button onclick="nextBatch()">Next 10 ➡️</button>`;
}

document.getElementById("hw").innerHTML = html;
}

// NEXT
function nextBatch(){
currentIndex += 10;
showBatch();
}

// 🚀 MAIN FUNCTION
function generateHW(){

let grade=document.getElementById("grade").value;
let subject=document.getElementById("subject").value;

// RESET
currentIndex = 0;

// GENERATE
allQuestions = generateFullSet(grade, subject);

// SAVE
localStorage.setItem("hw_full", JSON.stringify(allQuestions));

// DISPLAY
showBatch();
}

</script>

</body>
</html>
