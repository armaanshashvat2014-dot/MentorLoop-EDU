<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MentorLoop Teacher Tools</title>

<style>
body{margin:0;font-family:'Segoe UI';background:#020617;color:#e2e8f0;}
.nav{display:flex;flex-wrap:wrap;background:#0f172a;padding:10px;}
.nav button{margin:5px;padding:8px;border:none;border-radius:8px;background:#38bdf8;cursor:pointer;}
.page{display:none;padding:20px;}
.active{display:block;}
.card{background:#020617;padding:20px;border-radius:15px;max-width:500px;margin:auto;text-align:center;box-shadow:0 0 30px rgba(56,189,248,0.2);}
.option{background:#1e293b;padding:10px;margin:5px;border-radius:8px;cursor:pointer;}
</style>

</head>
<body>

<div class="nav">
<button onclick="show('homework')">Homework</button>
<button onclick="show('worksheet')">Worksheet</button>
<button onclick="show('warmup')">Warmup</button>
<button onclick="show('reset')">Reset</button>
<button onclick="show('battle')">Battle</button>
<button onclick="show('adaptive')">Adaptive</button>
</div>

<!-- HOMEWORK -->
<div id="homework" class="page active">
<div class="card">

<h2>🔗 Homework Generator</h2>

<select id="grade">
<option value="1">G1</option><option value="2">G2</option>
<option value="3">G3</option><option value="4">G4</option>
<option value="5">G5</option><option value="6">G6</option>
<option value="7">G7</option><option value="8">G8</option>
<option value="9">G9</option><option value="10">G10</option>
<option value="11">G11</option>
</select>

<select id="subject">
<option value="math">Math</option>
<option value="science">Science</option>
<option value="english">English</option>
<option value="gk">GK</option>
</select>

<select id="difficulty">
<option value="easy">Easy</option>
<option value="medium">Medium</option>
<option value="hard">Hard</option>
</select>

<br><br>

<button onclick="generateHW()">Generate Homework</button>

<div id="hw"></div>

</div>
</div>

<!-- WORKSHEET -->
<div id="worksheet" class="page">
<div class="card">
<h2>🧾 Worksheet</h2>
<button onclick="printSheet()">Print Clean Worksheet</button>
</div>
</div>

<!-- WARMUP -->
<div id="warmup" class="page">
<div class="card">
<h2>🏫 Warmup</h2>
<div id="warmQ"></div>
</div>
</div>

<!-- RESET -->
<div id="reset" class="page">
<div class="card">
<h2>🔔 Reset</h2>
<div id="resetQ"></div>
</div>
</div>

<!-- BATTLE -->
<div id="battle" class="page">
<div class="card">
<h2>⚔️ Class Battle</h2>
<p>A: <span id="a">0</span> | B: <span id="b">0</span></p>
<button onclick="score('a')">Team A</button>
<button onclick="score('b')">Team B</button>
</div>
</div>

<!-- ADAPTIVE -->
<div id="adaptive" class="page">
<div class="card">
<h2>🧬 Adaptive</h2>
<p id="level"></p>
</div>
</div>

<script>

// NAVIGATION
function show(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

// RANDOM HELPER
function rand(min,max){
return Math.floor(Math.random()*(max-min+1))+min;
}

// QUESTION ENGINE
function genQuestion(grade, subject, difficulty){

grade = parseInt(grade);

// MATH
if(subject==="math"){

if(difficulty==="easy"){
if(grade<=3) return `${rand(1,10)} + ${rand(1,10)} = ?`;
if(grade<=5) return `${rand(10,50)} - ${rand(1,20)} = ?`;
if(grade<=7) return `${rand(2,12)} × ${rand(2,10)} = ?`;
}

if(difficulty==="medium"){
if(grade<=6) return `${rand(2,15)} × ${rand(2,15)} = ?`;
if(grade<=8) return `${rand(50,200)} ÷ ${rand(2,12)} = ?`;
if(grade<=11){
let x=rand(1,20);
return `x + ${x} = ${x*2}, find x`;
}
}

if(difficulty==="hard"){
if(grade<=8){
let n=rand(10,20);
return `${n}² = ?`;
}
if(grade<=11){
let n=rand(10,30);
return `√${n*n} = ?`;
}
}
}

// SCIENCE
if(subject==="science"){
let arr=[
"What is the unit of force?",
"What gas do humans breathe?",
"What is photosynthesis?",
"What is boiling point of water?",
"What is basic unit of life?"
];
return arr[rand(0,arr.length-1)];
}

// ENGLISH
if(subject==="english"){
let arr=[
"Opposite of happy?",
"Plural of child?",
"Past tense of go?",
"Synonym of fast?",
"Adjective of beauty?"
];
return arr[rand(0,arr.length-1)];
}

// GK
if(subject==="gk"){
let arr=[
"Capital of India?",
"Largest ocean?",
"National animal of India?",
"Fastest land animal?",
"Currency of India?"
];
return arr[rand(0,arr.length-1)];
}
}

// GENERATE HOMEWORK
function generateHW(){

let grade=document.getElementById("grade").value;
let subject=document.getElementById("subject").value;
let difficulty=document.getElementById("difficulty").value;

let used=new Set();
let list=[];

while(list.length<5){
let q=genQuestion(grade,subject,difficulty);
if(!used.has(q)){
used.add(q);
list.push(q);
}
}

// SAVE
localStorage.setItem("lastHW",JSON.stringify(list));

// DISPLAY
let html="<b>Homework:</b><br><br>";
list.forEach((q,i)=>{
html+=`${i+1}. ${q}<br>`;
});
document.getElementById("hw").innerHTML=html;

// UPDATE OTHER FEATURES
updateWarmup(grade,subject,difficulty);
updateReset(grade,subject,difficulty);
updateAdaptive(difficulty);
}

// PRINT CLEAN WORKSHEET
function printSheet(){

let hw=JSON.parse(localStorage.getItem("lastHW"))||[];

let html="<h2>Homework Worksheet</h2><br>";
hw.forEach((q,i)=>{
html+=`${i+1}. ${q}<br><br>`;
});

let win=window.open("");
win.document.write(html);
win.print();
}

// WARMUP
function updateWarmup(g,s,d){
document.getElementById("warmQ").innerText=
"Warmup: "+genQuestion(g,s,d);
}

// RESET
function updateReset(g,s,d){
document.getElementById("resetQ").innerText=
"Reset: "+genQuestion(g,s,d);
}

// BATTLE
let A=0,B=0;
function score(t){
if(t==="a") A++; else B++;
document.getElementById("a").innerText=A;
document.getElementById("b").innerText=B;
}

// ADAPTIVE
function updateAdaptive(diff){
let next = diff==="easy" ? "Medium" : diff==="medium" ? "Hard" : "Hard";
document.getElementById("level").innerText="Next Difficulty: "+next;
}

</script>

</body>
</html>
