<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MentorLoop EDU-teacher zone</title>

<style>
body{margin:0;font-family:'Segoe UI';background:#020617;color:#e2e8f0;}
.nav{display:flex;flex-wrap:wrap;background:#0f172a;padding:10px;}
.nav button{margin:5px;padding:8px;border:none;border-radius:8px;background:#38bdf8;cursor:pointer;}
.page{display:none;padding:20px;}
.active{display:block;}
.card{background:#020617;padding:20px;border-radius:15px;max-width:650px;margin:auto;text-align:center;box-shadow:0 0 30px rgba(56,189,248,0.2);}
button{margin:4px;}
</style>

</head>
<body>

<div class="nav">
<button onclick="show('homework')">Homework</button>
<button onclick="show('worksheet')">Worksheet</button>
<button onclick="show('warmup')">Warmup</button>
<button onclick="show('reset')">Reset</button>
<button onclick="show('battle')">Battle</button>
<button onclick="show('adaptive')">Adaptive</button>
</div>

<div id="homework" class="page active">
<div class="card">

<h2>📚 Homework Generator</h2>

<select id="grade">
<option value="1">G1</option><option value="2">G2</option>
<option value="3">G3</option><option value="4">G4</option>
<option value="5">G5</option><option value="6">G6</option>
<option value="7">G7</option><option value="8">G8</option>
<option value="9">G9</option><option value="10">G10</option>
<option value="11">G11</option>
</select>

<select id="subject">
<option value="math">Math</option>
<option value="science">Science</option>
<option value="english">English</option>
<option value="gk">GK</option>
</select>

<select id="difficulty">
<option value="easy">Easy</option>
<option value="medium">Medium</option>
<option value="hard">Hard</option>
</select>

<br><br>

<button onclick="generateHW()">Generate Homework</button>
<button onclick="shareHW()">Share 🔗</button>

<div id="hw"></div>

</div>
</div>

<div id="worksheet" class="page">
<div class="card">
<h2>🧾 Worksheet</h2>
<button onclick="printSheet()">Print</button>
</div>
</div>

<div id="warmup" class="page">
<div class="card">
<h2>🔥 Warmup</h2>
<div id="warmQ"></div>
</div>
</div>

<div id="reset" class="page">
<div class="card">
<h2>🔄 Reset</h2>
<div id="resetQ"></div>
</div>
</div>

<div id="battle" class="page">
<div class="card">
<h2>⚔️ Battle</h2>
<p>A: <span id="a">0</span> | B: <span id="b">0</span></p>
<button onclick="score('a')">A</button>
<button onclick="score('b')">B</button>
</div>
</div>

<div id="adaptive" class="page">
<div class="card">
<h2>🧠 Adaptive</h2>
<p id="level"></p>
</div>
</div>

<script>

// NAV
function show(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

// RANDOM
function rand(min,max){
return Math.floor(Math.random()*(max-min+1))+min;
}

// AI DATA
let studentStats = JSON.parse(localStorage.getItem("stats")) || {
correct:0,
wrong:0,
level:"easy"
};

let history=new Set();

// QUESTION ENGINE
function genQuestion(grade, subject, difficulty){

grade=parseInt(grade);

// ===== MATH =====
if(subject==="math"){
if(difficulty==="easy"){
if(grade<=3) return `${rand(1,20)} + ${rand(1,20)} = ?`;
if(grade<=5) return `${rand(20,100)} - ${rand(1,50)} = ?`;
if(grade<=7) return `${rand(2,12)} × ${rand(2,10)} = ?`;
}
if(difficulty==="medium"){
if(grade<=6) return `${rand(2,20)} × ${rand(2,20)} = ?`;
if(grade<=8) return `${rand(50,300)} ÷ ${rand(2,15)} = ?`;
if(grade<=11){
let x=rand(1,20);
return `x + ${x} = ${x*2}, find x`;
}
}
if(difficulty==="hard"){
if(grade<=8) return `${rand(10,25)}² = ?`;
if(grade<=11){
let n=rand(10,30);
return `√${n*n} = ?`;
}
}
}

// ===== SCIENCE (1000+ ENGINE) =====
if(subject==="science"){

let q="";

if(difficulty==="easy"){
if(grade<=3){
let t=["plant","animal","water","air","sun","soil"];
let a=["need to grow","is important","helps life","is useful"];
q=`Why does ${t[rand(0,5)]} ${a[rand(0,3)]}?`;
}
else if(grade<=6){
let t=["plants","animals","air","water cycle","food","body"];
q=`Why are ${t[rand(0,5)]} important?`;
}
}

if(difficulty==="medium"){
if(grade<=8){
let t=["photosynthesis","gravity","friction","evaporation","force"];
q=`Explain ${t[rand(0,4)]}.`;
}
else{
let t=["velocity","energy","cells","atoms","ecosystem"];
q=`Define ${t[rand(0,4)]}.`;
}
}

if(difficulty==="hard"){
let t=["Newton’s laws","Ohm’s law","chemical reactions","states of matter","energy transformation"];
q=`Explain in detail ${t[rand(0,4)]}.`;
}

let extra=["with example","in daily life","simply","step by step","for class "+grade];
if(Math.random()>0.5) q+=" "+extra[rand(0,4)];

return q;
}

// ===== ENGLISH =====
if(subject==="english"){
let easy=["cat","dog","book","toy"];
let med=["because","although","however","quickly"];
let hard=["metaphor","clause","passive voice"];

if(difficulty==="easy") return `Plural of ${easy[rand(0,3)]}?`;
if(difficulty==="medium") return `Make sentence using "${med[rand(0,3)]}".`;
if(difficulty==="hard") return `Define ${hard[rand(0,2)]}.`;
}

// ===== GK =====
if(subject==="gk"){
let easy=["capital of India","national animal","national bird"];
let med=["UN","democracy","constitution"];
let hard=["global warming","GDP","climate change"];

if(difficulty==="easy") return `What is ${easy[rand(0,2)]}?`;
if(difficulty==="medium") return `Explain ${med[rand(0,2)]}.`;
if(difficulty==="hard") return `Explain ${hard[rand(0,2)]}.`;
}
}

// AI ADJUST
function adjustDifficulty(){
let total=studentStats.correct+studentStats.wrong;
if(total>=5){
let acc=studentStats.correct/total;
if(acc>0.7) studentStats.level="hard";
else if(acc>0.4) studentStats.level="medium";
else studentStats.level="easy";
studentStats.correct=0;
studentStats.wrong=0;
localStorage.setItem("stats",JSON.stringify(studentStats));
}
}

// GENERATE
function generateHW(){

let grade=document.getElementById("grade").value;
let subject=document.getElementById("subject").value;
let difficulty=studentStats.level;

let list=[];
history.clear();

while(list.length<10){
let q=genQuestion(grade,subject,difficulty);
if(!history.has(q)){
history.add(q);
list.push(q);
}
}

localStorage.setItem("lastHW",JSON.stringify(list));

let html="<b>Homework:</b><br><br>";
list.forEach((q,i)=>{
html+=`${i+1}. ${q}<br>
<button onclick="mark(true)">✔</button>
<button onclick="mark(false)">❌</button><br><br>`;
});

document.getElementById("hw").innerHTML=html;

updateWarmup(list);
updateReset(list);
updateAdaptive();
}

// MARK
function mark(correct){
if(correct) studentStats.correct++;
else studentStats.wrong++;
adjustDifficulty();
localStorage.setItem("stats",JSON.stringify(studentStats));
updateAdaptive();
}

// SHARE
function shareHW(){
let hw=localStorage.getItem("lastHW");
let link=location.href.split("?")[0]+"?hw="+btoa(hw);
navigator.clipboard.writeText(link);
alert("Link copied!");
}

// LOAD SHARE
window.onload=function(){
let p=new URLSearchParams(location.search);
let d=p.get("hw");
if(d){
let data=JSON.parse(atob(d));
localStorage.setItem("lastHW",JSON.stringify(data));
let html="<b>Shared Homework:</b><br><br>";
data.forEach((q,i)=> html+=`${i+1}. ${q}<br>`);
document.getElementById("hw").innerHTML=html;
}
updateAdaptive();
}

// CONNECT
function updateWarmup(list){
document.getElementById("warmQ").innerText="Warmup: "+list[0];
}
function updateReset(list){
document.getElementById("resetQ").innerText="Reset: "+list[1];
}
function updateAdaptive(){
document.getElementById("level").innerText="Level: "+studentStats.level;
}

// BATTLE
let A=0,B=0;
function score(t){
if(t==="a") A++; else B++;
document.getElementById("a").innerText=A;
document.getElementById("b").innerText=B;
}

// PRINT
function printSheet(){
let hw=JSON.parse(localStorage.getItem("lastHW"))||[];
let html="<h2>Homework</h2><br>";
hw.forEach((q,i)=> html+=`${i+1}. ${q}<br><br>`);
let w=window.open("");
w.document.write(html);
w.print();
}

</script>

</body>
</html>
