<!DOCTYPE html>
<html>
<head>
<title>MentorLoop Classroom</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f1f3f4;
}

/* HEADER */
.header{
background:#1a73e8;
color:white;
padding:20px;
text-align:center;
font-size:22px;
font-weight:bold;
}

/* BANNER */
.banner{
background:#1a73e8;
color:white;
padding:30px;
border-radius:10px;
margin:20px;
}

/* NAV */
.nav{
display:flex;
justify-content:center;
gap:25px;
background:white;
padding:12px;
border-bottom:1px solid #ddd;
}

.nav button{
border:none;
background:none;
font-size:16px;
cursor:pointer;
color:#5f6368;
}

.nav .active{
color:#1a73e8;
border-bottom:2px solid #1a73e8;
}

/* CONTAINER */
.container{
max-width:900px;
margin:auto;
padding:10px;
}

/* CARDS */
.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* BUTTON */
.primary{
background:#1a73e8;
color:white;
border:none;
padding:10px;
margin-top:10px;
border-radius:6px;
cursor:pointer;
}

/* INPUT */
input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

/* FLOAT BUTTON */
.fab{
position:fixed;
bottom:20px;
right:20px;
background:#1a73e8;
color:white;
width:55px;
height:55px;
border-radius:50%;
font-size:28px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

/* STATUS */
.status{
font-size:13px;
color:#5f6368;
margin-top:5px;
}

.hidden{display:none;}

</style>
</head>

<body>

<div class="header">📘 MentorLoop Classroom</div>

<div class="banner">
<h2 id="classTitle">Classroom</h2>
<p>Welcome to your class</p>
</div>

<div class="nav">
<button class="tab active" onclick="showTab('stream')">Stream</button>
<button class="tab" onclick="showTab('classwork')">Classwork</button>
<button class="tab" onclick="showTab('people')">People</button>
</div>

<div class="container">

<!-- STREAM -->
<div id="stream">

<div class="card">
<textarea id="msg" placeholder="Share something with your class..."></textarea>
<button class="primary" id="postBtn">Post</button>
</div>

<div id="feed"></div>

</div>

<!-- CLASSWORK -->
<div id="classwork" class="hidden">

<div id="works"></div>

</div>

<!-- PEOPLE -->
<div id="people" class="hidden">

<div class="card">
<h3>Students</h3>
<ul id="students"></ul>
</div>

</div>

</div>

<!-- FLOAT BUTTON -->
<div id="fab" class="fab hidden">+</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore, collection, addDoc, onSnapshot,
doc, getDoc, setDoc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyBOP356DMuNyWQyHDbksw0i_dWXfXsbQvI",
authDomain:"mentorloop-55a37.firebaseapp.com",
projectId:"mentorloop-55a37"
});

const db = getFirestore(app);

const uid=localStorage.getItem("ml_uid");
const name=localStorage.getItem("ml_name");
const role=localStorage.getItem("ml_role");
const classId=localStorage.getItem("ml_class");

if(role==="Mentor") fab.classList.remove("hidden");

// -------- TABS --------
window.showTab=(id)=>{
document.querySelectorAll(".container > div").forEach(d=>d.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");

document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");
};

// -------- STREAM --------
postBtn.onclick=async()=>{
if(!msg.value) return;

await addDoc(collection(db,"classrooms",classId,"stream"),{
name,text:msg.value,type:"post"
});

msg.value="";
};

onSnapshot(collection(db,"classrooms",classId,"stream"),snap=>{
feed.innerHTML="";

snap.forEach(d=>{
let p=d.data();

feed.innerHTML+=`
<div class="card">
<b>${p.name}</b>
<p>${p.text}</p>
</div>
`;
});
});

// -------- FAB (CREATE ASSIGNMENT) --------
fab.onclick=async()=>{

let title=prompt("Assignment title:");
let marks=prompt("Marks:");
let deadline=prompt("Deadline (YYYY-MM-DD):");

if(!title) return;

await addDoc(collection(db,"classrooms",classId,"worksheets"),{
title,marks:parseInt(marks),deadline
});

await addDoc(collection(db,"classrooms",classId,"stream"),{
name:"SYSTEM",
text:"New assignment: "+title,
type:"assignment"
});
};

// -------- CLASSWORK --------
onSnapshot(collection(db,"classrooms",classId,"worksheets"),snap=>{
works.innerHTML="";

snap.forEach(docSnap=>{
let ws=docSnap.data();

works.innerHTML+=`
<div class="card">
<b>${ws.title}</b>

<textarea id="ans_${docSnap.id}" placeholder="Your answer"></textarea>
<input type="file" id="file_${docSnap.id}" accept=".pptx">

<button class="primary" onclick="submit('${docSnap.id}')">Turn In</button>
<p class="status" id="status_${docSnap.id}">Not submitted</p>
</div>
`;
});
});

// -------- SUBMIT --------
window.submit=async(id)=>{

let ans=document.getElementById("ans_"+id).value;
let file=document.getElementById("file_"+id).files[0];

if(!ans && !file){alert("Submit something");return;}

await setDoc(doc(db,"classrooms",classId,"worksheets",id,"submissions",uid),{
answer:ans,file:file?file.name:null
});

document.getElementById("status_"+id).innerText="Turned in";
};

// -------- STUDENTS --------
onSnapshot(collection(db,"classrooms",classId,"students"),snap=>{
students.innerHTML="";
snap.forEach(d=>{
students.innerHTML+=`<li>${d.data().name}</li>`;
});
});

</script>

</body>
</html>
