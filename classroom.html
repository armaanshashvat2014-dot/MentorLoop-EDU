<!DOCTYPE html>
<html>
<head>
<title>MentorLoop EDU Classroom</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:sans-serif;background:#0f172a;color:white;text-align:center}
.card{background:#1e293b;padding:20px;margin:15px auto;max-width:700px;border-radius:10px}
input,button,textarea{width:100%;padding:10px;margin-top:10px;border:none;border-radius:6px}
button{background:#22c55e;color:white}
.chat{background:#020617;padding:10px;border-radius:6px;margin-top:10px}
.danger{background:red}
</style>
</head>

<body>

<h1>🏫 Classroom</h1>

<!-- CHAT -->
<div class="card">
<h3>💬 Chat</h3>
<div id="chat"></div>

<input id="msg" placeholder="Type message">
<button onclick="sendMsg()">Send</button>

<input id="link" placeholder="Paste link">
<button onclick="sendLink()">Send Link</button>
</div>

<!-- TEACHER PANEL -->
<div class="card" id="teacherPanel" style="display:none">

<h3>📄 Add Worksheet</h3>
<input id="title">
<input id="marks" placeholder="Marks">
<input type="datetime-local" id="deadline">
<button onclick="addWS()">Add</button>

<h3>🎥 Start Online Class</h3>
<input id="meetLink" placeholder="Paste Meet/Zoom link">
<button onclick="startClass()">Start</button>

<h3>📥 Submissions</h3>
<div id="submissions"></div>

<h3>📊 Analytics</h3>
<p id="avg"></p>
<p id="count"></p>
<canvas id="chart"></canvas>

</div>

<!-- WORKSHEETS -->
<div class="card">
<h3>📚 Worksheets</h3>
<div id="works"></div>
</div>

<!-- LEADERBOARD -->
<div class="card">
<h3>🏆 Leaderboard</h3>
<ul id="board"></ul>
</div>

<button onclick="leave()">Leave Class</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore, collection, addDoc, doc, setDoc, getDocs,
onSnapshot, updateDoc, getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app=initializeApp({
apiKey:"AIzaSyBOP356DMuNyWQyHDbksw0i_dWXfXsbQvI",
authDomain:"mentorloop-55a37.firebaseapp.com",
projectId:"mentorloop-55a37"
});

const db=getFirestore(app);

const uid=localStorage.getItem("ml_uid");
const name=localStorage.getItem("ml_name");
const role=localStorage.getItem("ml_role");
const classId=localStorage.getItem("ml_class");

if(role==="Mentor") teacherPanel.style.display="block";

// ---------------- CHAT ----------------
window.sendMsg=async()=>{
if(!msg.value) return;
await addDoc(collection(db,"classrooms",classId,"chat"),{
name,text:msg.value
});
msg.value="";
};

window.sendLink=async()=>{
if(!link.value) return;
await addDoc(collection(db,"classrooms",classId,"chat"),{
name,text:"🔗 "+link.value
});
link.value="";
};

onSnapshot(collection(db,"classrooms",classId,"chat"),snap=>{
chat.innerHTML="";
snap.forEach(d=>{
let m=d.data();
chat.innerHTML+=`<div class="chat">${m.name}: ${m.text}</div>`;
});
});

// ---------------- WORKSHEETS ----------------
window.addWS=async()=>{
await addDoc(collection(db,"classrooms",classId,"worksheets"),{
title:title.value,
marks:parseInt(marks.value),
deadline:deadline.value
});
};

onSnapshot(collection(db,"classrooms",classId,"worksheets"),snap=>{
works.innerHTML="";

snap.forEach(docSnap=>{
let ws=docSnap.data();

works.innerHTML+=`
<div class="card">
<p><b>${ws.title}</b></p>

<textarea id="ans_${docSnap.id}" placeholder="Answer"></textarea>
<input id="link_${docSnap.id}" placeholder="Link">
<input type="file" id="file_${docSnap.id}" accept=".pptx">

<button onclick="submit('${docSnap.id}')">Submit</button>
</div>
`;
});
});

// ---------------- SUBMIT ----------------
window.submit=async(id)=>{

let answer=document.getElementById("ans_"+id).value;
let linkVal=document.getElementById("link_"+id).value;
let file=document.getElementById("file_"+id).files[0];

if(!answer && !linkVal && !file){
alert("Submit something!");
return;
}

if(file && !file.name.endsWith(".pptx")){
alert("Only PPTX allowed");
return;
}

let ws=(await getDoc(doc(db,"classrooms",classId,"worksheets",id))).data();

let now=new Date();
let deadline=new Date(ws.deadline);

let pts=now<=deadline?ws.marks:Math.floor(ws.marks/2);

await setDoc(doc(db,"classrooms",classId,"worksheets",id,"submissions",uid),{
answer,link:linkVal,file:file?file.name:null,score:pts
});

await updateDoc(doc(db,"classrooms",classId,"students",uid),{
points:pts
});

await addDoc(collection(db,"classrooms",classId,"chat"),{
name:"SYSTEM",
text:`${name} submitted ${ws.title}`
});
};

// ---------------- SUBMISSIONS (TEACHER) ----------------
async function loadSubs(){

const snap=await getDocs(collection(db,"classrooms",classId,"worksheets"));

submissions.innerHTML="";

for(const wsDoc of snap.docs){

let wsId=wsDoc.id;
let subSnap=await getDocs(collection(db,"classrooms",classId,"worksheets",wsId,"submissions"));

subSnap.forEach(d=>{
let s=d.data();

submissions.innerHTML+=`
<div class="card">
<p>${d.id}</p>
<p>${s.answer||"-"}</p>
<p>${s.link||"-"}</p>
<p>${s.file||"-"}</p>
<p>Score: ${s.score}</p>
</div>
`;
});
}
}

if(role==="Mentor") loadSubs();

// ---------------- LEADERBOARD ----------------
let chartObj=null;

onSnapshot(collection(db,"classrooms",classId,"students"),snap=>{

let arr=[];

snap.forEach(d=>{
arr.push(d.data());
});

arr.sort((a,b)=>b.points-a.points);

board.innerHTML="";

arr.forEach(s=>{
board.innerHTML+=`<li>${s.name} - ${s.points}</li>`;
});

// analytics
let scores=arr.map(s=>s.points);
let avgScore=scores.reduce((a,b)=>a+b,0)/scores.length||0;

avg.innerText="Average: "+Math.round(avgScore);
count.innerText="Students: "+scores.length;

// chart fix
if(chartObj) chartObj.destroy();

chartObj=new Chart(chart,{
type:'line',
data:{
labels:scores.map((_,i)=>i+1),
datasets:[{data:scores}]
}
});

});

// ---------------- ONLINE CLASS ----------------
window.startClass=async()=>{
await addDoc(collection(db,"classrooms",classId,"chat"),{
name:"SYSTEM",
text:"📢 Join class: "+meetLink.value
});
};

// ---------------- LEAVE ----------------
window.leave=()=>{
localStorage.removeItem("ml_class");
location.href="dashboard.html";
};

</script>

</body>
</html>
