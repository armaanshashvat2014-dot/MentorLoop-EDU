<!DOCTYPE html>
<html>
<head>
<title>MentorLoop Classroom</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:'Segoe UI',sans-serif;background:#f1f3f4;margin:0}

.header{
background:#1a73e8;
color:white;
padding:20px;
text-align:center;
font-size:22px;
}

.nav{
display:flex;
justify-content:center;
gap:20px;
background:white;
padding:10px;
border-bottom:1px solid #ddd;
}

.nav button{
background:none;
border:none;
font-size:16px;
cursor:pointer;
color:#555;
}

.nav .active{
color:#1a73e8;
border-bottom:2px solid #1a73e8;
}

.container{
max-width:900px;
margin:auto;
padding:10px;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

textarea,input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

button.primary{
background:#1a73e8;
color:white;
border:none;
padding:10px;
margin-top:10px;
border-radius:6px;
cursor:pointer;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="header">📘 MentorLoop Classroom</div>

<div class="nav">
<button class="tab active" data-tab="stream">Stream</button>
<button class="tab hidden" id="hwTab" data-tab="homework">Homework</button>
</div>

<div class="container">

<!-- STREAM -->
<div id="stream">

<div class="card">
<textarea id="msg" placeholder="Share something..."></textarea>
<button class="primary" id="sendBtn">Post</button>
</div>

<div id="feed"></div>

</div>

<!-- HOMEWORK -->
<div id="homework" class="hidden">

<div id="teacherPanel" class="card hidden">

<h3>Create Homework</h3>
<input id="hwTitle" placeholder="Title">
<textarea id="hwDesc" placeholder="Instructions"></textarea>
<input id="hwMarks" placeholder="Marks">
<input type="datetime-local" id="hwDeadline">

<button class="primary" id="createHW">Assign</button>

<hr>

<h3>📊 Leaderboard</h3>
<ul id="leaderboard"></ul>

<hr>

<h3>📥 Submissions</h3>
<div id="submissions"></div>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore, collection, addDoc, onSnapshot,
doc, setDoc, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// FIREBASE
const app = initializeApp({
apiKey:"AIzaSyBOP356DMuNyWQyHDbksw0i_dWXfXsbQvI",
authDomain:"mentorloop-55a37.firebaseapp.com",
projectId:"mentorloop-55a37"
});

const db = getFirestore(app);

// USER
const uid = localStorage.getItem("ml_uid");
const name = localStorage.getItem("ml_name");
const classId = localStorage.getItem("ml_class");

// 🔥 ROLE FIX (EMOJI SAFE)
const roleRaw = localStorage.getItem("ml_role") || "";
const role = roleRaw.toLowerCase();
const isMentor = role.includes("mentor");

// SAFETY
if(!classId){
alert("No class selected");
location.href="dashboard.html";
}

// DOM
const sendBtn = document.getElementById("sendBtn");
const msg = document.getElementById("msg");
const feed = document.getElementById("feed");

const hwTab = document.getElementById("hwTab");
const teacherPanel = document.getElementById("teacherPanel");

const leaderboard = document.getElementById("leaderboard");
const submissions = document.getElementById("submissions");

// SHOW TEACHER FEATURES
if(isMentor){
hwTab.classList.remove("hidden");
teacherPanel.classList.remove("hidden");
}

// -------- TAB SYSTEM --------
const tabs = document.querySelectorAll(".tab");

tabs.forEach(btn=>{
btn.onclick = ()=>{
let target = btn.dataset.tab;

document.querySelectorAll(".container > div")
.forEach(d=>d.classList.add("hidden"));

document.getElementById(target).classList.remove("hidden");

tabs.forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
};
});

// -------- STREAM (ORDER FIXED) --------
const q = query(collection(db,"classrooms",classId,"stream"), orderBy("time","asc"));

onSnapshot(q, snap=>{
feed.innerHTML="";

snap.forEach(docSnap=>{
let p = docSnap.data();

if(p.type==="message"){
feed.innerHTML += `
<div class="card">
<b>${p.name}</b>
<p>${p.text}</p>
</div>`;
}

if(p.type==="homework"){
feed.innerHTML += `
<div class="card">
<h4>${p.title}</h4>
<p>${p.desc}</p>

<textarea id="ans_${docSnap.id}" placeholder="Your answer"></textarea>
<button class="primary" onclick="submitHW('${docSnap.id}')">Turn In</button>
</div>`;
}
});
});

// SEND MESSAGE
sendBtn.onclick = async ()=>{
if(!msg.value.trim()) return;

await addDoc(collection(db,"classrooms",classId,"stream"),{
name,
type:"message",
text:msg.value,
time:Date.now()
});

msg.value="";
};

// CREATE HOMEWORK
document.getElementById("createHW").onclick = async ()=>{

await addDoc(collection(db,"classrooms",classId,"stream"),{
type:"homework",
title:hwTitle.value,
desc:hwDesc.value,
marks:parseInt(hwMarks.value),
deadline:hwDeadline.value,
time:Date.now()
});

hwTitle.value="";
hwDesc.value="";
hwMarks.value="";
hwDeadline.value="";
};

// SUBMIT HOMEWORK
window.submitHW = async (id)=>{

let ans = document.getElementById("ans_"+id).value;
if(!ans) return alert("Write answer");

await setDoc(doc(db,"classrooms",classId,"submissions",uid+"_"+id),{
name,
answer:ans,
hwId:id
});
};

// LEADERBOARD
onSnapshot(collection(db,"classrooms",classId,"students"), snap=>{
leaderboard.innerHTML="";
snap.forEach(d=>{
let s=d.data();
leaderboard.innerHTML += `<li>${s.name} - ${s.points}</li>`;
});
});

// SUBMISSIONS LIVE
onSnapshot(collection(db,"classrooms",classId,"submissions"), snap=>{
submissions.innerHTML="";

snap.forEach(d=>{
let s=d.data();

submissions.innerHTML += `
<div class="card">
<b>${s.name}</b>
<p>${s.answer}</p>
</div>`;
});
});

</script>

</body>
</html>
