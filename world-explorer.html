<!DOCTYPE html>
<html>
<head>
  <title>World Explorer | Guess The Country</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: white;
    }

    .card {
      background: #1e293b;
      width: 95%;
      max-width: 700px;
      padding: 30px;
      border-radius: 18px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }

    h1 {
      text-align: center;
      color: #38bdf8;
    }

    .clue {
      font-size: 18px;
      margin: 20px 0;
      line-height: 1.6;
      background: #0f172a;
      padding: 15px;
      border-radius: 10px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #334155;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #38bdf8;
      color: black;
    }

    .score {
      text-align: right;
      margin-top: 15px;
      font-weight: bold;
      color: #38bdf8;
    }

    .progress {
      height: 6px;
      background: #334155;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 15px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #38bdf8;
      transition: 0.3s;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>🌍 World Explorer</h1>

  <div class="progress">
    <div class="progress-bar" id="progress"></div>
  </div>

  <div class="clue" id="clue"></div>
  <div id="options"></div>

  <div class="score">Score: <span id="score">0</span></div>
</div>

<script type="module">

// 🔥 FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBOP356DMuNyWQyHDbksw0i_dWXfXsbQvI",
  authDomain: "mentorloop-55a37.firebaseapp.com",
  projectId: "mentorloop-55a37"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


// 🔐 UID
if (!localStorage.getItem("ml_uid")) {
  localStorage.setItem("ml_uid", "user_" + Math.random().toString(36).substring(2, 10));
}

// 📅 WEEK
function getWeek(){
  let d=new Date();
  let onejan=new Date(d.getFullYear(),0,1);
  let week=Math.ceil((((d-onejan)/86400000)+onejan.getDay()+1)/7);
  return d.getFullYear()+"-W"+week;
}

// 🔥 SYNC
async function syncToFirebase(points){
  const uid = localStorage.getItem("ml_uid");

  await setDoc(doc(db,"leaderboard",uid),{
    name: localStorage.getItem("ml_name") || "Guest",
    points: points,
    week: getWeek()
  });
}

// 💎 POINT SYSTEM
function addPoints(amount){
  let current=parseInt(localStorage.getItem("ml_points"))||0;
  let newPoints=current+amount;

  localStorage.setItem("ml_points",newPoints);
  syncToFirebase(newPoints);
}


// 🧠 SUBJECT SYSTEM
const SUBJECT = "geography";

function ensureSubject(){
  let key = "ml_history_" + SUBJECT;
  if(!localStorage.getItem(key)){
    localStorage.setItem(key, JSON.stringify([]));
  }
}

function saveScoreToHistory(){

  let score = parseInt(localStorage.getItem("ml_last_quiz_score")) || 0;
  if(score <= 0) return;

  ensureSubject();

  let key = "ml_history_" + SUBJECT;
  let history = JSON.parse(localStorage.getItem(key));

  history.push({
    score: score,
    date: new Date().toLocaleDateString()
  });

  if(history.length > 10){
    history.shift();
  }

  localStorage.setItem(key, JSON.stringify(history));
}


// -------- SHUFFLE ----------
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}


// -------- DATA ----------
const locations = [
{country:"France",clue:"Home of the Eiffel Tower and famous for croissants."},
{country:"Japan",clue:"Land of the rising sun and Mount Fuji."},
{country:"Brazil",clue:"Christ the Redeemer overlooks Rio in this country."},
{country:"Egypt",clue:"Ancient pyramids stand in its desert."},
{country:"India",clue:"The Taj Mahal is located here."},
{country:"Italy",clue:"The Colosseum is found in its capital."},
{country:"China",clue:"The Great Wall stretches across this nation."},
{country:"Australia",clue:"Sydney Opera House is here."},
{country:"Canada",clue:"Niagara Falls borders this country and the USA."},
{country:"Germany",clue:"Berlin is its capital."}
];


// -------- GAME ----------
let used = [];
let score = 0;
let round = 0;
const totalRounds = 5;

function getLocation() {
  let index;
  do {
    index = Math.floor(Math.random() * locations.length);
  } while (used.includes(index));
  used.push(index);
  return locations[index];
}

function loadRound() {

  if (round >= totalRounds) {

    let percent = Math.round((score/totalRounds)*100);

    // 💎 SAVE SCORE
    localStorage.setItem("ml_last_quiz_score", percent);

    // 💎 SAVE HISTORY
    saveScoreToHistory();

    // 🎯 BONUS
    const today = new Date().toDateString();
    const key = "ml_geo_reward";

    if(percent >= 80 && localStorage.getItem(key) !== today){
      addPoints(5);
      localStorage.setItem(key, today);
    }

    document.querySelector(".card").innerHTML =
      `<h1>Game Complete!</h1>
       <p>Your Score: <strong>${score} / ${totalRounds}</strong></p>
       <p>Percentage: <strong>${percent}%</strong></p>
       <button onclick="location.reload()">Play Again</button>`;
    return;
  }

  round++;
  updateProgress();

  const current = getLocation();
  document.getElementById("clue").textContent = current.clue;

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  let options = [current.country];

  while (options.length < 4) {
    let randomCountry = locations[Math.floor(Math.random()*locations.length)].country;
    if (!options.includes(randomCountry)) options.push(randomCountry);
  }

  shuffle(options);

  options.forEach(option=>{
    const btn = document.createElement("button");
    btn.textContent = option;

    btn.onclick = ()=>{
      if(option === current.country){
        score++;
        addPoints(2);
      }

      document.getElementById("score").textContent = score;
      loadRound();
    };

    optionsDiv.appendChild(btn);
  });
}

function updateProgress(){
  document.getElementById("progress").style.width = (round/totalRounds*100)+"%";
}

loadRound();

</script>

</body>
</html>
