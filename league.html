<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quiz Race | MentorLoop EDU</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{
margin:0;
font-family:Segoe UI,sans-serif;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}
h1{color:#22d3ee;}
select,button{
padding:12px;
margin:10px;
border:none;
border-radius:10px;
font-size:16px;
}
button{
background:#22d3ee;
cursor:pointer;
}
#timer{
font-size:28px;
color:#facc15;
margin:15px;
}
.playerRow{
display:flex;
align-items:center;
margin:10px auto;
max-width:700px;
}
.name{
width:150px;
text-align:left;
}
.lane{
flex:1;
height:24px;
background:#1e293b;
border-radius:12px;
position:relative;
}
.runner{
position:absolute;
top:2px;
font-size:18px;
transition:left .25s;
}
#questionBox{
background:#1e293b;
padding:20px;
border-radius:14px;
max-width:700px;
margin:20px auto;
}
.option{
padding:12px;
margin-top:10px;
background:#334155;
border-radius:10px;
cursor:pointer;
}
.option:hover{
background:#22d3ee;
color:black;
}
</style>
</head>
<body>

<h1>🏁 Quiz Race</h1>

<div id="setupBox">
<select id="grade">
<option value="">Select Grade</option>
</select>

<select id="difficulty">
<option value="">Select Difficulty</option>
<option value="easy">Easy</option>
<option value="medium">Medium</option>
<option value="hard">Hard</option>
</select>

<button onclick="joinRace()">Join Race</button>
</div>

<div id="timer"></div>
<div id="track"></div>
<div id="questionBox"></div>

<script>
const firebaseConfig = {
  apiKey:"AIzaSyBOP356DMuNyWQyHDbksw0i_dWXfXsbQvI",
  authDomain:"mentorloop-55a37.firebaseapp.com",
  projectId:"mentorloop-55a37",
  storageBucket:"mentorloop-55a37.firebasestorage.app",
  messagingSenderId:"322053863438",
  appId:"1:322053863438:web:c05dcb365853e04573a45f"
};

if(!firebase.apps.length){
  firebase.initializeApp(firebaseConfig);
}

const auth = firebase.auth();
const db = firebase.firestore();

let uid=null;
let studentName="Student";
let roomId=null;
let currentQuestions=[];
let currentQuestion=null;
let questionIndex=0;
let timerInterval=null;

for(let i=1;i<=12;i++){
  const option=document.createElement("option");
  option.value=i;
  option.textContent="Grade " + i;
  document.getElementById("grade").appendChild(option);
}

auth.onAuthStateChanged(async user=>{
  if(!user){
    document.getElementById("questionBox").innerHTML =
      "<h3>Please sign in first.</h3>";
    return;
  }

  uid = user.uid;

  const doc = await db.collection("users").doc(uid).get();

  if(doc.exists){
    studentName = doc.data().name || "Student";
  }
});

function generateQuestions(diff){
  let max=10;
  if(diff==="medium") max=30;
  if(diff==="hard") max=60;

  let arr=[];

  for(let i=0;i<20;i++){
    let a=Math.floor(Math.random()*max)+1;
    let b=Math.floor(Math.random()*max)+1;
    let ans=a+b;

    let options=[ans,ans+1,ans-1,ans+2]
      .sort(()=>Math.random()-0.5);

    arr.push({
      q:`${a} + ${b} = ?`,
      options,
      answer:options.indexOf(ans)
    });
  }

  return arr;
}

async function joinRace(){
  if(!uid){
    alert("User not signed in");
    return;
  }

  const grade=document.getElementById("grade").value;
  const difficulty=document.getElementById("difficulty").value;

  if(!grade || !difficulty){
    alert("Choose grade and difficulty");
    return;
  }

  const serverKey=`grade${grade}_${difficulty}`;

  const rooms = await db.collection("raceRooms")
    .where("serverKey","==",serverKey)
    .where("status","==","waiting")
    .limit(1)
    .get();

  if(rooms.empty){
    const ref = await db.collection("raceRooms").add({
      serverKey,
      duration:60,
      startedAt:null,
      status:"waiting",
      winner:null,
      questions:generateQuestions(difficulty),
      players:{
        [uid]:{
          name:studentName,
          progress:0
        }
      }
    });

    roomId = ref.id;

  }else{
    const doc = rooms.docs[0];
    roomId = doc.id;
    const data = doc.data();
    let players = data.players || {};

    if(Object.keys(players).length >= 5){
      alert("Room full");
      return;
    }

    players[uid]={
      name:studentName,
      progress:0
    };

    const updates={players};

    if(Object.keys(players).length >= 2){
      updates.status="active";
      updates.startedAt=firebase.firestore.FieldValue.serverTimestamp();
    }

    await db.collection("raceRooms").doc(roomId).update(updates);
  }

  document.getElementById("setupBox").style.display="none";
  listenRoom();
}

function listenRoom(){
  db.collection("raceRooms").doc(roomId).onSnapshot(doc=>{
    const data=doc.data();
    if(!data) return;

    currentQuestions=data.questions;
    renderTrack(data.players);

    if(data.startedAt){
      startTimer(data.startedAt.toMillis(), data.duration);
    }

    if(data.winner){
      document.getElementById("questionBox").innerHTML =
        `<h2>${data.players[data.winner].name} wins!</h2>`;
      return;
    }

    if(data.status==="waiting"){
      document.getElementById("questionBox").innerHTML =
        "<h3>Waiting for another player...</h3>";
      return;
    }

    if(data.status==="active" && !currentQuestion){
      loadQuestion();
    }
  });
}

function startTimer(startMillis,duration){
  if(timerInterval) return;

  timerInterval=setInterval(async ()=>{
    const elapsed=Math.floor((Date.now()-startMillis)/1000);
    const left=Math.max(duration-elapsed,0);

    document.getElementById("timer").innerText="⏱ " + left + "s";

    if(left<=0){
      clearInterval(timerInterval);

      const ref=db.collection("raceRooms").doc(roomId);
      const snap=await ref.get();
      const data=snap.data();

      if(!data.winner){
        let best=-1;
        let winner=null;

        Object.entries(data.players).forEach(([id,p])=>{
          if(p.progress>best){
            best=p.progress;
            winner=id;
          }
        });

        await ref.update({winner});
      }
    }
  },500);
}

function renderTrack(players){
  document.getElementById("track").innerHTML =
    Object.entries(players).map(([id,p])=>`
      <div class="playerRow">
        <div class="name">${p.name}</div>
        <div class="lane">
          <div class="runner" style="left:${p.progress}%;">🏃</div>
        </div>
      </div>
    `).join("");
}

function loadQuestion(){
  if(questionIndex>=currentQuestions.length) return;

  currentQuestion=currentQuestions[questionIndex];

  document.getElementById("questionBox").innerHTML =
    `<h3>${currentQuestion.q}</h3>` +
    currentQuestion.options.map((o,i)=>
      `<div class="option" onclick="answer(${i})">${o}</div>`
    ).join("");
}

async function answer(i){
  if(i===currentQuestion.answer){
    const ref=db.collection("raceRooms").doc(roomId);
    const snap=await ref.get();
    const data=snap.data();

    let players=data.players;
    players[uid].progress += 5;

    let winner=data.winner || null;
    if(players[uid].progress>=100){
      winner=uid;
    }

    await ref.update({
      players,
      winner
    });
  }

  questionIndex++;
  currentQuestion=null;
  loadQuestion();
}
</script>

</body>
</html>
