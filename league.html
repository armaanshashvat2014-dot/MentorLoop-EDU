<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quiz Race</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{
background:#0f172a;
color:white;
font-family:Segoe UI;
text-align:center;
padding:20px;
}
.option{
background:#334155;
padding:12px;
margin:8px;
border-radius:10px;
cursor:pointer;
}
</style>
</head>
<body>

<h1>🏁 Quiz Race</h1>

<select id="grade"></select>
<select id="difficulty">
<option value="">Difficulty</option>
<option value="easy">Easy</option>
<option value="medium">Medium</option>
<option value="hard">Hard</option>
</select>

<button onclick="joinRace()">Join Race</button>

<div id="status"></div>
<div id="track"></div>
<div id="questionBox"></div>

<script>
const firebaseConfig={
apiKey:"AIzaSyBOP356DMuNyWQyHDbksw0i_dWXfXsbQvI",
authDomain:"mentorloop-55a37.firebaseapp.com",
projectId:"mentorloop-55a37",
storageBucket:"mentorloop-55a37.firebasestorage.app",
messagingSenderId:"322053863438",
appId:"1:322053863438:web:c05dcb365853e04573a45f"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();

let uid,name="Student";
let roomId;
let questions=[];
let currentIndex=0;
let currentQuestion=null;

for(let i=1;i<=12;i++){
grade.innerHTML+=`<option value="${i}">Grade ${i}</option>`;
}

auth.onAuthStateChanged(async user=>{
if(!user){
status.innerText="Please login first";
return;
}

uid=user.uid;

const doc=await db.collection("users").doc(uid).get();
if(doc.exists){
name=doc.data().name||"Student";
}
});

function makeQuestions(){
let arr=[];
for(let i=0;i<20;i++){
let a=Math.floor(Math.random()*20)+1;
let b=Math.floor(Math.random()*20)+1;
let ans=a+b;
let opts=[ans,ans+1,ans-1,ans+2].sort(()=>Math.random()-0.5);

arr.push({
q:`${a}+${b}=?`,
options:opts,
answer:opts.indexOf(ans)
});
}
return arr;
}

async function joinRace(){
const g=grade.value;
const d=difficulty.value;

if(!g||!d){
alert("Select grade & difficulty");
return;
}

const server=`grade${g}_${d}`;

const snap=await db.collection("raceRooms")
.where("server","==",server)
.where("status","==","waiting")
.limit(1)
.get();

if(snap.empty){

const ref=await db.collection("raceRooms").add({
server,
status:"waiting",
questions:makeQuestions(),
players:[
{
uid,
name,
progress:0
}
]
});

roomId=ref.id;
status.innerText="Waiting for another player...";

}else{

const doc=snap.docs[0];
roomId=doc.id;
const data=doc.data();

let players=data.players||[];

if(players.length>=5){
alert("Room full");
return;
}

players.push({
uid,
name,
progress:0
});

await db.collection("raceRooms").doc(roomId).update({
players,
status:"active",
startedAt:Date.now()
});
}

listenRoom();
}

function listenRoom(){
db.collection("raceRooms").doc(roomId)
.onSnapshot(doc=>{
const data=doc.data();

questions=data.questions;
renderPlayers(data.players);

if(data.status==="waiting"){
status.innerText="Waiting...";
return;
}

status.innerText="Race started";

if(!currentQuestion){
loadQuestion();
}
});
}

function renderPlayers(players){
track.innerHTML=players.map(p=>`
<div>
${p.name}
<div style="background:#1e293b;height:20px;border-radius:10px;">
<div style="width:${p.progress}%;background:#22d3ee;height:20px;border-radius:10px;"></div>
</div>
</div>
`).join("");
}

function loadQuestion(){
if(currentIndex>=questions.length)return;

currentQuestion=questions[currentIndex];

questionBox.innerHTML=
`<h3>${currentQuestion.q}</h3>`+
currentQuestion.options.map((o,i)=>
`<div class="option" onclick="answer(${i})">${o}</div>`
).join("");
}

async function answer(i){
if(i===currentQuestion.answer){

const ref=db.collection("raceRooms").doc(roomId);
const snap=await ref.get();
const data=snap.data();

let players=data.players;

players=players.map(p=>{
if(p.uid===uid)p.progress+=5;
return p;
});

await ref.update({players});
}

currentIndex++;
currentQuestion=null;
loadQuestion();
}
</script>

</body>
</html>
