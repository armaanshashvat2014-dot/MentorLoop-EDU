<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MentorLoop | Progress tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:#e2e8f0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#020617;
  padding:25px;
  border-radius:20px;
  width:400px;
  text-align:center;
}

button{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  color:#020617;
  font-weight:bold;
  cursor:pointer;
}

.question{
  margin-top:15px;
  font-size:18px;
}

.msg{
  margin-top:10px;
  color:#38bdf8;
}
</style>
</head>

<body>

<div class="card">

<h1>🧠 Check progress</h1>

<div id="question"></div>
<input id="answer" placeholder="Answer">
<button onclick="submit()">Submit</button>

<div class="msg" id="msg"></div>

</div>

<script>

// SIMPLE QUESTIONS
const Q = [
  {q:"15 + 27",a:"42"},
  {q:"9 × 8",a:"72"},
  {q:"12²",a:"144"},
  {q:"50 ÷ 2",a:"25"},
  {q:"7³",a:"343"}
];

let q = Q[Math.floor(Math.random()*Q.length)];
document.getElementById("question").innerText=q.q;

let correct=0, wrong=0;

// 🔥 PRESSURE MOMENT
if(Math.random() < 0.4){
  document.getElementById("msg").innerText =
    "😈 This one decides your rank...";
}

// SUBMIT
function submit(){

  let user=document.getElementById("answer").value.trim();

  if(user==q.a){

    correct++;

    let rand = Math.random();

    // 👀 ALMOST THERE
    if(rand < 0.3){
      show("👀 You were VERY close to beating your best!");
    }

    // 🏆 NEAR CHAMPION
    else if(rand < 0.6){
      show("🏆 You almost reached Top 1%!");
    }

    else{
      show("🔥 Strong performance!");
    }

  } else {

    wrong++;

    // 🧠 CONFIDENCE BUILDER
    let msgs=[
      "🧠 You're improving, keep going!",
      "💪 Don't stop now!",
      "📈 Learning takes time — you're doing great"
    ];

    show(msgs[Math.floor(Math.random()*msgs.length)]);
  }

  // ⏳ RETURN TIMER
  setTimeout(()=>{
    alert("⏳ Come back in 6 hours for a bonus challenge!");
  },2000);

}

// SHOW MESSAGE
function show(text){
  document.getElementById("msg").innerText=text;
}

</script>

</body>
</html>
