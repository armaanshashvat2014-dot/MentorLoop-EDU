<!DOCTYPE html>
<html>
<head>
  <title>Quiz Sprint | MentorLoop EDU</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body{
      font-family:'Segoe UI',sans-serif;
      background:linear-gradient(135deg,#0f172a,#1e293b);
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      color:#e2e8f0;
      margin:0;
    }

    .card{
      background:#1e293b;
      padding:30px;
      border-radius:16px;
      width:95%;
      max-width:600px;
      box-shadow:0 20px 40px rgba(0,0,0,.6);
    }

    h1{
      color:#22d3ee;
      text-align:center;
    }

    button{
      width:100%;
      padding:12px;
      margin-top:10px;
      background:#334155;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-size:16px;
    }

    button:hover{
      background:#10b981;
    }

    #scoreBox{
      margin-top:20px;
      text-align:center;
      font-size:18px;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>🧠 Quiz Sprint</h1>
  <p id="question"></p>
  <div id="options"></div>
  <div id="scoreBox">
    Score: <span id="score">0</span>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";


// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyBOP356DMuNyWQyHDbksw0i_dWXfXsbQvI",
  authDomain: "mentorloop-55a37.firebaseapp.com",
  projectId: "mentorloop-55a37"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUid = null;
let studentName = "Student";


// ================= WEEK =================
function getWeek(){
  const d = new Date();
  const onejan = new Date(d.getFullYear(),0,1);
  const week = Math.ceil((((d-onejan)/86400000)+onejan.getDay()+1)/7);
  return d.getFullYear() + "-W" + week;
}


// ================= LOAD USER =================
async function loadUser(uid){
  const snap = await getDoc(doc(db,"users",uid));

  if(snap.exists()){
    studentName = snap.data().name || "Student";
  }
}


// ================= ADD POINTS =================
async function addPoints(amount){
  if(!currentUid) return;

  const ref = doc(db,"leaderboard",currentUid);
  const snap = await getDoc(ref);

  let currentPoints = 0;

  if(snap.exists()){
    currentPoints = snap.data().points || 0;
  }

  const updatedPoints = currentPoints + amount;

  await setDoc(ref,{
    name: studentName,
    points: updatedPoints,
    week: getWeek()
  },{merge:true});
}


// ================= QUIZ HISTORY =================
function saveScoreToHistory(percent){
  const key = "ml_history_math";
  const history = JSON.parse(localStorage.getItem(key) || "[]");

  history.push({
    score: percent,
    date: new Date().toLocaleDateString()
  });

  if(history.length > 10){
    history.shift();
  }

  localStorage.setItem(key, JSON.stringify(history));
}


// ================= HELPERS =================
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function randomInt(min,max){
  return Math.floor(Math.random()*(max-min+1))+min;
}


// ================= GENERATE QUESTIONS =================
const questionBank = [];
const ops = ["+","-","*","/"];

for(let i=0;i<50;i++){

  let a=randomInt(5,50);
  let b=randomInt(2,20);
  let op=ops[randomInt(0,3)];
  let correct;

  if(op==="+") correct=a+b;
  if(op==="-") correct=a-b;
  if(op==="*") correct=a*b;

  if(op==="/"){
    correct=randomInt(2,20);
    b=randomInt(2,10);
    a=correct*b;
  }

  let answers=[correct];

  while(answers.length<4){
    const wrong = correct + randomInt(-15,15);
    if(!answers.includes(wrong)){
      answers.push(wrong);
    }
  }

  answers = shuffle(answers);

  questionBank.push({
    q:`What is ${a} ${op} ${b}?`,
    a:answers,
    c:answers.indexOf(correct)
  });
}


// ================= QUIZ STATE =================
let questions = shuffle([...questionBank]).slice(0,10);
let index = 0;
let score = 0;


// ================= LOAD QUESTION =================
async function loadQuestion(){

  if(index >= questions.length){

    const percent = Math.round((score / questions.length) * 100);

    localStorage.setItem("ml_last_quiz_score", percent);
    saveScoreToHistory(percent);

    if(percent >= 80){
      await addPoints(5);
    }

    document.querySelector(".card").innerHTML = `
      <h1>🎉 Quiz Complete!</h1>
      <p style="text-align:center;">Your score: <strong>${score}/${questions.length}</strong></p>
      <p style="text-align:center;">Percentage: <strong>${percent}%</strong></p>
      <button onclick="location.reload()">Play Again</button>
    `;
    return;
  }

  const q = questions[index];
  document.getElementById("question").textContent = q.q;

  const options = document.getElementById("options");
  options.innerHTML = "";

  q.a.forEach((opt,i)=>{

    const btn = document.createElement("button");
    btn.textContent = opt;

    btn.onclick = async ()=>{
      if(i === q.c){
        score++;
        await addPoints(2);
      }

      index++;
      document.getElementById("score").innerText = score;
      loadQuestion();
    };

    options.appendChild(btn);
  });
}


// ================= AUTH =================
onAuthStateChanged(auth, async(user)=>{

  if(!user){
    window.location.replace("index.html");
    return;
  }

  currentUid = user.uid;

  await loadUser(currentUid);

  loadQuestion();
});
</script>

</body>
</html>
</body>
</html>
