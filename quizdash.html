let quiz=[],i=0,score=0,correct=0,startTime,history=[],mistakes=[];

function start(){
let g=document.getElementById("grade").value;
let s=document.getElementById("subject").value;

quiz=[...questions[g][s]].sort(()=>0.5-Math.random());

document.getElementById("setup").style.display="none";
document.getElementById("quizArea").style.display="block";

i=0;score=0;correct=0;history=[];mistakes=[];
load();
}

function load(){
startTime=Date.now();
document.getElementById("q").innerHTML=quiz[i].q;

let html="";
quiz[i].o.forEach(opt=>{
html+=`<div class="option" onclick="check('${opt}')">${opt}</div>`;
});
document.getElementById("opts").innerHTML=html;
}

function check(ans){
let t=(Date.now()-startTime)/1000;

if(ans===quiz[i].a){
correct++;
score+=(t<8)?120:60;
}else{
mistakes.push(quiz[i]);
}
history.push(score);
}

function next(){
i++;
if(i<quiz.length) load();
else finish();
}

function finish(){
let name=document.getElementById("name").value;
let grade=document.getElementById("grade").value;
let acc=Math.round((correct/quiz.length)*100);

document.getElementById("quizArea").style.display="none";

document.getElementById("result").innerHTML=
`🏆 ${name}<br>Score:${score}<br>Accuracy:${acc}%`;

saveLeaderboard(name,score,grade);
drawChart();
showLeaderboard(grade);

let rev="<br><b>❌ Mistakes:</b><br>";
mistakes.forEach(m=>{
rev+=`${m.q}<br>✔ ${m.a}<br>💡 ${m.e}<br><br>`;
});
document.getElementById("result").innerHTML+=rev;
}

function saveLeaderboard(n,s,g){
let d=JSON.parse(localStorage.getItem("leader_"+g))||[];
d.push({name:n,score:s});
d.sort((a,b)=>b.score-a.score);
d=d.slice(0,5);
localStorage.setItem("leader_"+g,JSON.stringify(d));
}

function showLeaderboard(g){
let d=JSON.parse(localStorage.getItem("leader_"+g))||[];
let h="<br><b>🏆 Leaderboard</b><br>";
d.forEach((x,i)=>{h+=`${i+1}. ${x.name} - ${x.score}<br>`;});
document.getElementById("leaderboard").innerHTML=h;
}

function drawChart(){
let c=document.getElementById("chart");
let ctx=c.getContext("2d");
ctx.clearRect(0,0,400,150);
ctx.beginPath();
ctx.moveTo(0,150-history[0]);
history.forEach((h,i)=>ctx.lineTo(i*35,150-h));
ctx.strokeStyle="#38bdf8";
ctx.stroke();
}

function teacher(){
let all="👨‍🏫 Teacher Panel<br>";
for(let g=6;g<=10;g++){
let d=JSON.parse(localStorage.getItem("leader_"+g))||[];
all+=`<br><b>Grade ${g}</b><br>`;
d.forEach(x=>{all+=`${x.name} - ${x.score}<br>`;});
}
document.getElementById("result").innerHTML=all;
}
