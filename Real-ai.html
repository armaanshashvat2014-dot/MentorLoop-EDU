<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart STEM AI</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:750px;
background:#1e293b;
padding:20px;
border-radius:12px;
}

#chat{
height:360px;
overflow-y:auto;
background:#020617;
padding:15px;
border-radius:8px;
margin-bottom:10px;
}

.user{color:#38bdf8}
.ai{color:#22c55e}

input{
width:80%;
padding:10px;
border-radius:6px;
border:none;
}

button{
padding:10px;
border:none;
border-radius:6px;
background:#38bdf8;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>Smart STEM AI</h2>

<div id="chat"></div>

<input id="input" placeholder="Ask something...">
<button onclick="send()">Send</button>

</div>

<script>

/* MEMORY */

let knowledge = JSON.parse(localStorage.getItem("knowledge")) || []

function saveKnowledge(){
localStorage.setItem("knowledge",JSON.stringify(knowledge))
}

/* CHAT UI */

function addMessage(role,text){

let chat=document.getElementById("chat")

let div=document.createElement("div")

div.innerHTML="<b class='"+role+"'>"+role+":</b> "+text

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

/* LEARNING SYSTEM */

function learningSystem(text){

let lower=text.toLowerCase()

/* learn facts */

if(lower.includes(" is ")){

let parts=text.split(/ is /i)

let subject=parts[0].trim()
let fact=parts.slice(1).join(" is ").trim()

knowledge.push({
subject:subject.toLowerCase(),
fact:fact
})

saveKnowledge()

return "I learned that "+subject+" is "+fact
}

/* answer questions */

if(lower.startsWith("what is ")){

let question=lower.replace("what is ","").trim()

for(let item of knowledge){

if(item.subject===question)
return item.subject+" is "+item.fact

if(item.fact.toLowerCase().includes(question))
return item.subject+" is "+item.fact

}

}

return null

}

/* BASIC MATH */

function solveMath(expr){

try{
let result=Function('"use strict";return ('+expr+')')()
return "Answer: "+result
}catch{
return null
}

}

/* SQRT */

function sqrtCommand(text){

if(text.startsWith("sqrt")){

let n=parseFloat(text.split(" ")[1])

if(!isNaN(n))
return "√"+n+" = "+Math.sqrt(n)

}

return null

}

/* CHAT */

function chatCommand(text){

let t=text.toLowerCase()

if(t.includes("hello")||t.includes("hi"))
return "Hello! I'm your STEM AI."

if(t.includes("how are you"))
return "I'm doing great!"

if(t.includes("help"))
return "You can ask math questions or teach me facts like 'Paris is the capital of France'."

return null

}

/* AI CORE */

function aiReply(text){

let r

r=learningSystem(text); if(r) return r

r=chatCommand(text); if(r) return r

r=sqrtCommand(text); if(r) return r

r=solveMath(text); if(r) return r

return "I don't know that yet. You can teach me!"

}

/* SEND */

function send(){

let input=document.getElementById("input")

let text=input.value.trim()

if(!text) return

addMessage("user",text)

let reply=aiReply(text)

setTimeout(()=>addMessage("ai",reply),200)

input.value=""

}

</script>

</body>
</html>
