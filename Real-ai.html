<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>STEM Exam Helper AI</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:700px;
background:#1e293b;
padding:20px;
border-radius:12px;
}

#chat{
height:350px;
overflow-y:auto;
background:#020617;
padding:15px;
border-radius:8px;
margin-bottom:10px;
}

.user{color:#38bdf8}
.ai{color:#22c55e}

input{
width:80%;
padding:10px;
border:none;
border-radius:6px;
}

button{
padding:10px;
border:none;
border-radius:6px;
background:#38bdf8;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>STEM Exam Helper AI</h2>

<div id="chat"></div>

<input id="input" placeholder="Ask about exams or STEM topics...">
<button onclick="send()">Send</button>

</div>

<script>

/* CHAT */

function addMessage(role,text){

let chat=document.getElementById("chat")

let div=document.createElement("div")

div.innerHTML="<b class='"+role+"'>"+role+":</b> "+text

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

/* AI LOGIC */

function aiReply(text){

let t=text.toLowerCase()

/* greetings */

if(t.includes("hello")||t.includes("hi"))
return "Hello! I'm your STEM exam helper."

/* exam tips */

if(t.includes("exam")||t.includes("test"))
return "Prepare by practicing questions, reviewing formulas, and getting enough sleep."

if(t.includes("study"))
return "Study in short focused sessions and practice solving problems."

if(t.includes("revision"))
return "Review key formulas, concepts, and past questions."

/* math */

if(t.includes("algebra"))
return "Algebra involves solving equations using variables like x and y."

if(t.includes("geometry"))
return "Geometry studies shapes, angles, and spatial relationships."

/* physics */

if(t.includes("gravity"))
return "Gravity is a force that attracts objects with mass toward each other."

if(t.includes("force"))
return "Force is a push or pull on an object. It equals mass times acceleration."

if(t.includes("energy"))
return "Energy is the ability to do work. Common types include kinetic and potential energy."

/* chemistry */

if(t.includes("atom"))
return "An atom is the smallest unit of an element."

if(t.includes("molecule"))
return "A molecule is made of two or more atoms bonded together."

/* general advice */

if(t.includes("nervous"))
return "It's normal to feel nervous before exams. Take deep breaths and stay confident."

if(t.includes("motivate"))
return "Keep going. Every problem you solve makes you stronger."

return "That's an interesting STEM question. Try asking about math, physics, chemistry, or exams."

}

/* SEND */

function send(){

let input=document.getElementById("input")

let text=input.value.trim()

if(!text) return

addMessage("user",text)

let reply=aiReply(text)

setTimeout(()=>{
addMessage("ai",reply)
},200)

input.value=""

}

</script>

</body>
</html>
