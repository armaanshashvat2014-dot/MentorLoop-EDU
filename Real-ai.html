<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>STEM Tutor AI</title>

<style>

body{
font-family:Arial;
background:#0b141a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:720px;
background:#111b21;
padding:15px;
border-radius:10px;
}

.topbar{
display:flex;
justify-content:space-between;
color:white;
margin-bottom:10px;
}

.back{
background:#25D366;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

#chat{
height:350px;
overflow-y:auto;
background:#0b141a;
padding:15px;
border-radius:8px;
margin-bottom:10px;
}

.bubble{
padding:8px 12px;
margin:6px 0;
border-radius:10px;
max-width:70%;
}

.user{
background:#005c4b;
color:white;
margin-left:auto;
}

.ai{
background:#202c33;
color:white;
}

.inputArea{
display:flex;
gap:10px;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:6px;
}

button{
padding:10px;
border:none;
border-radius:6px;
background:#25D366;
cursor:pointer;
}

canvas{
margin-top:10px;
background:white;
border-radius:6px;
}

</style>
</head>

<body>

<div class="container">

<div class="topbar">
<h3>STEM Tutor AI</h3>
<button class="back" onclick="location.href='dashboard-v2.html'">Back</button>
</div>

<div id="chat"></div>

<div class="inputArea">
<input id="input" placeholder="Ask a STEM question...">
<button onclick="send()">Send</button>
</div>

<canvas id="graph" width="650" height="220"></canvas>

</div>

<script>

/* CHAT */

function addMessage(role,text){

let chat=document.getElementById("chat")

let div=document.createElement("div")

div.className="bubble "+role

div.innerText=text

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

/* CALCULATOR */

function solveMath(expr){

try{

let result=Function('"use strict";return ('+expr+')')()

if(isFinite(result))
return "Answer: "+result

}catch{}

return null

}

/* TRIGONOMETRY */

function trig(text){

let p=text.split(" ")

let v=parseFloat(p[1])

if(isNaN(v)) return null

let rad=v*Math.PI/180

if(p[0]=="sin") return Math.sin(rad)
if(p[0]=="cos") return Math.cos(rad)
if(p[0]=="tan") return Math.tan(rad)

return null

}

/* STATISTICS */

function stats(text){

let p=text.split(" ")

if(!p[1]) return null

let nums=p[1].split(",").map(Number)

if(p[0]=="mean")
return nums.reduce((a,b)=>a+b)/nums.length

return null

}

/* PROBABILITY */

function factorial(n){

let r=1

for(let i=1;i<=n;i++) r*=i

return r

}

function probability(text){

let p=text.split(" ")

if(p[0]=="factorial")
return factorial(parseInt(p[1]))

return null

}

/* PHYSICS */

function physics(text){

let p=text.split(" ")

if(p[0]=="force")
return "Force = "+(p[1]*p[2])+" N"

if(p[0]=="velocity")
return "Velocity = "+(p[1]/p[2])+" m/s"

if(p[0]=="kinetic")
return "Kinetic Energy = "+(0.5*p[1]*p[2]*p[2])+" J"

return null

}

/* GRAPH */

function plotGraph(expr){

let canvas=document.getElementById("graph")
let ctx=canvas.getContext("2d")

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.beginPath()

for(let x=-10;x<=10;x+=0.1){

let y

try{
y=Function("x","return "+expr)(x)
}catch{
return
}

let px=(x+10)*30
let py=110-y*10

if(x===-10) ctx.moveTo(px,py)
else ctx.lineTo(px,py)

}

ctx.stroke()

}

/* STEM KNOWLEDGE BASE */

const knowledge=[

{keywords:["gravity"],answer:"Gravity is the force that pulls objects with mass toward each other."},
{keywords:["atom"],answer:"An atom is the smallest unit of an element."},
{keywords:["energy"],answer:"Energy is the ability to do work."},
{keywords:["photosynthesis"],answer:"Photosynthesis is the process plants use to convert sunlight into energy."},
{keywords:["cell"],answer:"A cell is the basic structural unit of life."},
{keywords:["algorithm"],answer:"An algorithm is a step-by-step procedure for solving a problem."},
{keywords:["binary"],answer:"Binary is a base-2 number system used by computers."},
{keywords:["computer"],answer:"A computer is a machine that processes data according to instructions."},
{keywords:["planet"],answer:"A planet is a celestial body that orbits a star."},
{keywords:["sun"],answer:"The Sun is the star at the center of our solar system."},
{keywords:["exam"],answer:"Review formulas, practice problems, and get enough sleep before exams."},
{keywords:["study"],answer:"Study in focused sessions and practice solving problems."}

]

/* SEARCH AI */

function searchAI(text){

text=text.toLowerCase()

for(let item of knowledge){

for(let k of item.keywords){

if(text.includes(k))
return item.answer

}

}

return null

}

/* MAIN AI */

function aiReply(text){

let r

r=solveMath(text)
if(r) return r

r=trig(text)
if(r) return r

r=stats(text)
if(r) return r

r=probability(text)
if(r) return r

r=physics(text)
if(r) return r

if(text.startsWith("graph")){

let expr=text.replace("graph","").trim()

plotGraph(expr)

return "Graph plotted."

}

r=searchAI(text)
if(r) return r

return "I couldn't find that in my STEM knowledge yet."

}

/* SEND */

function send(){

let input=document.getElementById("input")

let text=input.value.trim()

if(!text) return

addMessage("user",text)

let reply=aiReply(text)

setTimeout(()=>addMessage("ai",reply),200)

input.value=""

}

</script>

</body>
</html>
