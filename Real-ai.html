<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>STEM Tutor AI</title>

<style>

body{
font-family:Arial;
background:#0b141a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:720px;
background:#111b21;
padding:15px;
border-radius:10px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
color:white;
}

.back{
background:#25D366;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

#chat{
height:350px;
overflow-y:auto;
background:#0b141a;
padding:15px;
border-radius:8px;
margin-bottom:10px;
}

.bubble{
padding:8px 12px;
margin:6px 0;
border-radius:10px;
max-width:70%;
}

.user{
background:#005c4b;
color:white;
margin-left:auto;
}

.ai{
background:#202c33;
color:white;
}

.inputArea{
display:flex;
gap:10px;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:6px;
}

button{
padding:10px;
border:none;
border-radius:6px;
background:#25D366;
cursor:pointer;
}

canvas{
margin-top:10px;
background:white;
border-radius:6px;
}

</style>
</head>

<body>

<div class="container">

<div class="topbar">
<h3>STEM Tutor AI</h3>
<button class="back" onclick="location.href='dashboard-v2.html'">Back to Dashboard</button>
</div>

<div id="chat"></div>

<div class="inputArea">
<input id="input" placeholder="Ask math, science, or exam tips...">
<button onclick="send()">Send</button>
</div>

<canvas id="graph" width="650" height="220"></canvas>

</div>

<script>

/* CHAT DISPLAY */

function addMessage(role,text){

let chat=document.getElementById("chat")

let div=document.createElement("div")

div.className="bubble "+role

div.innerText=text

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

/* BASIC MATH */

function solveMath(expr){

try{

let result=Function('"use strict";return ('+expr+')')()

if(isFinite(result))
return "Answer: "+result

}catch{}

return null

}

/* SQRT */

function sqrtCommand(text){

if(text.startsWith("sqrt")){

let n=parseFloat(text.split(" ")[1])

if(!isNaN(n))
return "√"+n+" = "+Math.sqrt(n)

}

return null

}

/* TRIG */

function trigCommand(text){

let p=text.split(" ")

let cmd=p[0]

let v=parseFloat(p[1])

if(isNaN(v)) return null

let rad=v*Math.PI/180

if(cmd==="sin") return "sin("+v+"°) = "+Math.sin(rad)
if(cmd==="cos") return "cos("+v+"°) = "+Math.cos(rad)
if(cmd==="tan") return "tan("+v+"°) = "+Math.tan(rad)

return null

}

/* STATISTICS */

function statsCommand(text){

let p=text.split(" ")

if(!p[1]) return null

let nums=p[1].split(",").map(Number)

if(p[0]==="mean")
return nums.reduce((a,b)=>a+b)/nums.length

if(p[0]==="median"){

nums.sort((a,b)=>a-b)

return nums[Math.floor(nums.length/2)]

}

return null

}

/* PROBABILITY */

function factorial(n){

let r=1

for(let i=1;i<=n;i++) r*=i

return r

}

function probabilityCommand(text){

let p=text.split(" ")

if(p[0]==="factorial")
return factorial(parseInt(p[1]))

if(p[0]==="ncr"){

let n=parseInt(p[1])
let r=parseInt(p[2])

return factorial(n)/(factorial(r)*factorial(n-r))

}

return null

}

/* PHYSICS */

function physicsCommand(text){

let p=text.split(" ")

if(p[0]==="force")
return "Force = "+(p[1]*p[2])+" N"

if(p[0]==="velocity")
return "Velocity = "+(p[1]/p[2])+" m/s"

if(p[0]==="kinetic")
return "Kinetic Energy = "+(0.5*p[1]*p[2]*p[2])+" J"

return null

}

/* GRAPH */

function plotGraph(expr){

let canvas=document.getElementById("graph")
let ctx=canvas.getContext("2d")

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.beginPath()

for(let x=-10;x<=10;x+=0.1){

let y

try{
y=Function("x","return "+expr)(x)
}catch{
return
}

let px=(x+10)*30
let py=110-y*10

if(x===-10) ctx.moveTo(px,py)
else ctx.lineTo(px,py)

}

ctx.stroke()

}

/* STEM KNOWLEDGE */

function conceptCommand(text){

let t=text.toLowerCase()

if(t.includes("gravity"))
return "Gravity is the force that pulls objects toward each other."

if(t.includes("atom"))
return "An atom is the smallest unit of an element."

if(t.includes("energy"))
return "Energy is the ability to do work."

if(t.includes("algebra"))
return "Algebra studies equations using variables."

return null

}

/* EXAM TIPS */

function examTips(text){

let t=text.toLowerCase()

if(t.includes("exam")||t.includes("test"))
return "Review formulas, practice problems, and get good sleep before the exam."

if(t.includes("study"))
return "Study in focused sessions and practice solving questions."

return null

}

/* CHAT */

function chatCommand(text){

let t=text.toLowerCase()

if(t.includes("hello")||t.includes("hi"))
return "Hello! I'm your STEM tutor."

if(t.includes("help"))
return "Try: 1+1, sqrt 81, sin 30, mean 2,4,6, factorial 5, force 10 2, graph x*x"

return null

}

/* AI CORE */

function aiReply(text){

let r

r=chatCommand(text); if(r) return r
r=examTips(text); if(r) return r
r=conceptCommand(text); if(r) return r
r=sqrtCommand(text); if(r) return r
r=trigCommand(text); if(r) return r
r=statsCommand(text); if(r) return r
r=probabilityCommand(text); if(r) return r
r=physicsCommand(text); if(r) return r

if(text.startsWith("graph")){

let expr=text.replace("graph","").trim()

plotGraph(expr)

return "Graph plotted."

}

r=solveMath(text)
if(r) return r

return "Ask me about STEM topics or exam tips."

}

/* SEND */

function send(){

let input=document.getElementById("input")

let text=input.value.trim()

if(!text) return

addMessage("user",text)

let reply=aiReply(text)

setTimeout(()=>{
addMessage("ai",reply)
},200)

input.value=""

}

</script>

</body>
</html>
