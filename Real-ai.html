<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart STEM AI Tutor</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:750px;
background:#1e293b;
padding:20px;
border-radius:12px;
}

#chat{
height:360px;
overflow-y:auto;
background:#020617;
padding:15px;
border-radius:8px;
margin-bottom:10px;
}

.message{margin:6px 0}
.user{color:#38bdf8}
.ai{color:#22c55e}

input{
width:80%;
padding:10px;
border:none;
border-radius:6px;
}

button{
padding:10px;
border:none;
border-radius:6px;
background:#38bdf8;
cursor:pointer;
}

canvas{
margin-top:10px;
background:white;
border-radius:6px;
}

</style>
</head>

<body>

<div class="container">

<h2>Smart STEM AI Tutor</h2>

<div id="chat"></div>

<input id="input" placeholder="Ask something...">
<button onclick="send()">Send</button>

<canvas id="graph" width="680" height="230"></canvas>

</div>

<script>

/* KNOWLEDGE STORAGE */

let knowledge = JSON.parse(localStorage.getItem("knowledge")) || []

function saveKnowledge(){
localStorage.setItem("knowledge",JSON.stringify(knowledge))
}

/* CHAT DISPLAY */

function addMessage(role,text){

let chat=document.getElementById("chat")

let div=document.createElement("div")

div.className="message "+role

div.innerHTML="<b>"+role+":</b> "+text

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

/* LEARNING SYSTEM */

function learningSystem(text){

// learning

if(text.includes(" is ")){

let parts=text.split(" is ")

let subject=parts[0].trim()
let fact=parts[1].trim()

knowledge.push({
subject:subject,
fact:fact
})

saveKnowledge()

return "Okay, I learned that "+subject+" is "+fact
}

// answering

if(text.startsWith("what is ")){

let question=text.replace("what is ","").trim()

for(let k of knowledge){

if(k.subject===question)
return k.subject+" is "+k.fact

if(k.fact.includes(question))
return k.subject+" is "+k.fact

}

}

return null

}

/* BASIC MATH */

function solveMath(expr){

try{
let result=Function('"use strict";return ('+expr+')')()
return "Answer: "+result
}catch{
return null
}

}

/* SQRT */

function sqrtCommand(text){

if(text.startsWith("sqrt")){

let n=parseFloat(text.split(" ")[1])

return "√"+n+" = "+Math.sqrt(n)

}

return null

}

/* TRIG */

function trigCommand(text){

let p=text.split(" ")

let cmd=p[0]
let v=parseFloat(p[1])

let rad=v*Math.PI/180

if(cmd==="sin") return "sin("+v+"°) = "+Math.sin(rad)
if(cmd==="cos") return "cos("+v+"°) = "+Math.cos(rad)
if(cmd==="tan") return "tan("+v+"°) = "+Math.tan(rad)

return null

}

/* EQUATION */

function solveEquation(text){

let m=text.match(/([0-9]*)x([+-][0-9]+)?=([0-9]+)/)

if(!m) return null

let a=parseFloat(m[1]||1)
let b=parseFloat(m[2]||0)
let c=parseFloat(m[3])

let x=(c-b)/a

return "x = "+x

}

/* DERIVATIVE */

function derivative(text){

if(text==="d/dx x^2")
return "Derivative = 2x"

return null

}

/* INTEGRAL */

function integral(text){

if(text==="integral x^2")
return "∫x² dx = x³/3 + C"

return null

}

/* PHYSICS */

function physicsCommand(text){

let p=text.split(" ")

if(p[0]==="force")
return p[1]*p[2]+" N"

if(p[0]==="velocity")
return p[1]/p[2]+" m/s"

return null

}

/* COMPUTER SCIENCE */

function csCommand(text){

let p=text.split(" ")

if(p[0]==="binary")
return parseInt(p[1]).toString(2)

if(p[0]==="hex")
return parseInt(p[1]).toString(16)

return null

}

/* CHAT */

function chatCommand(text){

if(text.includes("hello")||text.includes("hi"))
return "Hello! I'm your STEM AI tutor."

if(text.includes("how are you"))
return "I'm doing great."

if(text.includes("help"))
return "You can ask math, physics, programming, or teach me facts."

return null

}

/* GRAPH */

function plotGraph(expr){

let canvas=document.getElementById("graph")
let ctx=canvas.getContext("2d")

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.beginPath()

for(let x=-10;x<=10;x+=0.1){

let y

try{
y=Function("x","return "+expr)(x)
}catch{
return
}

let px=(x+10)*30
let py=110-y*10

if(x===-10) ctx.moveTo(px,py)
else ctx.lineTo(px,py)

}

ctx.stroke()

}

/* AI CORE */

function aiReply(text){

text=text.toLowerCase()

let r

r=learningSystem(text); if(r) return r
r=chatCommand(text); if(r) return r
r=trigCommand(text); if(r) return r
r=sqrtCommand(text); if(r) return r
r=solveEquation(text); if(r) return r
r=derivative(text); if(r) return r
r=integral(text); if(r) return r
r=physicsCommand(text); if(r) return r
r=csCommand(text); if(r) return r

if(text.startsWith("graph")){
let expr=text.replace("graph","").trim()
plotGraph(expr)
return "Graph plotted."
}

r=solveMath(text)
if(r) return r

return "Tell me something new or ask a STEM question."

}

/* SEND */

function send(){

let input=document.getElementById("input")

let text=input.value

if(!text) return

addMessage("user",text)

let reply=aiReply(text)

setTimeout(()=>{
addMessage("ai",reply)
},200)

input.value=""

}

</script>

</body>
</html>
