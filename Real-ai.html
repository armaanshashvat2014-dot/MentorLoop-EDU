<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MentorLoop AI Tutor</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:700px;
background:#1e293b;
padding:20px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

h1{
text-align:center;
}

#points{
text-align:right;
font-weight:bold;
color:#38bdf8;
}

.chat{
height:250px;
overflow-y:auto;
background:#020617;
padding:15px;
border-radius:8px;
margin-bottom:15px;
}

input{
width:75%;
padding:10px;
border:none;
border-radius:6px;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
background:#38bdf8;
cursor:pointer;
}

.quiz{
margin-top:20px;
background:#020617;
padding:15px;
border-radius:8px;
}

.option{
margin:6px 0;
padding:6px;
background:#1e293b;
border-radius:5px;
cursor:pointer;
}

.option:hover{
background:#334155;
}

</style>
</head>

<body>

<div class="container">

<h1>Mentor AI</h1>

<div id="points">Points: <span id="score">0</span></div>

<div class="chat" id="chat"></div>

<input id="question" placeholder="Ask a study question...">
<button onclick="askAI()">Ask</button>

<button onclick="generateQuiz()">Generate Quiz</button>

<div class="quiz" id="quiz"></div>

</div>

<script>

let score = localStorage.getItem("mentorPoints") || 0
document.getElementById("score").innerText = score

function addMessage(role,text){

let chat = document.getElementById("chat")

let div = document.createElement("div")

div.innerHTML = "<b>"+role+":</b> "+text

chat.appendChild(div)

chat.scrollTop = chat.scrollHeight

}

async function askAI(){

let question = document.getElementById("question").value

if(!question) return

addMessage("You",question)

document.getElementById("question").value=""

addMessage("AI","Thinking...")

let response = await fetch(
"https://api-inference.huggingface.co/models/google/flan-t5-base",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
inputs:"Explain simply for a student: "+question
})
})

let data = await response.json()

let reply = data[0]?.generated_text || "Couldn't answer."

document.getElementById("chat").lastChild.innerHTML="<b>AI:</b> "+reply

}

async function generateQuiz(){

let topic = prompt("Enter a topic for the quiz")

if(!topic) return

document.getElementById("quiz").innerHTML="Generating quiz..."

let response = await fetch(
"https://api-inference.huggingface.co/models/google/flan-t5-base",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
inputs:"Create a simple multiple choice question about "+topic+" with 4 options and say the correct answer."
})
})

let data = await response.json()

let text = data[0]?.generated_text || "Couldn't generate quiz."

let quizDiv = document.getElementById("quiz")

quizDiv.innerHTML="<b>Quiz:</b><br>"+text+"<br><br><button onclick='correctAnswer()'>I got it right</button>"

}

function correctAnswer(){

score++

localStorage.setItem("mentorPoints",score)

document.getElementById("score").innerText=score

alert("Correct! +1 point ⭐")

}

</script>

</body>
</html>
