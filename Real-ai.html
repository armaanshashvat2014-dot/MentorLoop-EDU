<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MentorLoop AI</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:600px;
background:#1e293b;
padding:20px;
border-radius:12px;
}

#chat{
height:350px;
overflow-y:auto;
background:#020617;
padding:15px;
border-radius:8px;
margin-bottom:10px;
}

input{
width:80%;
padding:10px;
border:none;
border-radius:6px;
}

button{
padding:10px;
border:none;
border-radius:6px;
background:#38bdf8;
cursor:pointer;
}
</style>

</head>

<body>

<div class="container">

<h2>MentorLoop AI</h2>

<div id="chat"></div>

<input id="question" placeholder="Ask something...">
<button onclick="askAI()">Send</button>

</div>

<script>

const API_KEY = "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"

function addMessage(role,text){

let chat = document.getElementById("chat")

let div = document.createElement("div")

div.innerHTML = "<b>"+role+":</b> "+text

chat.appendChild(div)

chat.scrollTop = chat.scrollHeight

}

async function askAI(){

let question = document.getElementById("question").value

if(!question) return

addMessage("You",question)

document.getElementById("question").value=""

addMessage("AI","⚡ Thinking...")

let response = await fetch("https://openrouter.ai/api/v1/chat/completions",{

method:"POST",

headers:{
"Authorization":"Bearer "+API_KEY,
"Content-Type":"application/json"
},

body:JSON.stringify({

model:"openai/gpt-3.5-turbo",

messages:[
{
role:"user",
content:question
}
]

})

})

let data = await response.json()

let reply = data.choices[0].message.content

document.getElementById("chat").lastChild.innerHTML="<b>AI:</b> "+reply

}

</script>

</body>
</html>
