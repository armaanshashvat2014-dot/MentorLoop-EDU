<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MentorLoop | Speed Challenge</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:#e2e8f0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.card {
  background:#0f172a;
  padding:25px;
  border-radius:20px;
  width:360px;
  text-align:center;
}
input {
  padding:10px;
  border-radius:10px;
  border:none;
  width:80%;
}
button {
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  color:#020617;
  font-weight:bold;
  cursor:pointer;
}
.result { margin-top:15px; font-weight:bold; }
</style>
</head>

<body>

<div class="card">
  <h1>⚡ Daily Speed Challenge</h1>
  <div id="question"></div>

  <input id="answer" placeholder="Your answer">
  <button onclick="submitAnswer()">Submit</button>
  <button onclick="window.location.href='compare.html';">Compare yourself</button>


  <div class="result" id="result"></div>
</div>

<script>

// QUESTIONS
const questions = [
  {q:"15 × 3 + 12 = ?", a:"57"},
  {q:"√169 = ?", a:"13"},
  {q:"9² + 16 = ?", a:"97"},
  {q:"Capital of Australia?", a:"canberra"},
  {q:"14 × 11 = ?", a:"154"},
  {q:"Binary of 5?", a:"101"},
  {q:"6³ = ?", a:"216"},
  {q:"6! = ?", a:"720"},
  {q:"Speed of sound (m/s)?", a:"343"},
  {q:"Pi (3 decimals)?", a:"3.142"},
  {q:"25% of 240?", a:"60"},
  {q:"Opposite of 'ancient'?", a:"modern"},
  {q:"8² × 2 = ?", a:"128"},
  {q:"Second prime number?", a:"3"},
  {q:"50 + 5 × 6 = ?", a:"80"}
];

// DAILY LOCK
function getDailyIndex() {
  let today = new Date().toDateString();

  let savedDay = localStorage.getItem("ml_today");
  let savedIndex = localStorage.getItem("ml_today_q");

  if (savedDay === today && savedIndex !== null) {
    return parseInt(savedIndex);
  }

  let lastIndex = parseInt(localStorage.getItem("ml_last_q"));
  let index = Math.floor(Math.random() * questions.length);

  if (index === lastIndex) {
    index = (index + 1) % questions.length;
  }

  localStorage.setItem("ml_today", today);
  localStorage.setItem("ml_today_q", index);
  localStorage.setItem("ml_last_q", index);

  return index;
}

let qIndex = getDailyIndex();
let currentQ = questions[qIndex];

document.getElementById("question").innerText = currentQ.q;

// LOCK START TIME
let today = new Date().toDateString();

let startTime = localStorage.getItem("ml_start_time");
if (!startTime || localStorage.getItem("ml_start_day") !== today) {
  startTime = Date.now();
  localStorage.setItem("ml_start_time", startTime);
  localStorage.setItem("ml_start_day", today);
}

// SOLVED LOCK
let solved = localStorage.getItem("ml_solved") === "true";

function submitAnswer() {
  if (solved) return;

  let userAns = document.getElementById("answer").value.toLowerCase().trim();
  let time = (Date.now() - startTime) / 1000;

  if (userAns === currentQ.a) {
    solved = true;
    localStorage.setItem("ml_solved", "true");

    localStorage.setItem("ml_latest_time", time);

    let msg = "";

    if (time < 10) {
      msg = "🔥 WOAH! Faster than 70% users!";
    } else {
      msg = "✅ Correct!";
    }

    document.getElementById("result").innerText = msg;

    // go to compare page
    setTimeout(()=>{
      window.location.href = "compare.html";
    }, 1500);

  } else {
    document.getElementById("result").innerText = "❌ Try again!";
  }
}

</script>

</body>
</html>
