<!DOCTYPE html>
<html>
<head>
<title>Fair Play | MentorLoop EDU</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  color:white;
}

.container{
  background:#111827;
  width:95%;
  max-width:600px;
  padding:30px;
  border-radius:16px;
  box-shadow:0 0 25px rgba(0,0,0,0.6);
}

h1{
  text-align:center;
  margin-bottom:20px;
}

input, textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
  font-family:'Segoe UI';
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

button:hover{
  background:#1e40af;
}

.status{
  margin-top:15px;
  padding:10px;
  border-radius:8px;
  text-align:center;
}

.success{
  background:#065f46;
}

.error{
  background:#7f1d1d;
}

.banned{
  background:#991b1b;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>⚖️ Fair Play System</h1>

<input type="text" id="reporter" placeholder="Your Username" required>
<input type="text" id="reported" placeholder="Username to Report" required>
<textarea id="reason" placeholder="Reason for report..." rows="3"></textarea>

<button onclick="submitReport()">Submit Report</button>

<div id="message"></div>

</div>
<script type="module">

import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const auth = getAuth();
const db = getFirestore();

// 🚨 CHECK IF USER IS BANNED (run on page load)
async function checkBan(){
  const user = auth.currentUser;
  if(!user) return;

  const userRef = doc(db, "users", user.uid);
  const snap = await getDoc(userRef);

  if(snap.exists() && snap.data().banned){
    document.body.innerHTML = `
      <div style="text-align:center;padding:40px;color:white;">
        <h1>🚫 You are banned</h1>
        <p>Due to multiple reports, your account has been restricted.</p>
      </div>
    `;
  }
}

checkBan();

// 🚨 SUBMIT REPORT
window.submitReport = async function(){

  const reporterUser = auth.currentUser;

  if(!reporterUser){
    showMessage("You must be logged in.","error");
    return;
  }

  const reportedUID = document.getElementById("reported").value.trim();
  const reason = document.getElementById("reason").value.trim();

  if(!reportedUID){
    showMessage("Enter UID to report.","error");
    return;
  }

  if(reporterUser.uid === reportedUID){
    showMessage("You cannot report yourself.","error");
    return;
  }

  const reportRef = doc(db, "reports", reportedUID);
  const userRef = doc(db, "users", reportedUID);

  let reportSnap = await getDoc(reportRef);

  // CREATE REPORT ENTRY IF NOT EXISTS
  if(!reportSnap.exists()){
    await setDoc(reportRef, {
      reporters: [reporterUser.uid],
      reasons: [reason],
      count: 1
    });
  } else {

    let data = reportSnap.data();

    // PREVENT DUPLICATE REPORT
    if(data.reporters.includes(reporterUser.uid)){
      showMessage("You already reported this user.","error");
      return;
    }

    await updateDoc(reportRef, {
      reporters: arrayUnion(reporterUser.uid),
      reasons: arrayUnion(reason),
      count: data.count + 1
    });
  }

  // CHECK BAN CONDITION
  const updatedSnap = await getDoc(reportRef);
  const count = updatedSnap.data().count;

  if(count >= 3){
    await setDoc(userRef, { banned: true }, { merge: true });
    showMessage("🚫 User has been automatically banned!","banned");
  } else {
    showMessage("✅ Report submitted.","success");
  }
}

// 🎨 UI MESSAGE
function showMessage(text,type){
  let msg = document.getElementById("message");
  msg.className = "status " + type;
  msg.innerText = text;
}

</script>
</body>
</html>
