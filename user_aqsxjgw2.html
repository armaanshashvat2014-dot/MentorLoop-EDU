<!DOCTYPE html>
<html>
<head>
<title>Admin Panel | MentorLoop EDU</title>

<style>
body{
  background:#020617;
  color:white;
  font-family:'Segoe UI';
  padding:20px;
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:10px;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-top:10px;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin:10px 0;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.ban{ background:red; color:white; }
.unban{ background:green; color:white; }

#debug{
  margin-top:20px;
  padding:10px;
  background:#111827;
  border-radius:10px;
  font-size:12px;
  color:#94a3b8;
}
</style>

</head>

<body>

<div id="loginBox">
  <h2>🔐 Admin Verification</h2>
  <input type="password" id="secret" placeholder="Enter secret">
  <button onclick="verify()">Enter Admin Panel</button>
  <p id="msg"></p>
</div>

<div id="adminPanel" style="display:none;">
  <h1>🛡️ Admin Panel</h1>
  <div id="panel"></div>
  <div id="debug"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔐 ADMIN SETTINGS
const ADMIN_UID = "user_aqsxjgw2";
const SECRET = "Roblox";

const currentUID = localStorage.getItem("ml_uid");

// 🚫 BLOCK NON ADMIN
if(currentUID !== ADMIN_UID){
  document.body.innerHTML = "<h1>🚫 Access Denied</h1>";
}

// 🔐 VERIFY
window.verify = function(){

  const input = document.getElementById("secret").value;

  if(input === SECRET){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
    loadUsers();
  } else {
    document.getElementById("msg").innerText = "❌ Wrong secret";
  }
}

// 📊 LOAD USERS
async function loadUsers(){

  const panel = document.getElementById("panel");
  const debug = document.getElementById("debug");

  panel.innerHTML = "Loading...";
  debug.innerHTML = "Fetching from: leaderboard";

  try{

    const snapshot = await getDocs(collection(db,"leaderboard"));

    debug.innerHTML += "<br>Docs found: " + snapshot.size;

    panel.innerHTML = "";

    if(snapshot.empty){
      panel.innerHTML = "<p>No users found</p>";
      return;
    }

    snapshot.forEach(docSnap => {

      const data = docSnap.data();
      const uid = docSnap.id;

      debug.innerHTML += "<br>Found UID: " + uid;

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <div>
          <b>${data.name || "User"}</b><br>
          UID: ${uid}<br>
          ${data.banned ? "🚫 BANNED" : "✅ Active"}
        </div>

        <div>
          <button class="ban" onclick="banUser('${uid}')">❌</button>
          <button class="unban" onclick="unbanUser('${uid}')">✔️</button>
        </div>
      `;

      panel.appendChild(div);
    });

  } catch(err){
    debug.innerHTML += "<br>ERROR: " + err;
    panel.innerHTML = "Error loading users";
  }
}

// 🚫 BAN
window.banUser = async function(uid){
  await updateDoc(doc(db,"leaderboard",uid),{banned:true});
  loadUsers();
}

// ✅ UNBAN
window.unbanUser = async function(uid){
  await updateDoc(doc(db,"leaderboard",uid),{banned:false});
  loadUsers();
}

</script>

</body>
</html>
