<!DOCTYPE html>
<html>
<head>
<title>Admin Panel | MentorLoop EDU</title>

<style>
body{
  background:#020617;
  color:white;
  font-family:'Segoe UI';
  padding:20px;
}

h1,h2{
  margin-bottom:10px;
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:10px;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-top:10px;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin:10px 0;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.status{
  font-size:14px;
  color:#94a3b8;
}

.actions button{
  margin-left:5px;
}

.ban{
  background:#dc2626;
  color:white;
}

.unban{
  background:#16a34a;
  color:white;
}
</style>

</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginBox">
  <h2>🔐 Admin Verification</h2>
  <input type="password" id="secret" placeholder="Enter secret passphrase">
  <button onclick="verify()">Enter Admin Panel</button>
  <p id="msg"></p>
</div>

<!-- 🛡️ PANEL -->
<div id="adminPanel" style="display:none;">
  <h1>🛡️ Admin Panel</h1>
  <div id="panel"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBOP356DMuNyWQyHDbksw0i_dWXfXsbQvI",
  authDomain: "mentorloop-55a37.firebaseapp.com",
  projectId: "mentorloop-55a37",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔐 YOUR UID (CHANGE ONLY IF NEEDED)
const ADMIN_UID = "user_aqsxjgw2";

// 🔑 YOUR SECRET (CHANGE THIS!!)
const SECRET = "Roblox";

// 🧠 GET CURRENT USER
const currentUID = localStorage.getItem("ml_uid");

// 🚫 BLOCK IF NOT YOU
if(currentUID !== ADMIN_UID){
  document.body.innerHTML = "<h1 style='text-align:center;'>🚫 Access Denied</h1>";
}

// 🔐 VERIFY SECRET
window.verify = function(){

  const input = document.getElementById("secret").value;

  if(input === SECRET){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
    loadUsers();
  } else {
    document.getElementById("msg").innerText = "❌ Wrong secret";
  }
}

// 📊 LOAD ALL USERS
async function loadUsers(){

  const container = document.getElementById("panel");
  container.innerHTML = "<p>Loading users...</p>";

  try {

    const snapshot = await getDocs(collection(db,"users"));

    container.innerHTML = "";

    if(snapshot.empty){
      container.innerHTML = "<p>No users found</p>";
      return;
    }

    snapshot.forEach(docSnap => {

      const data = docSnap.data();
      const uid = docSnap.id;

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <div>
          <b>${data.name || "User"}</b><br>
          <span class="status">UID: ${uid}</span><br>
          <span class="status">
            ${data.banned ? "🚫 BANNED" : "✅ Active"}
          </span>
        </div>

        <div class="actions">
          <button class="ban" onclick="banUser('${uid}')">❌</button>
          <button class="unban" onclick="unbanUser('${uid}')">✔️</button>
        </div>
      `;

      container.appendChild(div);
    });

  } catch(err){
    console.error(err);
    container.innerHTML = "<p>Error loading users</p>";
  }
}

// 🚫 BAN USER
window.banUser = async function(uid){
  await updateDoc(doc(db,"users",uid),{
    banned:true
  });
  loadUsers();
}

// ✅ UNBAN USER
window.unbanUser = async function(uid){
  await updateDoc(doc(db,"users",uid),{
    banned:false
  });
  loadUsers();
}

</script>

</body>
</html>
