<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel | MentorLoop EDU</title>

    <style>
        body { background:#020617; color:white; font-family:Arial; padding:20px; }

        input {
            width:100%; padding:12px; border-radius:10px; border:none;
            margin-top:10px; background:#1e293b; color:white;
        }

        button {
            padding:10px 14px; border:none; border-radius:8px;
            cursor:pointer; margin-top:10px; font-weight:bold;
        }

        .card {
            background:#1e293b; padding:15px; border-radius:12px;
            margin:10px 0; display:flex; justify-content:space-between;
            border-left:5px solid #3b82f6;
        }

        .report-card {
            background:#334155; padding:15px; border-radius:12px;
            margin:10px 0; border-left:5px solid #ef4444;
        }

        .ban { background:#ef4444; color:white; }
        .unban { background:#22c55e; color:white; }
        .dismiss { background:#475569; color:white; }

        h2 { border-bottom:1px solid #334155; padding-bottom:10px; margin-top:30px; }
    </style>
</head>

<body>

<div id="loginBox">
    <h2>🔐 Admin Verification</h2>
    <input type="password" id="secret" placeholder="Enter secret">
    <button onclick="verify()" style="background:#3b82f6;color:white;">Enter Admin Panel</button>
    <p id="msg"></p>
</div>

<div id="adminPanel" style="display:none;">

    <h1>🛡️ Admin Control Center</h1>

    <h2>👥 Users</h2>
    <div id="users"></div>

    <h2>📜 Reports</h2>
    <div id="reports"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
    getFirestore,
    collection,
    getDocs,
    doc,
    updateDoc,
    deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBOP356DMuNyWQyHDbksw0i_dWXfXsbQvI",
    authDomain: "mentorloop-55a37.firebaseapp.com",
    projectId: "mentorloop-55a37",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


// ================= ADMIN CONFIG =================
const ADMIN_UID = "user_buyi3x7q"; // ✅ NEW ADMIN
const SECRET = "Roblox";

const currentUID = localStorage.getItem("ml_uid");


// ================= ACCESS CHECK =================
if (!currentUID || currentUID !== ADMIN_UID) {
    document.body.innerHTML = `
        <div style="background:#020617;color:white;height:100vh;display:flex;justify-content:center;align-items:center;text-align:center;">
            <div>
                <h1>🚫 Access Denied</h1>
                <p>You are not authorized.</p>
                <small>ID: ${currentUID || "null"}</small>
            </div>
        </div>
    `;
}


// ================= VERIFY =================
window.verify = function(){
    if(document.getElementById("secret").value === SECRET){
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";

        loadUsers();
        loadReports();
    } else {
        document.getElementById("msg").innerText = "❌ Wrong secret";
    }
};


// ================= USERS =================
async function loadUsers(){

    const container = document.getElementById("users");
    container.innerHTML = "Loading...";

    const snap = await getDocs(collection(db, "leaderboard"));
    container.innerHTML = "";

    snap.forEach(docSnap => {

        const u = docSnap.data();
        const id = docSnap.id;

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <div>
                <b>${u.name || "Unknown"}</b><br>
                <small>ID: ${id}</small><br>
                ${u.banned ? "🚫 BANNED" : "✅ ACTIVE"}
            </div>

            <div>
                <button class="ban" onclick="banUser('${id}')">Ban</button>
                <button class="unban" onclick="unbanUser('${id}')">Unban</button>
            </div>
        `;

        container.appendChild(div);
    });
}


// ================= REPORTS =================
async function loadReports(){

    const container = document.getElementById("reports");
    container.innerHTML = "Loading...";

    const snap = await getDocs(collection(db, "reports"));
    container.innerHTML = "";

    snap.forEach(docSnap => {

        const r = docSnap.data();
        const id = docSnap.id;

        const div = document.createElement("div");
        div.className = "report-card";

        div.innerHTML = `
            <b>Reporter:</b> ${r.reporterUID}<br>
            <b>Reported:</b> ${r.reportedUID}<br>
            <b>Reason:</b> ${r.reason}<br>

            <button class="ban" onclick="banAndDelete('${r.reportedUID}','${id}')">
                🚫 Ban User
            </button>

            <button class="dismiss" onclick="deleteReport('${id}')">
                ✅ Dismiss
            </button>
        `;

        container.appendChild(div);
    });
}


// ================= ACTIONS =================
window.banUser = async function(id){
    await updateDoc(doc(db,"leaderboard",id), { banned:true });
    alert("User banned");
    loadUsers();
};

window.unbanUser = async function(id){
    await updateDoc(doc(db,"leaderboard",id), { banned:false });
    alert("User unbanned");
    loadUsers();
};

window.deleteReport = async function(id){
    await deleteDoc(doc(db,"reports",id));
    loadReports();
};

window.banAndDelete = async function(uid, reportId){
    await updateDoc(doc(db,"leaderboard",uid), { banned:true });
    await deleteDoc(doc(db,"reports",reportId));
    alert("User banned + report removed");
    loadUsers();
    loadReports();
};

</script>
</body>
</html>
