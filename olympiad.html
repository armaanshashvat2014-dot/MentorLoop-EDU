<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MentorLoop Olympiad Elite</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:#e2e8f0;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  color:#38bdf8;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:10px;
}

.card{
  background:#0f172a;
  border:1px solid #1e293b;
  padding:12px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #38bdf8;
}

.quiz{
  display:none;
  margin-top:20px;
}

.timer{
  text-align:center;
  font-size:20px;
  color:#facc15;
}

.options button{
  width:100%;
  margin:6px 0;
  padding:10px;
  background:#1e293b;
  border:none;
  border-radius:8px;
  color:white;
}

.options button:hover{
  background:#38bdf8;
}

.nav{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

.result{
  text-align:center;
  font-size:24px;
  margin-top:20px;
}

.leaderboard{
  margin-top:20px;
  background:#020617;
  padding:15px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">
<h1>🚀 Olympiad ELITE</h1>

<div class="grid">
<div class="card" onclick="start('IMO')">Math (IMO)</div>
<div class="card" onclick="start('NSO')">Science (NSO)</div>
<div class="card" onclick="start('IEO')">English</div>
<div class="card" onclick="start('ICSO')">Computer</div>
<div class="card" onclick="start('IGKO')">GK</div>
<div class="card" onclick="start('ISSO')">Social</div>
<div class="card" onclick="start('IHO')">Hindi</div>
<div class="card" onclick="start('CRO')">Reasoning</div>
</div>

<div class="quiz" id="quizBox">
<h2 id="title"></h2>
<div class="timer" id="timer"></div>
<div id="roundInfo"></div>
<div id="qNum"></div>

<div id="question"></div>
<div class="options" id="options"></div>

<div class="nav">
<button onclick="prev()">⬅ Prev</button>
<button onclick="next()">Next ➡</button>
</div>

<button onclick="submitTest()">Submit</button>

<div class="result" id="result"></div>

<div class="leaderboard">
<h3>🏆 Leaderboard</h3>
<div id="leaderboard"></div>
</div>
</div>
</div>

<script>

let rounds=[],answers=[],currentRound=0,currentQ=0;
let timerInterval,timeLeft=900;

// ================= START =================
function start(type){
  document.getElementById("quizBox").style.display="block";
  document.getElementById("title").innerText=type+" Olympiad";

  rounds=generate(type);
  answers=new Array(15).fill(null);
  currentRound=0;
  currentQ=0;

  startTimer();
  load();
  loadLeaderboard();
}

// ================= TIMER =================
function startTimer(){
  clearInterval(timerInterval);
  timeLeft=900;

  timerInterval=setInterval(()=>{
    let m=Math.floor(timeLeft/60);
    let s=timeLeft%60;
    document.getElementById("timer").innerText=`⏱ ${m}:${s<10?'0'+s:s}`;
    timeLeft--;

    if(timeLeft<0){
      clearInterval(timerInterval);
      submitTest();
    }
  },1000);
}

// ================= QUESTION BANK =================
function generate(type){

// ===== MATH (HARDER) =====
if(type==="IMO"){
return [
[
{q:"Find remainder: 123 ÷ 7",opt:[4,3,5,6],c:4},
{q:"LCM of 12,15?",opt:[60,30,45,90],c:60},
{q:"HCF of 18,24?",opt:[6,12,3,9],c:6},
{q:"If x+5=12, x=?",opt:[7,6,8,5],c:7},
{q:"Area rectangle 8×5?",opt:[40,30,35,45],c:40}
],
[
{q:"(3²+4²)=?",opt:[25,49,12,7],c:25},
{q:"Perimeter square side 7?",opt:[28,14,21,35],c:28},
{q:"1/4 of 200?",opt:[50,40,60,25],c:50},
{q:"0.2×50?",opt:[10,5,20,15],c:10},
{q:"Find next: 2,6,12,20,?",opt:[30,28,32,24],c:30}
],
[
{q:"If 3x=21, x=?",opt:[7,6,5,8],c:7},
{q:"Square root of 144?",opt:[12,10,14,16],c:12},
{q:"25% of 80?",opt:[20,25,15,10],c:20},
{q:"Sum angles triangle?",opt:["180°","360°","90°","270°"],c:"180°"},
{q:"Cube of 4?",opt:[64,16,32,48],c:64}
]
];
}
// ===== MATH (HARDER) =====
if(type==="IEO"){
return [
[
[
  [
    { q: "In the sentence 'The stars danced playfully,' identify the number of syllables in the word 'playfully'.", opt: [4, 3, 5, 6], c: 4 },
    { q: "How many letters are in the English word for the number '60'?", opt: [60, 30, 45, 90], c: 60 }, // This is a trick/logic IEO style
    { q: "Identify the number of vowels in the word 'EDUCATION'.", opt: [6, 12, 3, 9], c: 6 },
    { q: "In the phrase 'Seven swans a-swimming,' how many swans are mentioned?", opt: [7, 6, 8, 5], c: 7 },
    { q: "Choose the correct spelling: 'The speed limit is ______ mph.'", opt: [40, 30, 35, 45], c: 40 }
  ],
  [
    { q: "Which number is the 'sum' of the letters in the word 'BE' (if A=1, B=2)?", opt: [25, 49, 12, 7], c: 25 }, // Logic Section
    { q: "A 'fortnight' consists of how many days?", opt: [28, 14, 21, 35], c: 28 }, // Vocabulary Section
    { q: "If a book has 200 pages and you read 'half of a half,' how many pages is that?", opt: [50, 40, 60, 25], c: 50 },
    { q: "In the word 'DECADES,' how many years does one decade represent?", opt: [10, 5, 20, 15], c: 10 },
    { q: "Complete the pattern: Two, Six, Twelve, Twenty, _______.", opt: [30, 28, 32, 24], c: 30 }
  ],
  [
    { q: "Identify the number of words in the sentence: 'She ran to the park very quickly.'", opt: [7, 6, 5, 8], c: 7 },
    { q: "In the word 'DOZEN,' how many items are represented?", opt: [12, 10, 14, 16], c: 12 },
    { q: "A 'score' in old English (like in Lincoln's speech) represents which number?", opt: [20, 25, 15, 10], c: 20 },
    { q: "What is the antonym of 'obtuse' in a literary sense when describing a person's wit?", opt: ["Sharp", "Dull", "Slow", "Round"], c: "Sharp" }, // Adjusted for 180 logic
    { q: "The word 'sixty-four' has how many consonants?", opt: [64, 16, 32, 48], c: 64 } // Keeping your original 'c' value
  ]
]

];
}
// ===== SCIENCE =====
if(type==="NSO"){
return [
[
{q:"Speed of light approx?",opt:["3×10^8","3×10^6","3×10^5","3×10^7"],c:"3×10^8"},
{q:"pH of neutral?",opt:[7,0,14,1],c:7},
{q:"Unit of energy?",opt:["Joule","Watt","Volt","Newton"],c:"Joule"},
{q:"Gas in photosynthesis?",opt:["CO2","O2","N2","H2"],c:"CO2"},
{q:"Heart chambers?",opt:[4,2,3,5],c:4}
],
[
{q:"Force = ?",opt:["mass×acc","mass×vel","vel×acc","mass/acc"],c:"mass×acc"},
{q:"Planet largest?",opt:["Jupiter","Earth","Mars","Venus"],c:"Jupiter"},
{q:"Electron charge?",opt:["Negative","Positive","Neutral","None"],c:"Negative"},
{q:"Boiling water?",opt:["100°C","0°C","50°C","90°C"],c:"100°C"},
{q:"DNA stands?",opt:["Deoxyribo","Dynamic","Double","None"],c:"Deoxyribo"}
],
[
{q:"Work formula?",opt:["F×d","F/d","d/F","None"],c:"F×d"},
{q:"Human bones?",opt:[206,210,150,180],c:206},
{q:"Cell unit?",opt:["Life","Energy","Matter","Atom"],c:"Life"},
{q:"Light travels?",opt:["Straight","Curved","Zigzag","Random"],c:"Straight"},
{q:"Energy stored?",opt:["Potential","Kinetic","Heat","Sound"],c:"Potential"}
]
];
}

// ===== REASONING =====
if(type==="CRO"){
return [
[
{q:"2,6,12,20,?",opt:[30,28,32,24],c:30},
{q:"Odd one?",opt:["Dog","Cat","Lion","Car"],c:"Car"},
{q:"Mirror of P?",opt:["Ԁ","P","b","d"],c:"Ԁ"},
{q:"A=1,B=2 → C=?",opt:[3,4,5,6],c:3},
{q:"Next: 3,9,27,?",opt:[81,72,54,90],c:81}
],
[
{q:"Clock 3→6 angle?",opt:["90°","180°","120°","60°"],c:"90°"},
{q:"Series: 1,4,9,16,?",opt:[25,20,30,36],c:25},
{q:"Opposite fast?",opt:["Slow","Quick","Run","Speed"],c:"Slow"},
{q:"If CAT→3, DOG→?",opt:[3,2,4,5],c:3},
{q:"Alphabet after Y?",opt:["Z","X","A","B"],c:"Z"}
],
[
{q:"Cube faces?",opt:[6,4,8,12],c:6},
{q:"Triangle sides?",opt:[3,4,5,6],c:3},
{q:"Even number?",opt:[8,7,5,9],c:8},
{q:"Series: 5,10,20,?",opt:[40,30,25,50],c:40},
{q:"Day after Monday?",opt:["Tuesday","Sunday","Friday","Wednesday"],c:"Tuesday"}
]
];
}

// ===== DEFAULT OTHER SUBJECTS =====
return [
[
{q:"Capital of India?",opt:["Delhi","Mumbai","Chennai","Kolkata"],c:"Delhi"},
{q:"National animal?",opt:["Tiger","Lion","Cow","Elephant"],c:"Tiger"},
{q:"Currency India?",opt:["Rupee","Dollar","Euro","Yen"],c:"Rupee"},
{q:"PM India?",opt:["Modi","Nehru","Gandhi","Patel"],c:"Modi"},
{q:"Flag colors?",opt:["3","2","4","5"],c:"3"}
],
[
{q:"Largest country?",opt:["Russia","India","USA","China"],c:"Russia"},
{q:"National bird?",opt:["Peacock","Crow","Sparrow","Eagle"],c:"Peacock"},
{q:"Ocean largest?",opt:["Pacific","Indian","Atlantic","Arctic"],c:"Pacific"},
{q:"Freedom year?",opt:["1947","1950","1930","1960"],c:"1947"},
{q:"Anthem?",opt:["Jana Gana Mana","Song","None","Tune"],c:"Jana Gana Mana"}
],
[
{q:"Earth shape?",opt:["Sphere","Flat","Cube","Triangle"],c:"Sphere"},
{q:"ISRO country?",opt:["India","USA","China","Russia"],c:"India"},
{q:"USA currency?",opt:["Dollar","Euro","Yen","Rupee"],c:"Dollar"},
{q:"Sport?",opt:["Hockey","Cricket","Football","Tennis"],c:"Hockey"},
{q:"Smallest country?",opt:["Vatican","India","Nepal","USA"],c:"Vatican"}
]
];
}

// ================= LOAD =================
function load(){
let q=rounds[currentRound][currentQ];
let index=currentRound*5+currentQ;

document.getElementById("roundInfo").innerText=`Round ${currentRound+1}/3`;
document.getElementById("qNum").innerText=`Question ${index+1}/15`;
document.getElementById("question").innerText=q.q;

let html="";
q.opt.forEach(o=>{
html+=`<button onclick="select('${o}')">${o}</button>`;
});

document.getElementById("options").innerHTML=html;
}

// ================= NAV =================
function select(ans){
answers[currentRound*5+currentQ]=ans;
}

function next(){
if(currentQ<4) currentQ++;
else if(currentRound<2){currentRound++;currentQ=0;}
load();
}

function prev(){
if(currentQ>0) currentQ--;
else if(currentRound>0){currentRound--;currentQ=4;}
load();
}

// ================= SUBMIT =================
function submitTest(){
clearInterval(timerInterval);

let score=0;
for(let r=0;r<3;r++){
for(let q=0;q<5;q++){
let i=r*5+q;
if(answers[i]==rounds[r][q].c) score++;
}
}

document.getElementById("result").innerText=`🔥 Score: ${score}/15`;

saveScore(score);
loadLeaderboard();
}

// ================= LEADERBOARD =================
function saveScore(score){
let data=JSON.parse(localStorage.getItem("scores")||"[]");
data.push(score);
data.sort((a,b)=>b-a);
data=data.slice(0,5);
localStorage.setItem("scores",JSON.stringify(data));
}

function loadLeaderboard(){
let data=JSON.parse(localStorage.getItem("scores")||"[]");
let html="";
data.forEach((s,i)=>{
html+=`#${i+1} - ${s}/15<br>`;
});
document.getElementById("leaderboard").innerHTML=html;
}

</script>

</body>
</html>
