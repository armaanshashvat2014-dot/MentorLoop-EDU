<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olympiad Elite</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:#e2e8f0;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  color:#38bdf8;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
}

.card{
  background:#0f172a;
  border:1px solid #1e293b;
  padding:12px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #38bdf8;
}

.quiz{
  display:none;
  margin-top:20px;
}

.timer{
  text-align:center;
  font-size:18px;
  color:#facc15;
}

.options button{
  width:100%;
  margin:5px 0;
  padding:10px;
  background:#1e293b;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

.options button:hover{
  background:#38bdf8;
}

.nav{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

.result{
  text-align:center;
  font-size:22px;
  margin-top:20px;
}

.leaderboard{
  margin-top:20px;
  background:#020617;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">
<h1>🚀 Olympiad Elite</h1>

<div class="grid">
<div class="card" onclick="start('IMO')">Math</div>
<div class="card" onclick="start('NSO')">Science</div>
<div class="card" onclick="start('IEO')">English</div>
<div class="card" onclick="start('ICSO')">Computer</div>
<div class="card" onclick="start('IGKO')">GK</div>
<div class="card" onclick="start('ISSO')">Social</div>
<div class="card" onclick="start('IHO')">Hindi</div>
<div class="card" onclick="start('CRO')">Reasoning</div>
</div>

<div class="quiz" id="quizBox">
<h2 id="title"></h2>
<div class="timer" id="timer"></div>
<div id="roundInfo"></div>
<div id="qNum"></div>

<div id="question"></div>
<div class="options" id="options"></div>

<div class="nav">
<button onclick="prev()">⬅ Prev</button>
<button onclick="next()">Next ➡</button>
</div>

<button onclick="submitTest()">Submit</button>

<div class="result" id="result"></div>

<div class="leaderboard">
<h3>🏆 Leaderboard</h3>
<div id="leaderboard"></div>
</div>
</div>
</div>

<script>
let rounds=[],answers=[],currentRound=0,currentQ=0;
let timerInterval,timeLeft=900;

function start(type){
  document.getElementById("quizBox").style.display="block";
  document.getElementById("title").innerText=type+" Olympiad";

  rounds=generate(type);
  answers=new Array(15).fill(null);
  currentRound=0;
  currentQ=0;

  startTimer();
  load();
  loadLeaderboard();
}

function startTimer(){
  clearInterval(timerInterval);
  timeLeft=900;

  timerInterval=setInterval(()=>{
    let m=Math.floor(timeLeft/60);
    let s=timeLeft%60;
    document.getElementById("timer").innerText=`⏱ ${m}:${s<10?'0'+s:s}`;
    timeLeft--;

    if(timeLeft<0){
      clearInterval(timerInterval);
      submitTest();
    }
  },1000);
}

function generate(type){

// ===== MATH =====
if(type==="IMO"){
return [
[
{q:"12+15=?",opt:[27,25,30,26],c:27},
{q:"8×7=?",opt:[56,48,54,64],c:56},
{q:"144÷12=?",opt:[12,10,14,16],c:12},
{q:"Square of 11?",opt:[121,111,131,101],c:121},
{q:"15²=?",opt:[225,215,205,235],c:225}
],
[
{q:"LCM 6,8?",opt:[24,12,48,16],c:24},
{q:"HCF 12,18?",opt:[6,12,3,9],c:6},
{q:"7³=?",opt:[343,49,21,63],c:343},
{q:"Area square 6?",opt:[36,30,42,48],c:36},
{q:"Perimeter 5?",opt:[20,25,15,10],c:20}
],
[
{q:"25% of 200?",opt:[50,25,75,100],c:50},
{q:"0.5×10?",opt:[5,10,15,20],c:5},
{q:"9×9?",opt:[81,72,90,99],c:81},
{q:"100-37?",opt:[63,53,73,67],c:63},
{q:"Cube of 4?",opt:[64,16,32,48],c:64}
]
];
}

// ===== ENGLISH =====
if(type==="IEO"){
return [
[
{q:"Plural of child?",opt:["Children","Childs","Childes","Child"],c:"Children"},
{q:"Opposite of happy?",opt:["Sad","Big","Fast","Good"],c:"Sad"},
{q:"Synonym of big?",opt:["Large","Tiny","Cold","Slow"],c:"Large"},
{q:"They ___ going.",opt:["are","is","am","be"],c:"are"},
{q:"He ___ playing.",opt:["is","are","am","be"],c:"is"}
],
[
{q:"Past of go?",opt:["Went","Goed","Go","Gone"],c:"Went"},
{q:"Noun example?",opt:["Book","Run","Quick","Fast"],c:"Book"},
{q:"Verb example?",opt:["Run","Book","Red","Big"],c:"Run"},
{q:"Adjective example?",opt:["Beautiful","Run","Jump","Eat"],c:"Beautiful"},
{q:"Article?",opt:["The","Run","Big","Quick"],c:"The"}
],
[
{q:"Pronoun?",opt:["He","Run","Table","Fast"],c:"He"},
{q:"Sentence ends?",opt:[".","?","!",","],c:"."},
{q:"Opposite hot?",opt:["Cold","Warm","Heat","Fire"],c:"Cold"},
{q:"I ___ happy.",opt:["am","is","are","be"],c:"am"},
{q:"Synonym fast?",opt:["Quick","Slow","Cold","Big"],c:"Quick"}
]
];
}

// ===== SCIENCE =====
if(type==="NSO"){
return [
[
{q:"H2O?",opt:["Water","Oxygen","Hydrogen","Helium"],c:"Water"},
{q:"Red planet?",opt:["Mars","Earth","Venus","Jupiter"],c:"Mars"},
{q:"Gas we breathe?",opt:["Oxygen","CO2","Nitrogen","Helium"],c:"Oxygen"},
{q:"Sun is?",opt:["Star","Planet","Moon","Comet"],c:"Star"},
{q:"Photosynthesis?",opt:["Food making","Digestion","Respiration","None"],c:"Food making"}
],
[
{q:"Boiling point?",opt:["100°C","0°C","50°C","90°C"],c:"100°C"},
{q:"Heart pumps?",opt:["Blood","Water","Air","Oxygen"],c:"Blood"},
{q:"Earth satellite?",opt:["Moon","Mars","Sun","Venus"],c:"Moon"},
{q:"Magnet attracts?",opt:["Iron","Wood","Glass","Plastic"],c:"Iron"},
{q:"Largest planet?",opt:["Jupiter","Earth","Mars","Venus"],c:"Jupiter"}
],
[
{q:"Energy source?",opt:["Sun","Rock","Plastic","Sand"],c:"Sun"},
{q:"Water freezes?",opt:["0°C","100°C","50°C","10°C"],c:"0°C"},
{q:"Unit of force?",opt:["Newton","Watt","Volt","Joule"],c:"Newton"},
{q:"Human bones?",opt:[206,210,150,180],c:206},
{q:"Cell unit?",opt:["Life","Energy","Matter","Atom"],c:"Life"}
]
];
}

// ===== REASONING =====
if(type==="CRO"){
return [
[
{q:"2,6,12,20,?",opt:[30,28,32,24],c:30},
{q:"Odd one?",opt:["Dog","Cat","Lion","Car"],c:"Car"},
{q:"Next: 3,9,27,?",opt:[81,72,54,90],c:81},
{q:"A=1,B=2 → C=?",opt:[3,4,5,6],c:3},
{q:"Mirror of P?",opt:["Ԁ","P","b","d"],c:"Ԁ"}
],
[
{q:"Series: 1,4,9,16,?",opt:[25,20,30,36],c:25},
{q:"Opposite fast?",opt:["Slow","Quick","Run","Speed"],c:"Slow"},
{q:"Alphabet after Y?",opt:["Z","X","A","B"],c:"Z"},
{q:"Even number?",opt:[8,7,5,9],c:8},
{q:"Triangle sides?",opt:[3,4,5,6],c:3}
],
[
{q:"Cube faces?",opt:[6,4,8,12],c:6},
{q:"Series: 5,10,20,?",opt:[40,30,25,50],c:40},
{q:"Day after Monday?",opt:["Tuesday","Sunday","Friday","Wednesday"],c:"Tuesday"},
{q:"Clock angle 3→6?",opt:["90°","180°","120°","60°"],c:"90°"},
{q:"Opposite big?",opt:["Small","Tall","Fast","Wide"],c:"Small"}
]
];
}

// ===== DEFAULT =====
return [
[
{q:"Capital India?",opt:["Delhi","Mumbai","Chennai","Kolkata"],c:"Delhi"},
{q:"National animal?",opt:["Tiger","Lion","Cow","Elephant"],c:"Tiger"},
{q:"Currency?",opt:["Rupee","Dollar","Euro","Yen"],c:"Rupee"},
{q:"PM India?",opt:["Modi","Nehru","Gandhi","Patel"],c:"Modi"},
{q:"Flag colors?",opt:["3","2","4","5"],c:"3"}
],
[
{q:"Largest country?",opt:["Russia","India","USA","China"],c:"Russia"},
{q:"National bird?",opt:["Peacock","Crow","Sparrow","Eagle"],c:"Peacock"},
{q:"Ocean largest?",opt:["Pacific","Indian","Atlantic","Arctic"],c:"Pacific"},
{q:"Freedom year?",opt:["1947","1950","1930","1960"],c:"1947"},
{q:"Anthem?",opt:["Jana Gana Mana","Song","None","Tune"],c:"Jana Gana Mana"}
],
[
{q:"Earth shape?",opt:["Sphere","Flat","Cube","Triangle"],c:"Sphere"},
{q:"ISRO country?",opt:["India","USA","China","Russia"],c:"India"},
{q:"USA currency?",opt:["Dollar","Euro","Yen","Rupee"],c:"Dollar"},
{q:"Sport?",opt:["Hockey","Cricket","Football","Tennis"],c:"Hockey"},
{q:"Smallest country?",opt:["Vatican","India","Nepal","USA"],c:"Vatican"}
]
];
}

function load(){
let q=rounds[currentRound][currentQ];
let index=currentRound*5+currentQ;

document.getElementById("roundInfo").innerText=`Round ${currentRound+1}/3`;
document.getElementById("qNum").innerText=`Question ${index+1}/15`;
document.getElementById("question").innerText=q.q;

let html="";
q.opt.forEach(o=>{
html+=`<button onclick="select('${o}')">${o}</button>`;
});

document.getElementById("options").innerHTML=html;
}

function select(ans){
answers[currentRound*5+currentQ]=ans;
}

function next(){
if(currentQ<4) currentQ++;
else if(currentRound<2){currentRound++;currentQ=0;}
load();
}

function prev(){
if(currentQ>0) currentQ--;
else if(currentRound>0){currentRound--;currentQ=4;}
load();
}

function submitTest(){
clearInterval(timerInterval);

let score=0;
for(let r=0;r<3;r++){
for(let q=0;q<5;q++){
let i=r*5+q;
if(answers[i]==rounds[r][q].c) score++;
}
}

document.getElementById("result").innerText=`🔥 Score: ${score}/15`;

saveScore(score);
loadLeaderboard();
}

function saveScore(score){
let data=JSON.parse(localStorage.getItem("scores")||"[]");
data.push(score);
data.sort((a,b)=>b-a);
data=data.slice(0,5);
localStorage.setItem("scores",JSON.stringify(data));
}

function loadLeaderboard(){
let data=JSON.parse(localStorage.getItem("scores")||"[]");
let html="";
data.forEach((s,i)=>{
html+=`#${i+1} - ${s}/15<br>`;
});
document.getElementById("leaderboard").innerHTML=html;
}
</script>

</body>
</html>
