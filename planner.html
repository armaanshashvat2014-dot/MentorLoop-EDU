<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MentorLoop | Planner Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#020617;
  color:#e2e8f0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  transition:0.4s;
}

.card{
  background:rgba(0,0,0,0.6);
  padding:20px;
  border-radius:20px;
  width:420px;
  text-align:center;
}

textarea{
  width:100%;
  height:80px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  padding:10px;
}

input{
  padding:8px;
  border-radius:8px;
  border:none;
}

button{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  color:#020617;
  font-weight:bold;
  cursor:pointer;
}

.task{
  display:flex;
  justify-content:space-between;
  margin-top:8px;
  background:#1e293b;
  padding:8px;
  border-radius:8px;
}

.done{
  text-decoration:line-through;
  color:#94a3b8;
}

.theme-btn{
  margin:5px;
  padding:6px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

<h2>📝 Planner + Notes</h2>

<!-- NOTES -->
<textarea id="notes" placeholder="Write your study notes..."></textarea>

<!-- TASK INPUT -->
<input id="taskInput" placeholder="Add task">
<button onclick="addTask()">Add Task</button>

<!-- TASK LIST -->
<div id="tasks"></div>

<button onclick="saveAll()">💾 Save</button>

<h3>🎨 Themes</h3>

<button class="theme-btn" onclick="setTheme('ocean')">🌊</button>
<button class="theme-btn" onclick="setTheme('black')">⚫</button>
<button class="theme-btn" onclick="setTheme('space')">🌌</button>
<button class="theme-btn" onclick="setTheme('nature')">🌿</button>

</div>

<script>

// LOAD DATA
let notes = localStorage.getItem("ml_notes") || "";
let tasks = JSON.parse(localStorage.getItem("ml_tasks")) || [];
let savedDate = localStorage.getItem("ml_plan_date");

document.getElementById("notes").value = notes;

// MISSED TASK CHECK
let today = new Date().toDateString();

if(savedDate && savedDate !== today && tasks.length){
  let unfinished = tasks.filter(t => !t.done);
  if(unfinished.length){
    alert("⚠️ You didn’t complete all tasks yesterday!");
  }
}

// RENDER TASKS
function renderTasks(){
  let html="";
  tasks.forEach((t,i)=>{
    html += `
      <div class="task">
        <span class="${t.done?'done':''}" onclick="toggleTask(${i})">${t.text}</span>
        <button onclick="deleteTask(${i})">❌</button>
      </div>
    `;
  });
  document.getElementById("tasks").innerHTML = html;
}

// ADD TASK
function addTask(){
  let val = document.getElementById("taskInput").value;
  if(!val) return;

  tasks.push({text:val, done:false});
  document.getElementById("taskInput").value="";
  renderTasks();
}

// TOGGLE TASK
function toggleTask(i){
  tasks[i].done = !tasks[i].done;
  renderTasks();
}

// DELETE
function deleteTask(i){
  tasks.splice(i,1);
  renderTasks();
}

// SAVE
function saveAll(){
  localStorage.setItem("ml_notes", document.getElementById("notes").value);
  localStorage.setItem("ml_tasks", JSON.stringify(tasks));
  localStorage.setItem("ml_plan_date", new Date().toDateString());

  alert("✅ Saved!");
}

// THEMES
function setTheme(t){

  if(t==="ocean"){
    document.body.style.background="linear-gradient(135deg,#0ea5e9,#020617)";
  }
  if(t==="black"){
    document.body.style.background="#020617";
  }
  if(t==="space"){
    document.body.style.background="radial-gradient(circle,#1e293b,#000)";
  }
  if(t==="nature"){
    document.body.style.background="linear-gradient(135deg,#16a34a,#020617)";
  }

  localStorage.setItem("ml_theme", t);
}

// LOAD THEME
let savedTheme = localStorage.getItem("ml_theme");
if(savedTheme) setTheme(savedTheme);

// INIT
renderTasks();

</script>

</body>
</html>
