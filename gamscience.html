<!DOCTYPE html>
<html>
<head>
<title>Science Sprint | MentorLoop EDU</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:radial-gradient(circle at top,#0f172a,#020617);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:#e2e8f0;
}

.card{
background:rgba(15,23,42,.95);
padding:35px;
border-radius:20px;
width:95%;
max-width:650px;
box-shadow:0 0 40px rgba(34,211,238,.2);
border:1px solid rgba(34,211,238,.3);
}

h1{
text-align:center;
color:#22d3ee;
margin-bottom:25px;
}

#question{
margin-bottom:20px;
font-size:18px;
}

button{
width:100%;
padding:12px;
margin-top:12px;
background:#1e293b;
color:white;
border:1px solid #334155;
border-radius:10px;
cursor:pointer;
transition:.25s;
}

button:hover{
background:#22d3ee;
color:#020617;
}

.score-box{
margin-top:20px;
text-align:right;
font-weight:bold;
color:#22d3ee;
}

.progress{
height:6px;
background:#1e293b;
border-radius:5px;
margin-bottom:20px;
overflow:hidden;
}

.progress-bar{
height:100%;
background:#22d3ee;
width:0%;
transition:width .3s ease;
}
</style>
</head>

<body>

<div class="card">
<h1>⚛️ Science Sprint</h1>

<div class="progress">
<div class="progress-bar" id="progress"></div>
</div>

<p id="question"></p>
<div id="options"></div>

<div class="score-box">
Score: <span id="score">0</span>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";


// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyBOP356DMuNyWQyHDbksw0i_dWXfXsbQvI",
  authDomain: "mentorloop-55a37.firebaseapp.com",
  projectId: "mentorloop-55a37"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUid = null;
let studentName = "Student";


// ================= WEEK =================
function getWeek(){
  const d = new Date();
  const onejan = new Date(d.getFullYear(),0,1);
  const week = Math.ceil((((d-onejan)/86400000)+onejan.getDay()+1)/7);
  return d.getFullYear()+"-W"+week;
}


// ================= LOAD USER =================
async function loadUser(uid){
  const snap = await getDoc(doc(db,"users",uid));
  if(snap.exists()){
    studentName = snap.data().name || "Student";
  }
}


// ================= ADD POINTS =================
async function addPoints(amount){
  if(!currentUid) return;

  const ref = doc(db,"leaderboard",currentUid);
  const snap = await getDoc(ref);

  let currentPoints = 0;

  if(snap.exists()){
    currentPoints = snap.data().points || 0;
  }

  await setDoc(ref,{
    name: studentName,
    points: currentPoints + amount,
    week: getWeek()
  },{merge:true});
}


// ================= HISTORY =================
function saveScoreToHistory(percent){
  const key = "ml_history_science";
  const history = JSON.parse(localStorage.getItem(key) || "[]");

  history.push({
    score: percent,
    date: new Date().toLocaleDateString()
  });

  if(history.length > 10){
    history.shift();
  }

  localStorage.setItem(key, JSON.stringify(history));
}


// ================= QUIZ =================
function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

const scienceQuestions = [
{q:"What planet is known as the Red Planet?",a:["Mars","Venus","Jupiter"],c:0},
{q:"What gas do plants absorb?",a:["Oxygen","Carbon Dioxide","Nitrogen"],c:1},
{q:"What is the chemical symbol for Gold?",a:["Au","Ag","Gd"],c:0},
{q:"What force keeps objects on Earth?",a:["Magnetism","Gravity","Friction"],c:1},
{q:"What part of cell contains DNA?",a:["Nucleus","Membrane","Cytoplasm"],c:0},
{q:"What is H2O?",a:["Water","Hydrogen","Salt"],c:0},
{q:"What organ pumps blood?",a:["Heart","Brain","Lungs"],c:0},
{q:"Speed of light is?",a:["300,000 km/s","150,000 km/s","1,000 km/s"],c:0},
{q:"Largest planet?",a:["Earth","Saturn","Jupiter"],c:2},
{q:"What gas do humans breathe?",a:["Oxygen","Helium","Nitrogen"],c:0}
];

let questions = shuffle([...scienceQuestions]).slice(0,10);
let index = 0;
let score = 0;


// ================= LOAD QUESTION =================
async function loadQuestion(){

  if(index >= questions.length){

    const percent = Math.round((score/questions.length)*100);

    localStorage.setItem("ml_last_quiz_score", percent);
    saveScoreToHistory(percent);

    const today = new Date().toDateString();
    const rewardKey = "ml_science_reward";

    if(percent >= 80 && localStorage.getItem(rewardKey)!==today){
      await addPoints(5);
      localStorage.setItem(rewardKey,today);
    }

    document.querySelector(".card").innerHTML = `
      <h1>🎉 Quiz Complete!</h1>
      <p>Your score: <strong>${score}/${questions.length}</strong></p>
      <p>Percentage: <strong>${percent}%</strong></p>
      <button onclick="location.reload()">Play Again</button>
    `;
    return;
  }

  const q = questions[index];
  document.getElementById("question").textContent = q.q;

  const box = document.getElementById("options");
  box.innerHTML = "";

  q.a.forEach((opt,i)=>{
    const btn = document.createElement("button");
    btn.textContent = opt;

    btn.onclick = async ()=>{
      if(i === q.c){
        score++;
        await addPoints(2);
      }

      index++;
      document.getElementById("score").innerText = score;
      document.getElementById("progress").style.width =
        ((index/questions.length)*100)+"%";

      loadQuestion();
    };

    box.appendChild(btn);
  });
}


// ================= AUTH =================
onAuthStateChanged(auth, async(user)=>{

  if(!user){
    window.location.replace("index.html");
    return;
  }

  currentUid = user.uid;
  await loadUser(currentUid);

  loadQuestion();
});
</script>

</body>
</html>
