<!DOCTYPE html>
<html>
<head>
<title>Science Sprint | MentorLoop EDU</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:radial-gradient(circle at top,#0f172a,#020617);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:#e2e8f0;
}

.card{
background:rgba(15,23,42,.95);
padding:35px;
border-radius:20px;
width:95%;
max-width:650px;
box-shadow:0 0 40px rgba(34,211,238,.2);
border:1px solid rgba(34,211,238,.3);
backdrop-filter:blur(10px);
animation:fadeIn .4s ease-in-out;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

h1{
text-align:center;
color:#22d3ee;
margin-bottom:25px;
}

#question{
margin-bottom:20px;
font-size:18px;
}

button{
width:100%;
padding:12px;
margin-top:12px;
background:#1e293b;
color:white;
border:1px solid #334155;
border-radius:10px;
cursor:pointer;
transition:.25s;
}

button:hover{
background:#22d3ee;
color:#020617;
transform:scale(1.02);
}

.score-box{
margin-top:20px;
text-align:right;
font-weight:bold;
color:#22d3ee;
}

.progress{
height:6px;
background:#1e293b;
border-radius:5px;
margin-bottom:20px;
overflow:hidden;
}

.progress-bar{
height:100%;
background:#22d3ee;
width:0%;
transition:width .3s ease;
}
</style>
</head>

<body>

<div class="card">

<h1>⚛️ Science Sprint</h1>

<div class="progress">
<div class="progress-bar" id="progress"></div>
</div>

<p id="question"></p>
<div id="options"></div>

<div class="score-box">
Score: <span id="score">0</span>
</div>

</div>

<script type="module">

// 🔥 FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBOP356DMuNyWQyHDbksw0i_dWXfXsbQvI",
  authDomain: "mentorloop-55a37.firebaseapp.com",
  projectId: "mentorloop-55a37"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔐 UID
if (!localStorage.getItem("ml_uid")) {
  localStorage.setItem("ml_uid", "user_" + Math.random().toString(36).substring(2, 10));
}

// 📅 WEEK
function getWeek(){
  let d=new Date();
  let onejan=new Date(d.getFullYear(),0,1);
  let week=Math.ceil((((d-onejan)/86400000)+onejan.getDay()+1)/7);
  return d.getFullYear()+"-W"+week;
}

// 🔥 SYNC
async function syncToFirebase(points){
  const uid = localStorage.getItem("ml_uid");

  await setDoc(doc(db,"leaderboard",uid),{
    name: localStorage.getItem("ml_name") || "Guest",
    points: points,
    week: getWeek()
  });
}

// 💎 POINT SYSTEM
function addPoints(amount){
  let current=parseInt(localStorage.getItem("ml_points"))||0;
  let newPoints=current+amount;

  localStorage.setItem("ml_points",newPoints);

  syncToFirebase(newPoints);
}

// ---------- SHUFFLE ----------
function shuffle(a){
for(let i=a.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}
return a;
}

// ---------- QUESTIONS ----------
const scienceQuestions=[

{q:"What planet is known as the Red Planet?",a:["Mars","Venus","Jupiter"],c:0},
{q:"What gas do plants absorb?",a:["Oxygen","Carbon Dioxide","Nitrogen"],c:1},
{q:"What is the chemical symbol for Gold?",a:["Au","Ag","Gd"],c:0},
{q:"What force keeps objects on Earth?",a:["Magnetism","Gravity","Friction"],c:1},
{q:"What part of cell contains DNA?",a:["Nucleus","Membrane","Cytoplasm"],c:0},
{q:"What is H2O?",a:["Water","Hydrogen","Salt"],c:0},
{q:"What organ pumps blood?",a:["Heart","Brain","Lungs"],c:0},
{q:"Speed of light is?",a:["300,000 km/s","150,000 km/s","1,000 km/s"],c:0},
{q:"Largest planet?",a:["Earth","Saturn","Jupiter"],c:2},
{q:"What gas do humans breathe?",a:["Oxygen","Helium","Nitrogen"],c:0}

];

let questions=shuffle([...scienceQuestions]).slice(0,10);
let index=0;
let score=0;

// ---------- LOAD ----------
function loadQuestion(){

if(index>=questions.length){

let percent=Math.round((score/questions.length)*100);

localStorage.setItem("ml_last_quiz_score",percent);

// 🎯 BONUS FIXED
const today=new Date().toDateString();
const key="ml_science_reward";

if(percent>=80 && localStorage.getItem(key)!==today){
addPoints(5);
localStorage.setItem(key,today);
}

document.querySelector(".card").innerHTML=
`<h1>🎉 Quiz Complete!</h1>
<p>Your score: <strong>${score}/${questions.length}</strong></p>
<p>Percentage: <strong>${percent}%</strong></p>
<button onclick="location.reload()">Play Again</button>`;

return;
}

const q=questions[index];

document.getElementById("question").textContent=q.q;

const options=document.getElementById("options");
options.innerHTML="";

q.a.forEach((opt,i)=>{

const btn=document.createElement("button");
btn.textContent=opt;

btn.onclick=()=>{
if(i===q.c){
score++;
addPoints(2); // 🔥 per question reward
}

index++;

document.getElementById("score").textContent=score;

document.getElementById("progress").style.width=
((index/questions.length)*100)+"%";

loadQuestion();
};

options.appendChild(btn);

});

}

loadQuestion();

</script>

</body>
</html>
