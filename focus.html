<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MentorLoop | Focus Mode</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:#e2e8f0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#020617;
  padding:20px;
  border-radius:20px;
  width:420px;
  text-align:center;
}

button{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  color:#020617;
  font-weight:bold;
  cursor:pointer;
}

input, select{
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:none;
}

.question{margin-top:15px;font-size:18px;}
.stats{margin-top:10px;font-size:14px;}
.feed{font-size:12px;margin-top:10px;color:#94a3b8;}
</style>
</head>

<body>

<div class="card">

<h1>🎯 Focus Ultimate</h1>

<div id="setup">

<select id="subject">
<option value="">Select Subject</option>
<option value="math">Math</option>
<option value="science">Science</option>
</select>

<select id="mode">
<option value="learn">Learning Mode</option>
<option value="test">Test Mode</option>
</select>

<button onclick="startQuiz()">Start</button>

</div>

<div id="quiz" style="display:none">

<div id="goal"></div>

<div class="question" id="question"></div>
<input id="answer" placeholder="Answer">

<button onclick="submit()">Submit</button>
<button onclick="hint()">💡 Hint</button>

<div class="stats" id="stats"></div>

<button onclick="retryWeak()">🔁 Practice Weak Topic</button>
<button onclick="share()">📢 Share Progress</button>

<div class="feed" id="feed"></div>

</div>

</div>

<script>

let subject, mode;
let correct=0, wrong=0, streak=0;
let difficulty=1;
let weakTopics={};
let mastery={};
let goalTarget=10;

// START
function startQuiz(){

  subject=document.getElementById("subject").value;
  mode=document.getElementById("mode").value;

  if(!subject){
    alert("Select subject");
    return;
  }

  document.getElementById("setup").style.display="none";
  document.getElementById("quiz").style.display="block";

  document.getElementById("goal").innerHTML =
    `🎯 Goal: ${goalTarget} correct answers`;

  nextQ();
}

// GENERATE
function gen(){

  let q,a,topic;

  if(subject==="math"){

    if(difficulty===1){
      let x=Math.floor(Math.random()*10)+1;
      let y=Math.floor(Math.random()*10)+1;
      q=`${x}+${y}`; a=x+y; topic="addition";
    }

    else if(difficulty===2){
      let x=Math.floor(Math.random()*20)+5;
      let y=Math.floor(Math.random()*10)+2;
      q=`${x}×${y}`; a=x*y; topic="multiplication";
    }

    else{
      let x=Math.floor(Math.random()*20)+10;
      q=`${x}²`; a=x*x; topic="squares";
    }

  }

  if(subject==="science"){
    let data=[
      ["Water formula?","h2o","chem"],
      ["Gas we breathe?","oxygen","bio"],
      ["Unit of force?","newton","phy"]
    ];
    let i=data[Math.floor(Math.random()*data.length)];
    q=i[0]; a=i[1]; topic=i[2];
  }

  return {q,a,topic};
}

let current;

function nextQ(){
  current=gen();
  document.getElementById("question").innerText=current.q;
  document.getElementById("answer").value="";
}

// SUBMIT
function submit(){

  let user=document.getElementById("answer").value.toLowerCase().trim();

  if(user==current.a){

    correct++; streak++;

    mastery[current.topic]=(mastery[current.topic]||0)+1;

    if(streak>=2 && difficulty<3) difficulty++;

  } else {

    wrong++; streak=0;

    weakTopics[current.topic]=(weakTopics[current.topic]||0)+1;

    if(difficulty>1) difficulty--;
  }

  update();
  nextQ();
}

// HINT
function hint(){
  if(mode==="test") return alert("No hints in Test mode 😈");
  alert("Think step by step!");
}

// RETRY WEAK
function retryWeak(){
  let weak=Object.keys(weakTopics).sort((a,b)=>weakTopics[b]-weakTopics[a])[0];
  if(weak) alert("Focus on: "+weak);
}

// UPDATE
function update(){

  let total=correct+wrong;
  let acc= total?Math.round((correct/total)*100):0;

  let level = acc>85 ? "Master" :
              acc>70 ? "Advanced" :
              acc>50 ? "Skilled" : "Beginner";

  let msg="";

  if(acc>80) msg="🔥 Improving fast!";
  else if(acc<50) msg="👀 Focus more";

  // MILESTONE
  if(correct===5) msg+="<br>🎉 Milestone reached!";
  if(correct>=goalTarget) msg+="<br>🏆 Goal Completed!";

  document.getElementById("stats").innerHTML=`
    ✅ ${correct} | ❌ ${wrong}<br>
    📊 ${acc}% Accuracy<br>
    🧬 Level: ${level}<br>
    ⚡ Streak: ${streak}<br>
    🎯 Difficulty: ${difficulty}<br>
    ${msg}
  `;
}

// SHARE
function share(){
  let text=`I reached ${correct} correct answers in Focus Mode 🔥`;
  navigator.clipboard.writeText(text);
  alert("Copied 😎");
}

// FAKE LIVE FEED
setInterval(()=>{
  let msgs=[
    "User improved accuracy 🔥",
    "Someone mastered multiplication 👑",
    "3 users learning now 👀"
  ];
  document.getElementById("feed").innerText =
    msgs[Math.floor(Math.random()*msgs.length)];
},3000);

</script>

</body>
</html>
