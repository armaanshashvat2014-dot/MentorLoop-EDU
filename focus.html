<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MentorLoop | Focus mode</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:#e2e8f0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#020617;
  padding:20px;
  border-radius:20px;
  width:420px;
  text-align:center;
}

button{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  color:#020617;
  font-weight:bold;
  cursor:pointer;
}

input, select{
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:none;
}

.question{margin-top:15px;font-size:18px;}
.stats{margin-top:10px;font-size:14px;}
.feed{font-size:12px;margin-top:10px;color:#94a3b8;}
</style>
</head>

<body>

<div class="card">

<h1>🎯 Focus mode</h1>

<div id="setup">

<select id="subject">
<option value="">Select Subject</option>
<option value="math">Math</option>
<option value="science">Science</option>
<option value="mixed">Mixed</option>
</select>

<select id="mode">
<option value="learn">Learning Mode</option>
<option value="test">Test Mode</option>
</select>

<select id="goalAcc">
<option value="70">Goal 70%</option>
<option value="80">Goal 80%</option>
<option value="90">Goal 90%</option>
</select>

<button onclick="startQuiz()">Start</button>

</div>

<div id="quiz" style="display:none">

<div id="goal"></div>

<div class="question" id="question"></div>
<input id="answer" placeholder="Answer">

<button onclick="submit()">Submit</button>
<button onclick="hint()">💡 Hint</button>

<div class="stats" id="stats"></div>

<button onclick="retryWeak()">🔁 Weak Topic</button>
<button onclick="share()">📢 Share</button>

<div class="feed" id="feed"></div>

</div>

</div>

<script>

let subject, mode, goalAcc;
let correct=0, wrong=0, streak=0, combo=0;
let difficulty=1;
let weakTopics={}, mastery={};
let energy=100, streakSaver=false;
let totalTime=0, qCount=0;
let lastAcc = localStorage.getItem("last_acc") || 0;

let current, timer, timed=false;

// START
function startQuiz(){

  subject=document.getElementById("subject").value;
  mode=document.getElementById("mode").value;
  goalAcc=document.getElementById("goalAcc").value;

  if(!subject){
    alert("Select subject");
    return;
  }

  timed = confirm("Enable timed mode? ⏱");

  document.getElementById("setup").style.display="none";
  document.getElementById("quiz").style.display="block";

  document.getElementById("goal").innerHTML =
    `🎯 Goal: ${goalAcc}% accuracy`;

  nextQ();
}

// GENERATOR
function gen(){

  if(subject==="mixed"){
    subject = Math.random()>0.5 ? "math":"science";
  }

  let q,a,topic;

  if(subject==="math"){
    if(difficulty===1){
      let x=Math.floor(Math.random()*10)+1;
      let y=Math.floor(Math.random()*10)+1;
      q=`${x}+${y}`; a=x+y; topic="addition";
    } else if(difficulty===2){
      let x=Math.floor(Math.random()*20)+5;
      let y=Math.floor(Math.random()*10)+2;
      q=`${x}×${y}`; a=x*y; topic="multiplication";
    } else {
      let x=Math.floor(Math.random()*20)+10;
      q=`${x}²`; a=x*x; topic="squares";
    }
  }

  if(subject==="science"){
    let data=[
      ["Water formula?","h2o","chem"],
      ["Gas we breathe?","oxygen","bio"],
      ["Unit of force?","newton","phy"]
    ];
    let i=data[Math.floor(Math.random()*data.length)];
    q=i[0]; a=i[1]; topic=i[2];
  }

  return {q,a,topic};
}

// NEXT Q
function nextQ(){
  current=gen();
  document.getElementById("question").innerText=current.q;
  document.getElementById("answer").value="";

  if(timed){
    let t=8;
    timer=setInterval(()=>{
      t--;
      if(t<=0){
        clearInterval(timer);
        submit();
      }
    },1000);
  }
}

// SUBMIT
function submit(){

  clearInterval(timer);

  let startTime = Date.now();

  let user=document.getElementById("answer").value.toLowerCase().trim();
  let isCorrect = user==current.a;

  qCount++;
  totalTime += (Date.now()-startTime)/1000;

  if(isCorrect){

    correct++; streak++; combo++;
    mastery[current.topic]=(mastery[current.topic]||0)+1;

    if(combo>=3) alert("🔥 COMBO x"+combo);

    if(streak>=2 && difficulty<3) difficulty++;

  } else {

    wrong++; combo=0;

    if(!streakSaver){
      streakSaver=true;
      alert("⚡ Streak saved!");
    } else streak=0;

    weakTopics[current.topic]=(weakTopics[current.topic]||0)+1;

    energy -=10;

    alert("Correct: "+current.a);

    if(difficulty>1) difficulty--;
  }

  if(energy<40) alert("⚠️ Low Energy");

  if(qCount%5===0){
    alert("👑 Boss Question!");
    difficulty=3;
  }

  update();
  nextQ();
}

// HINT
function hint(){
  if(mode==="test") return alert("No hints 😈");
  alert("Think step by step!");
}

// RETRY WEAK
function retryWeak(){
  let weak=Object.keys(weakTopics).sort((a,b)=>weakTopics[b]-weakTopics[a])[0];
  if(weak) alert("Focus on "+weak);
}

// UPDATE
function update(){

  let total=correct+wrong;
  let acc= total?Math.round((correct/total)*100):0;

  let avgTime = totalTime/(qCount||1);
  let improvement = acc - lastAcc;
  localStorage.setItem("last_acc",acc);

  let rank =
    acc>90?"💎 Diamond":
    acc>75?"🥇 Gold":
    acc>60?"🥈 Silver":"🥉 Bronze";

  let score=Math.round(acc + combo*2);

  document.getElementById("stats").innerHTML=`
    ⚡ Energy: ${energy}%<br>
    🔥 Combo: ${combo}<br>
    📊 Accuracy: ${acc}%<br>
    📈 Improvement: ${improvement}%<br>
    ⏱ Avg Time: ${avgTime.toFixed(2)}s<br>
    🏆 Rank: ${rank}<br>
    🎯 Score: ${score}/100
  `;

  if(qCount>10) alert("🧠 Take a break!");

  if(acc>80){
    document.body.style.background="linear-gradient(#020617,#022c22)";
  }
}

// SHARE
function share(){
  let text=`I reached ${correct} correct with ${goalAcc}% goal 🔥`;
  navigator.clipboard.writeText(text);
  alert("Copied 😎");
}

// LIVE FEED
setInterval(()=>{
  let msgs=[
    "User improved accuracy 🔥",
    "Someone mastered topic 👑",
    "4 users focusing now 👀"
  ];
  document.getElementById("feed").innerText =
    msgs[Math.floor(Math.random()*msgs.length)];
},3000);

</script>

</body>
</html>
