<!DOCTYPE html>
<html>
<head>
<title>MentorLoop EDU</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:sans-serif;background:#0f172a;color:white;text-align:center}
.card{background:#1e293b;padding:20px;margin:15px auto;max-width:500px;border-radius:10px}
button,input,select{width:100%;padding:10px;margin-top:10px;border:none;border-radius:6px}
button{background:#22c55e;color:white;cursor:pointer}
.danger{background:#ef4444}
</style>
</head>

<body>

<h1>🚀 MentorLoop EDU</h1>

<div id="loginBox" class="card">
<input id="name" placeholder="Enter name">
<select id="role">
<option>Student</option>
<option>Mentor</option>
</select>
<button id="loginBtn">Login</button>
</div>

<div id="app" style="display:none">

<div id="teacherPanel" class="card" style="display:none">
<h3>Create Class</h3>
<input id="className">
<button id="createBtn">Create</button>
</div>

<div class="card">
<h3>Your Classrooms</h3>
<div id="classes"></div>
</div>

<div id="joinBox" class="card" style="display:none">
<h3>Join Class</h3>
<input id="joinCode">
<button id="joinBtn">Join</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore, collection, addDoc, doc, setDoc, getDocs,
query, where, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const appFirebase = initializeApp({
apiKey:"AIzaSyBOP356DMuNyWQyHDbksw0i_dWXfXsbQvI",
authDomain:"mentorloop-55a37.firebaseapp.com",
projectId:"mentorloop-55a37"
});

const db = getFirestore(appFirebase);

// 🔒 SAFE DOM
const loginBox = document.getElementById("loginBox");
const appDiv = document.getElementById("app");
const teacherPanel = document.getElementById("teacherPanel");
const joinBox = document.getElementById("joinBox");
const classesDiv = document.getElementById("classes");

const nameInput = document.getElementById("name");
const roleSelect = document.getElementById("role");
const loginBtn = document.getElementById("loginBtn");
const createBtn = document.getElementById("createBtn");
const joinBtn = document.getElementById("joinBtn");
const classNameInput = document.getElementById("className");
const joinCodeInput = document.getElementById("joinCode");

// UID
let uid = localStorage.getItem("ml_uid");
if(!uid){
uid="user_"+Math.random().toString(36).slice(2);
localStorage.setItem("ml_uid",uid);
}

// LOGIN
loginBtn.onclick=()=>{
if(!nameInput.value) return alert("Enter name");

localStorage.setItem("ml_name",nameInput.value);
localStorage.setItem("ml_role",roleSelect.value);
location.reload();
};

const userName = localStorage.getItem("ml_name");
const roleVal = localStorage.getItem("ml_role");

if(userName){
loginBox.style.display="none";
appDiv.style.display="block";

if(roleVal==="Mentor") teacherPanel.style.display="block";
else joinBox.style.display="block";

loadClasses();
}

// CREATE CLASS
createBtn.onclick=async()=>{
let cname = classNameInput.value.trim();
if(!cname) return alert("Enter class name");

const q = query(collection(db,"classrooms"),where("name","==",cname));
const snap = await getDocs(q);

if(!snap.empty) return alert("Class already exists");

let code = Math.random().toString(36).slice(2,7).toUpperCase();

await addDoc(collection(db,"classrooms"),{
name:cname,
teacher:uid,
code
});

classNameInput.value="";
loadClasses();
};

// JOIN CLASS
joinBtn.onclick=async()=>{
let codeVal = joinCodeInput.value.trim();

const q=query(collection(db,"classrooms"),where("code","==",codeVal));
const snap=await getDocs(q);

if(snap.empty) return alert("Invalid code");

snap.forEach(async d=>{
await setDoc(doc(db,"classrooms",d.id,"students",uid),{
name:userName,
points:0
});
});

joinCodeInput.value="";
loadClasses();
};

// LOAD CLASSES
async function loadClasses(){

classesDiv.innerHTML="";

const snap=await getDocs(collection(db,"classrooms"));

snap.forEach(docSnap=>{
let c=docSnap.data();

let div=document.createElement("div");
div.className="card";

div.innerHTML=`<b>${c.name}</b><br>Code: ${c.code}`;

let openBtn=document.createElement("button");
openBtn.textContent="Open";
openBtn.onclick=()=>{
localStorage.setItem("ml_class",docSnap.id);
location.href="classroom.html";
};

div.appendChild(openBtn);

if(roleVal==="Mentor"){
let delBtn=document.createElement("button");
delBtn.textContent="Delete";
delBtn.className="danger";

delBtn.onclick=async()=>{
await deleteDoc(doc(db,"classrooms",docSnap.id));
loadClasses();
};

div.appendChild(delBtn);
}

classesDiv.appendChild(div);
});
}

</script>

</body>
</html>
